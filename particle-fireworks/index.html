<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>烟花合成器</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-top: #071120;
      --bg-bottom: #02050d;
      --panel: rgba(7, 12, 24, 0.82);
      --line: rgba(149, 180, 255, 0.18);
      --text: #eef5ff;
      --muted: #93a7cc;
      --accent: #ff7f6b;
      --accent-soft: #5ad9ff;
      --danger: #ff6b88;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(48, 84, 180, 0.18), transparent 34%),
        radial-gradient(circle at 70% 18%, rgba(255, 134, 98, 0.12), transparent 20%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
    }

    body {
      position: relative;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      cursor: crosshair;
    }

    .hud {
      position: fixed;
      top: 18px;
      left: 18px;
      width: min(360px, calc(100vw - 36px));
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(10, 15, 30, 0.94), rgba(6, 10, 21, 0.86));
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: 1.5rem;
      letter-spacing: 0.03em;
    }

    .lede,
    .hint,
    .meta-label {
      color: var(--muted);
    }

    .lede {
      margin-top: 8px;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .controls,
    .stats {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .controls-row,
    .stats {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    button {
      border: 1px solid rgba(122, 158, 255, 0.25);
      border-radius: 14px;
      padding: 11px 14px;
      font: inherit;
      color: var(--text);
      background: rgba(11, 17, 32, 0.95);
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    button:hover,
    button:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(122, 158, 255, 0.5);
    }

    .recording {
      background: rgba(58, 11, 25, 0.95);
      border-color: rgba(255, 107, 136, 0.65);
      box-shadow: inset 0 0 0 1px rgba(255, 107, 136, 0.18);
    }

    .playing {
      background: rgba(11, 33, 58, 0.95);
      border-color: rgba(90, 217, 255, 0.65);
    }

    .meta {
      padding: 11px 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
    }

    .meta strong {
      display: block;
      margin-top: 6px;
      font-size: 1.05rem;
    }

    .hint {
      margin-top: 14px;
      line-height: 1.45;
      font-size: 0.84rem;
    }

    @media (max-width: 720px) {
      .hud {
        top: auto;
        bottom: 12px;
        left: 12px;
        width: calc(100vw - 24px);
        padding: 14px;
      }

      .controls-row,
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <canvas id="fireworks-canvas" aria-label="烟花画布"></canvas>

  <section class="hud">
    <h1>烟花合成器</h1>
    <p class="lede">按住任意位置发射，松手时爆炸。X 坐标决定色相，Y 坐标决定扩散半径，按压时长决定升空高度，录制按钮会保存最近 10 秒烟花秀并循环回放。</p>

    <div class="controls">
      <div class="controls-row">
        <button id="record-button" type="button">开始录制</button>
        <button id="playback-button" type="button">开始回放</button>
      </div>
    </div>

    <div class="stats">
      <div class="meta">
        <span class="meta-label">录制事件</span>
        <strong id="record-count">0</strong>
      </div>
      <div class="meta">
        <span class="meta-label">活跃粒子</span>
        <strong id="particle-count">0</strong>
      </div>
    </div>

    <p class="hint">桌面端点击，移动端触摸都可用。长按越久升得越高；越靠上越集中且二次爆炸更少，越靠下越松散且更容易出现二次爆炸。</p>
  </section>

  <script>
    const canvas = document.getElementById("fireworks-canvas");
    const ctx = canvas.getContext("2d");
    const recordButton = document.getElementById("record-button");
    const playbackButton = document.getElementById("playback-button");
    const recordCount = document.getElementById("record-count");
    const particleCount = document.getElementById("particle-count");

    const MAX_PARTICLES = 2000;
    const RECORDING_LIMIT_MS = 10000;
    const ROCKET_TRAIL_INTERVAL = 18;
    const particles = new Array(MAX_PARTICLES);
    const rockets = [];
    const recordedBursts = [];
    const activePointer = {
      id: null,
      downAt: 0,
      x: 0,
      y: 0,
      rocket: null
    };

    let width = 0;
    let height = 0;
    let scale = 1;
    let particleCursor = 0;
    let activeParticles = 0;
    let isRecording = false;
    let isPlayback = false;
    let playbackStartTime = 0;
    let playbackLoopOffset = 0;
    let playbackWindowStart = 0;
    let playbackCursor = 0;
    let lastFrameTime = performance.now();

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(start, end, t) {
      return start + (end - start) * t;
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function resizeCanvas() {
      scale = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * scale);
      canvas.height = Math.floor(height * scale);
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
    }

    function createParticleSlot() {
      return {
        active: false,
        x: 0,
        y: 0,
        px: 0,
        py: 0,
        vx: 0,
        vy: 0,
        age: 0,
        life: 1,
        drag: 0.985,
        gravity: 0,
        size: 2,
        alpha: 1,
        color: "hsla(0, 100%, 70%, 1)",
        trail: 0.2,
        secondary: false,
        secondaryChance: 0,
        burst: null
      };
    }

    for (let index = 0; index < MAX_PARTICLES; index += 1) {
      particles[index] = createParticleSlot();
    }

    function allocateParticle() {
      const particle = particles[particleCursor];
      particleCursor = (particleCursor + 1) % MAX_PARTICLES;
      if (!particle.active) {
        activeParticles += 1;
      }
      return particle;
    }

    function emitParticle(config) {
      const particle = allocateParticle();
      particle.active = true;
      particle.x = config.x;
      particle.y = config.y;
      particle.px = config.x;
      particle.py = config.y;
      particle.vx = config.vx;
      particle.vy = config.vy;
      particle.age = 0;
      particle.life = config.life;
      particle.drag = config.drag;
      particle.gravity = config.gravity;
      particle.size = config.size;
      particle.alpha = config.alpha;
      particle.color = config.color;
      particle.trail = config.trail;
      particle.secondary = Boolean(config.secondary);
      particle.secondaryChance = config.secondaryChance || 0;
      particle.burst = config.burst || null;
      return particle;
    }

    function deactivateParticle(particle) {
      if (!particle.active) {
        return;
      }
      particle.active = false;
      activeParticles = Math.max(0, activeParticles - 1);
      if (particle.secondary && particle.burst && Math.random() < particle.secondaryChance) {
        spawnBurst(particle.x, particle.y, {
          ...particle.burst,
          amount: Math.max(20, Math.floor(particle.burst.amount * 0.35)),
          spread: particle.burst.spread * 0.45,
          sizeScale: particle.burst.sizeScale * 0.75,
          secondaryChance: 0
        });
      }
    }

    function mapBurstProfile(x, y, holdDuration) {
      const nx = clamp(x / width, 0, 1);
      const ny = clamp(y / height, 0, 1);
      const holdRatio = clamp(holdDuration / 1200, 0, 1);
      return {
        hue: Math.round(nx * 360),
        spread: lerp(1.7, 4.8, ny),
        amount: Math.round(70 + (1 - ny) * 40 + holdRatio * 60),
        trail: lerp(0.12, 0.32, nx),
        sizeScale: lerp(1.1, 2.6, 1 - ny),
        secondaryChance: lerp(0.05, 0.32, ny),
        glowHue: (Math.round(nx * 360) + 30) % 360
      };
    }

    function spawnBurst(x, y, burst) {
      const amount = Math.min(220, burst.amount);
      for (let index = 0; index < amount; index += 1) {
        const angle = (index / amount) * Math.PI * 2 + rand(-0.08, 0.08);
        const speed = burst.spread * Math.sqrt(Math.random()) * rand(0.7, 1.18);
        const lightness = 62 + Math.random() * 18;
        emitParticle({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: rand(0.8, 1.35),
          drag: 0.985,
          gravity: 0.05,
          size: rand(1.3, 2.8) * burst.sizeScale,
          alpha: 1,
          color: `hsla(${(burst.hue + rand(-18, 18) + 360) % 360}, 100%, ${lightness}%, 1)`,
          trail: burst.trail,
          secondary: index < amount * 0.16,
          secondaryChance: burst.secondaryChance,
          burst
        });
      }

      for (let spark = 0; spark < 18; spark += 1) {
        const angle = (spark / 18) * Math.PI * 2;
        emitParticle({
          x,
          y,
          vx: Math.cos(angle) * rand(0.8, 1.8),
          vy: Math.sin(angle) * rand(0.8, 1.8),
          life: rand(0.24, 0.4),
          drag: 0.94,
          gravity: 0.015,
          size: rand(0.9, 1.5),
          alpha: 0.85,
          color: `hsla(${burst.glowHue}, 100%, 88%, 1)`,
          trail: 0.06,
          secondary: false
        });
      }
    }

    function createRocket(x, y, holdDuration, startTime) {
      const holdRatio = clamp(holdDuration / 1200, 0, 1);
      const burstY = lerp(height * 0.68, height * 0.16, holdRatio);
      const profile = mapBurstProfile(x, y, holdDuration);
      return {
        x,
        y: height + 30,
        px: x,
        py: height + 30,
        vx: rand(-0.22, 0.22),
        vy: lerp(-4.2, -9.4, holdRatio),
        burstY,
        holdDuration,
        launchTime: startTime,
        profile,
        trailHue: profile.glowHue,
        trailTimer: 0,
        exploded: false
      };
    }

    function launchFirework(x, y, holdDuration, startedAt, shouldRecord) {
      const rocket = createRocket(x, y, holdDuration, startedAt);
      rockets.push(rocket);
      if (shouldRecord && isRecording) {
        recordFireworkEvent(startedAt, x, y, holdDuration);
      }
      return rocket;
    }

    function recordFireworkEvent(startedAt, x, y, holdDuration) {
      recordedBursts.push({ time: startedAt, x, y, holdDuration });
      trimRecordedBursts(startedAt);
      recordCount.textContent = String(recordedBursts.length);
    }

    function trimRecordedBursts(latestTime) {
      while (recordedBursts.length && latestTime - recordedBursts[0].time > RECORDING_LIMIT_MS) {
        recordedBursts.shift();
      }
    }

    function triggerBurst(rocket) {
      if (rocket.exploded) {
        return;
      }
      rocket.exploded = true;
      spawnBurst(rocket.x, rocket.y, rocket.profile);
    }

    function toggleRecording() {
      isRecording = !isRecording;
      if (isRecording) {
        recordedBursts.length = 0;
        recordCount.textContent = "0";
        recordButton.textContent = "停止录制";
        recordButton.classList.add("recording");
      } else {
        recordButton.textContent = "开始录制";
        recordButton.classList.remove("recording");
      }
    }

    function togglePlayback() {
      if (!recordedBursts.length) {
        return;
      }
      isPlayback = !isPlayback;
      playbackButton.textContent = isPlayback ? "停止回放" : "开始回放";
      playbackButton.classList.toggle("playing", isPlayback);
      if (isPlayback) {
        playbackStartTime = performance.now();
        playbackLoopOffset = 0;
        playbackWindowStart = recordedBursts[0].time;
        playbackCursor = 0;
      }
    }

    function updatePlayback(now) {
      if (!isPlayback || !recordedBursts.length) {
        return;
      }

      const loopDuration = Math.max(
        800,
        recordedBursts[recordedBursts.length - 1].time - playbackWindowStart + 250
      );
      let elapsed = now - playbackStartTime - playbackLoopOffset;

      while (elapsed >= loopDuration) {
        playbackLoopOffset += loopDuration;
        elapsed -= loopDuration;
        playbackCursor = 0;
      }

      while (
        playbackCursor < recordedBursts.length &&
        recordedBursts[playbackCursor].time - playbackWindowStart <= elapsed
      ) {
        const event = recordedBursts[playbackCursor];
        launchFirework(event.x, event.y, event.holdDuration, now - event.holdDuration, false);
        playbackCursor += 1;
      }
    }

    function beginPointer(pointerId, x, y) {
      if (activePointer.id !== null) {
        return;
      }
      const now = performance.now();
      const rocket = createRocket(x, y, 0, now);
      rockets.push(rocket);
      activePointer.id = pointerId;
      activePointer.downAt = now;
      activePointer.x = x;
      activePointer.y = y;
      activePointer.rocket = rocket;
    }

    function endPointer(pointerId) {
      if (activePointer.id !== pointerId || !activePointer.rocket) {
        return;
      }

      const now = performance.now();
      const holdDuration = clamp(now - activePointer.downAt, 50, 1500);
      const rocket = activePointer.rocket;
      rocket.holdDuration = holdDuration;
      rocket.launchTime = activePointer.downAt;
      rocket.burstY = lerp(height * 0.68, height * 0.16, clamp(holdDuration / 1200, 0, 1));
      rocket.profile = mapBurstProfile(activePointer.x, activePointer.y, holdDuration);
      rocket.trailHue = rocket.profile.glowHue;
      if (isRecording) {
        recordFireworkEvent(activePointer.downAt, activePointer.x, activePointer.y, holdDuration);
      }
      activePointer.id = null;
      activePointer.downAt = 0;
      activePointer.rocket = null;
    }

    function cancelPointer(pointerId) {
      if (activePointer.id !== pointerId || !activePointer.rocket) {
        return;
      }
      const rocketIndex = rockets.indexOf(activePointer.rocket);
      if (rocketIndex >= 0) {
        rockets.splice(rocketIndex, 1);
      }
      activePointer.id = null;
      activePointer.downAt = 0;
      activePointer.rocket = null;
    }

    function drawRocket(rocket) {
      ctx.strokeStyle = `hsla(${rocket.trailHue}, 100%, 78%, 0.9)`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(rocket.px, rocket.py);
      ctx.lineTo(rocket.x, rocket.y);
      ctx.stroke();

      ctx.fillStyle = `hsla(${rocket.trailHue}, 100%, 82%, 1)`;
      ctx.beginPath();
      ctx.arc(rocket.x, rocket.y, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }

    function updateRockets(dt, now) {
      for (let index = rockets.length - 1; index >= 0; index -= 1) {
        const rocket = rockets[index];
        rocket.px = rocket.x;
        rocket.py = rocket.y;

        if (activePointer.rocket === rocket && activePointer.id !== null) {
          const holdDuration = clamp(now - activePointer.downAt, 0, 1500);
          const holdRatio = clamp(holdDuration / 1200, 0, 1);
          rocket.vx *= 0.98;
          rocket.vy = lerp(-4.2, -9.4, holdRatio);
          rocket.burstY = lerp(height * 0.68, height * 0.16, holdRatio);
          rocket.profile = mapBurstProfile(activePointer.x, activePointer.y, holdDuration);
          rocket.trailHue = rocket.profile.glowHue;
        }

        rocket.x += rocket.vx * dt * 60;
        rocket.y += rocket.vy * dt * 60;
        rocket.vy += 0.012 * dt * 60;
        rocket.trailTimer += dt * 1000;

        while (rocket.trailTimer >= ROCKET_TRAIL_INTERVAL) {
          rocket.trailTimer -= ROCKET_TRAIL_INTERVAL;
          emitParticle({
            x: rocket.x,
            y: rocket.y,
            vx: rand(-0.18, 0.18),
            vy: rand(0.4, 1.2),
            life: rand(0.2, 0.5),
            drag: 0.92,
            gravity: -0.008,
            size: rand(1.1, 1.9),
            alpha: 0.55,
            color: `hsla(${rocket.trailHue}, 100%, 72%, 1)`,
            trail: 0.04,
            secondary: false
          });
        }

        drawRocket(rocket);

        if (rocket.y <= rocket.burstY || rocket.vy >= 0.2) {
          triggerBurst(rocket);
          rockets.splice(index, 1);
        }
      }
    }

    function updateParticles(dt) {
      for (const particle of particles) {
        if (!particle.active) {
          continue;
        }

        particle.px = particle.x;
        particle.py = particle.y;
        particle.x += particle.vx * dt * 60;
        particle.y += particle.vy * dt * 60;
        particle.vx *= particle.drag;
        particle.vy = particle.vy * particle.drag + particle.gravity * dt * 60;
        particle.age += dt;

        const lifeT = particle.age / particle.life;
        if (lifeT >= 1 || particle.y > height + 40) {
          deactivateParticle(particle);
          continue;
        }

        const alpha = (1 - lifeT) * particle.alpha;
        ctx.strokeStyle = particle.color.replace(", 1)", `, ${alpha * particle.trail})`);
        ctx.lineWidth = Math.max(1, particle.size * 0.55);
        ctx.beginPath();
        ctx.moveTo(particle.px, particle.py);
        ctx.lineTo(particle.x, particle.y);
        ctx.stroke();

        ctx.fillStyle = particle.color.replace(", 1)", `, ${alpha})`);
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size * (0.2 + (1 - lifeT) * 0.8), 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function renderBackground() {
      ctx.fillStyle = "rgba(2, 4, 10, 0.22)";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "rgba(8, 12, 28, 0.06)";
      for (let index = 0; index < 8; index += 1) {
        const y = (index / 8) * height;
        ctx.fillRect(0, y, width, 1);
      }
    }

    function animate(now) {
      const dt = Math.min(0.033, (now - lastFrameTime) / 1000);
      lastFrameTime = now;

      renderBackground();
      updatePlayback(now);
      updateRockets(dt, now);
      updateParticles(dt);
      particleCount.textContent = String(activeParticles);
      requestAnimationFrame(animate);
    }

    canvas.addEventListener("pointerdown", (event) => {
      canvas.setPointerCapture(event.pointerId);
      beginPointer(event.pointerId, event.clientX, event.clientY);
    });

    canvas.addEventListener("pointerup", (event) => {
      endPointer(event.pointerId);
    });

    canvas.addEventListener("pointercancel", (event) => {
      cancelPointer(event.pointerId);
    });

    recordButton.addEventListener("click", () => {
      toggleRecording();
    });

    playbackButton.addEventListener("click", () => {
      togglePlayback();
    });

    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    ctx.fillStyle = "rgb(2, 4, 10)";
    ctx.fillRect(0, 0, width, height);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
