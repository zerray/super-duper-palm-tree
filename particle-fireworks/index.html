<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>粒子烟花工坊</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #04070f;
      --panel: rgba(7, 11, 24, 0.82);
      --panel-strong: rgba(11, 17, 34, 0.95);
      --line: rgba(171, 208, 255, 0.16);
      --text: #eef4ff;
      --muted: #9aabca;
      --accent: #7ce7ff;
      --accent-strong: #ff9f68;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(37, 69, 130, 0.35), transparent 30%),
        radial-gradient(circle at 20% 80%, rgba(255, 106, 74, 0.14), transparent 22%),
        linear-gradient(180deg, #050813 0%, #02040a 100%);
      color: var(--text);
    }

    body {
      position: relative;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      cursor: crosshair;
    }

    .hud {
      position: fixed;
      inset: 16px 16px auto auto;
      width: min(340px, calc(100vw - 24px));
      max-height: calc(100vh - 32px);
      overflow: auto;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(12, 18, 36, 0.94), rgba(6, 11, 24, 0.88));
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
    }

    .hud h1,
    .hud p,
    .hud h2 {
      margin: 0;
    }

    .hud h1 {
      font-size: 1.45rem;
    }

    .lede,
    .hint,
    .stat-label {
      color: var(--muted);
    }

    .lede {
      margin-top: 8px;
      line-height: 1.5;
      font-size: 0.94rem;
    }

    .section {
      margin-top: 16px;
      display: grid;
      gap: 12px;
    }

    .row {
      display: grid;
      gap: 8px;
    }

    .row-inline {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    label,
    .toggle {
      display: grid;
      gap: 7px;
      font-size: 0.9rem;
    }

    input,
    select,
    button {
      width: 100%;
      border: 1px solid rgba(124, 231, 255, 0.18);
      border-radius: 12px;
      background: rgba(10, 15, 28, 0.92);
      color: var(--text);
      font: inherit;
    }

    input[type="color"] {
      min-height: 42px;
      padding: 4px;
      cursor: pointer;
    }

    input[type="range"] {
      accent-color: var(--accent);
    }

    select,
    button {
      padding: 10px 12px;
    }

    button {
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    button:hover,
    button:focus-visible,
    select:hover {
      border-color: rgba(124, 231, 255, 0.46);
      transform: translateY(-1px);
    }

    button.primary {
      background: linear-gradient(135deg, rgba(124, 231, 255, 0.18), rgba(255, 159, 104, 0.2));
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      padding: 10px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      min-height: 72px;
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-size: 1.1rem;
    }

    .hint {
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .record-active {
      border-color: rgba(255, 122, 122, 0.65);
      background: rgba(70, 16, 22, 0.92);
    }

    @media (max-width: 720px) {
      .hud {
        inset: auto 12px 12px 12px;
        width: auto;
        max-height: min(54vh, 420px);
        border-radius: 18px;
      }

      .row-inline,
      .stats {
        grid-template-columns: 1fr;
      }

      .hud h1 {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="fireworks-canvas"></canvas>

  <aside class="hud">
    <h1>粒子烟花工坊</h1>
    <p class="lede">点击或触摸任意位置发射烟花，调整形态与物理参数，录下最近 10 秒并让它循环表演。</p>

    <section class="section">
      <div class="row-inline">
        <label>
          颜色
          <input id="color-input" type="color" value="#ff7b72">
        </label>
        <label>
          爆炸形态
          <select id="shape-select">
            <option value="sphere">球形</option>
            <option value="heart">心形</option>
            <option value="spiral">螺旋</option>
          </select>
        </label>
      </div>

      <label>
        粒子数量 <span id="count-value">180</span>
        <input id="count-input" type="range" min="60" max="360" value="180">
      </label>

      <label>
        重力强度 <span id="gravity-value">0.080</span>
        <input id="gravity-input" type="range" min="0.02" max="0.16" step="0.005" value="0.08">
      </label>

      <label>
        拖尾长度 <span id="trail-value">0.14</span>
        <input id="trail-input" type="range" min="0.05" max="0.32" step="0.01" value="0.14">
      </label>
    </section>

    <section class="section">
      <div class="row-inline">
        <button id="random-button" class="primary" type="button">随机惊喜</button>
        <button id="record-button" type="button">开始录制</button>
      </div>
      <button id="playback-button" type="button">回放最近 10 秒</button>
    </section>

    <section class="section stats">
      <div class="stat">
        <span class="stat-label">当前粒子</span>
        <strong id="particle-stat">0</strong>
      </div>
      <div class="stat">
        <span class="stat-label">录制事件</span>
        <strong id="recording-stat">0</strong>
      </div>
      <div class="stat">
        <span class="stat-label">帧率</span>
        <strong id="fps-stat">0</strong>
      </div>
    </section>

    <p class="hint">录制始终只保留最近 10 秒。回放开启后会按原时间间隔循环触发烟花。移动端使用 Pointer 事件，无需额外交互模式。</p>
  </aside>

  <script>
    const canvas = document.getElementById("fireworks-canvas");
    const ctx = canvas.getContext("2d");
    const colorInput = document.getElementById("color-input");
    const shapeSelect = document.getElementById("shape-select");
    const countInput = document.getElementById("count-input");
    const gravityInput = document.getElementById("gravity-input");
    const trailInput = document.getElementById("trail-input");
    const randomButton = document.getElementById("random-button");
    const recordButton = document.getElementById("record-button");
    const playbackButton = document.getElementById("playback-button");
    const countValue = document.getElementById("count-value");
    const gravityValue = document.getElementById("gravity-value");
    const trailValue = document.getElementById("trail-value");
    const particleStat = document.getElementById("particle-stat");
    const recordingStat = document.getElementById("recording-stat");
    const fpsStat = document.getElementById("fps-stat");

    const MAX_PARTICLES = 2400;
    const TRAIL_STEPS = 3;
    const replayDurationMs = 10000;
    const shapeOptions = ["sphere", "heart", "spiral"];
    const palette = ["#ff7b72", "#ffd166", "#7ce7ff", "#b692ff", "#84f08b", "#ff8fab"];
    const particles = [];
    const rockets = [];
    const recordingEvents = [];

    let particleCursor = 0;
    let activeParticleCount = 0;
    let width = 0;
    let height = 0;
    let scale = 1;
    let isRecording = false;
    let isPlaybackActive = false;
    let playbackStartTime = 0;
    let playbackCursor = 0;
    let lastFrameTime = performance.now();
    let lastFpsSample = performance.now();
    let frameCounter = 0;
    let currentFps = 0;

    function createParticleSlot() {
      return {
        active: false,
        x: 0,
        y: 0,
        px: 0,
        py: 0,
        vx: 0,
        vy: 0,
        life: 0,
        maxLife: 0,
        size: 0,
        color: "#ffffff"
      };
    }

    for (let index = 0; index < MAX_PARTICLES; index += 1) {
      particles.push(createParticleSlot());
    }

    function resizeCanvas() {
      scale = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * scale);
      canvas.height = Math.floor(height * scale);
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
    }

    function getCurrentParams() {
      return {
        color: colorInput.value,
        shape: shapeSelect.value,
        particleCount: Number(countInput.value),
        gravity: Number(gravityInput.value),
        trail: Number(trailInput.value)
      };
    }

    function setControlValues(params) {
      colorInput.value = params.color;
      shapeSelect.value = params.shape;
      countInput.value = String(params.particleCount);
      gravityInput.value = String(params.gravity);
      trailInput.value = String(params.trail);
      updateLabels();
    }

    function updateLabels() {
      countValue.textContent = countInput.value;
      gravityValue.textContent = Number(gravityInput.value).toFixed(3);
      trailValue.textContent = Number(trailInput.value).toFixed(2);
    }

    function makeGlowColor(hex, alpha) {
      const red = Number.parseInt(hex.slice(1, 3), 16);
      const green = Number.parseInt(hex.slice(3, 5), 16);
      const blue = Number.parseInt(hex.slice(5, 7), 16);
      return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
    }

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function emitParticle(x, y, vx, vy, color, life, size) {
      const particle = particles[particleCursor];
      particleCursor = (particleCursor + 1) % MAX_PARTICLES;

      if (!particle.active) {
        activeParticleCount += 1;
      }

      particle.active = true;
      particle.x = x;
      particle.y = y;
      particle.px = x;
      particle.py = y;
      particle.vx = vx;
      particle.vy = vy;
      particle.life = life;
      particle.maxLife = life;
      particle.size = size;
      particle.color = color;
    }

    function computeVelocity(shape, index, total, speedScale) {
      if (shape === "heart") {
        const theta = (index / total) * Math.PI * 2;
        const x = 16 * Math.sin(theta) ** 3;
        const y = 13 * Math.cos(theta) - 5 * Math.cos(2 * theta) - 2 * Math.cos(3 * theta) - Math.cos(4 * theta);
        const wobble = randomBetween(0.82, 1.12);
        return {
          vx: x * 0.11 * speedScale * wobble,
          vy: -y * 0.11 * speedScale * wobble
        };
      }

      if (shape === "spiral") {
        const turn = index * 0.34;
        const radius = 0.18 + index / total;
        const velocity = speedScale * (0.6 + radius * 1.4);
        return {
          vx: Math.cos(turn) * velocity,
          vy: Math.sin(turn) * velocity
        };
      }

      const angle = Math.random() * Math.PI * 2;
      const velocity = speedScale * Math.sqrt(Math.random());
      return {
        vx: Math.cos(angle) * velocity,
        vy: Math.sin(angle) * velocity
      };
    }

    function createExplosion(x, y, params) {
      const speedScale = Math.max(1.8, 4.6 - params.gravity * 7);
      for (let index = 0; index < params.particleCount; index += 1) {
        const velocity = computeVelocity(params.shape, index, params.particleCount, speedScale);
        const tint = Math.random() < 0.24 ? palette[index % palette.length] : params.color;
        emitParticle(
          x,
          y,
          velocity.vx,
          velocity.vy,
          tint,
          randomBetween(0.85, 1.45),
          randomBetween(1.4, 3.4)
        );
      }

      for (let spark = 0; spark < 24; spark += 1) {
        const angle = (spark / 24) * Math.PI * 2;
        const speed = randomBetween(0.8, 2.1);
        emitParticle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, "#ffffff", 0.35, 1.1);
      }
    }

    function launchFirework(x, y, params, shouldRecord = true) {
      const targetY = Math.max(80, Math.min(y, height - 120));
      rockets.push({
        x,
        y: height + randomBetween(24, 90),
        px: x,
        py: height,
        vx: randomBetween(-0.28, 0.28),
        vy: -randomBetween(5.8, 7.5),
        burstY: targetY,
        color: params.color,
        params: { ...params }
      });

      if (shouldRecord && isRecording) {
        recordFireworkEvent(x, targetY, params);
      }
    }

    function recordFireworkEvent(x, y, params) {
      const now = performance.now();
      recordingEvents.push({
        timestamp: now,
        x,
        y,
        params: { ...params }
      });
      trimRecordingEvents(now);
      recordingStat.textContent = String(recordingEvents.length);
    }

    function trimRecordingEvents(now) {
      while (recordingEvents.length && now - recordingEvents[0].timestamp > replayDurationMs) {
        recordingEvents.shift();
      }
    }

    function randomizeSurprise(launchNow = true) {
      const randomParams = {
        color: palette[Math.floor(Math.random() * palette.length)],
        shape: shapeOptions[Math.floor(Math.random() * shapeOptions.length)],
        particleCount: Math.floor(randomBetween(90, 320)),
        gravity: Number(randomBetween(0.03, 0.14).toFixed(3)),
        trail: Number(randomBetween(0.06, 0.24).toFixed(2))
      };
      setControlValues(randomParams);

      if (launchNow) {
        launchFirework(
          randomBetween(width * 0.18, width * 0.82),
          randomBetween(height * 0.16, height * 0.62),
          randomParams
        );
      }
    }

    function toggleRecording() {
      isRecording = !isRecording;
      recordButton.textContent = isRecording ? "停止录制" : "开始录制";
      recordButton.classList.toggle("record-active", isRecording);
      if (isRecording) {
        trimRecordingEvents(performance.now());
      }
    }

    function togglePlayback() {
      isPlaybackActive = !isPlaybackActive;
      playbackButton.textContent = isPlaybackActive ? "停止回放" : "回放最近 10 秒";

      if (isPlaybackActive) {
        playbackStartTime = performance.now();
        playbackCursor = 0;
      }
    }

    function updatePlayback(now) {
      if (!isPlaybackActive || recordingEvents.length === 0) {
        return;
      }

      const firstTimestamp = recordingEvents[0].timestamp;
      const loopDuration = Math.max(recordingEvents[recordingEvents.length - 1].timestamp - firstTimestamp, 400);
      const elapsed = (now - playbackStartTime) % loopDuration;

      while (playbackCursor < recordingEvents.length) {
        const event = recordingEvents[playbackCursor];
        const offset = event.timestamp - firstTimestamp;
        if (offset > elapsed) {
          break;
        }
        launchFirework(event.x, event.y, event.params, false);
        playbackCursor += 1;
      }

      if (elapsed < 24 && playbackCursor >= recordingEvents.length) {
        playbackCursor = 0;
      }
    }

    function updateRockets(deltaSeconds) {
      for (let index = rockets.length - 1; index >= 0; index -= 1) {
        const rocket = rockets[index];
        rocket.px = rocket.x;
        rocket.py = rocket.y;
        rocket.x += rocket.vx * deltaSeconds * 60;
        rocket.y += rocket.vy * deltaSeconds * 60;
        rocket.vy += 0.03 * deltaSeconds * 60;

        emitParticle(
          rocket.x,
          rocket.y,
          randomBetween(-0.12, 0.12),
          randomBetween(0.18, 0.65),
          rocket.color,
          0.22,
          randomBetween(1, 1.8)
        );

        if (rocket.vy >= -0.2 || rocket.y <= rocket.burstY) {
          createExplosion(rocket.x, rocket.y, rocket.params);
          rockets.splice(index, 1);
        }
      }
    }

    function updateParticles(deltaSeconds) {
      const gravity = Number(gravityInput.value) * deltaSeconds * 60;
      const drag = 0.992 ** (deltaSeconds * 60);

      for (const particle of particles) {
        if (!particle.active) {
          continue;
        }

        particle.px = particle.x;
        particle.py = particle.y;
        particle.vx *= drag;
        particle.vy = particle.vy * drag + gravity;
        particle.x += particle.vx * deltaSeconds * 60;
        particle.y += particle.vy * deltaSeconds * 60;
        particle.life -= deltaSeconds;

        if (particle.life <= 0 || particle.y > height + 30) {
          particle.active = false;
          activeParticleCount -= 1;
        }
      }
    }

    function drawScene() {
      ctx.fillStyle = `rgba(2, 4, 10, ${Number(trailInput.value)})`;
      ctx.fillRect(0, 0, width, height);

      for (const particle of particles) {
        if (!particle.active) {
          continue;
        }

        const alpha = Math.max(0, particle.life / particle.maxLife);
        ctx.strokeStyle = makeGlowColor(particle.color, alpha * 0.45);
        ctx.lineWidth = Math.max(1, particle.size * 0.9);
        ctx.beginPath();
        ctx.moveTo(particle.px, particle.py);
        ctx.lineTo(particle.x, particle.y);
        ctx.stroke();

        ctx.fillStyle = makeGlowColor(particle.color, alpha);
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const rocket of rockets) {
        for (let step = 0; step < TRAIL_STEPS; step += 1) {
          const mix = step / TRAIL_STEPS;
          const px = rocket.x * (1 - mix) + rocket.px * mix;
          const py = rocket.y * (1 - mix) + rocket.py * mix;
          ctx.fillStyle = makeGlowColor(rocket.color, 0.9 - mix * 0.28);
          ctx.beginPath();
          ctx.arc(px, py, 2.2 - mix * 0.4, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function syncStats(now) {
      particleStat.textContent = String(activeParticleCount);
      recordingStat.textContent = String(recordingEvents.length);

      frameCounter += 1;
      if (now - lastFpsSample >= 400) {
        currentFps = Math.round((frameCounter * 1000) / (now - lastFpsSample));
        frameCounter = 0;
        lastFpsSample = now;
        fpsStat.textContent = String(currentFps);
      }
    }

    function animate(now) {
      const deltaSeconds = Math.min(0.032, (now - lastFrameTime) / 1000 || 0.016);
      lastFrameTime = now;
      updatePlayback(now);
      updateRockets(deltaSeconds);
      updateParticles(deltaSeconds);
      drawScene();
      syncStats(now);
      requestAnimationFrame(animate);
    }

    function handlePointerLaunch(event) {
      const params = getCurrentParams();
      launchFirework(event.clientX, event.clientY, params);
    }

    function bindControls() {
      countInput.addEventListener("input", updateLabels);
      gravityInput.addEventListener("input", updateLabels);
      trailInput.addEventListener("input", updateLabels);
      randomButton.addEventListener("click", () => randomizeSurprise(true));
      recordButton.addEventListener("click", toggleRecording);
      playbackButton.addEventListener("click", togglePlayback);
      canvas.addEventListener("pointerdown", handlePointerLaunch);
      window.addEventListener("resize", resizeCanvas);
    }

    updateLabels();
    resizeCanvas();
    bindControls();
    randomizeSurprise(false);
    ctx.fillStyle = "rgba(2, 4, 10, 1)";
    ctx.fillRect(0, 0, width, height);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
