<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节奏涂鸦接力</title>
  <style>
    :root {
      --bg: #f7eedc;
      --panel: rgba(255, 251, 245, 0.92);
      --line: rgba(83, 57, 32, 0.14);
      --text: #2d2017;
      --muted: #6e5c4c;
      --accent: #e56a45;
      --accent-soft: rgba(229, 106, 69, 0.14);
      --shadow: 0 24px 56px rgba(59, 39, 21, 0.14);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 26%),
        radial-gradient(circle at top right, rgba(229, 106, 69, 0.16), transparent 28%),
        linear-gradient(180deg, #f5e8cf 0%, var(--bg) 42%, #efe1cf 100%);
    }

    button,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .page {
      width: min(1120px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 20px 0 32px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 32px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero,
    .setup,
    .shell {
      padding: 24px;
    }

    .hero {
      display: grid;
      gap: 14px;
    }

    .chip,
    .metric,
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
    }

    h1,
    h2 {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", serif;
      letter-spacing: -0.04em;
    }

    h1 {
      font-size: clamp(2.6rem, 6vw, 4.6rem);
      line-height: 0.92;
      max-width: 8ch;
    }

    p {
      margin: 0;
    }

    .lede,
    .subtle,
    .results-note {
      color: var(--muted);
      line-height: 1.6;
    }

    .setup {
      display: grid;
      gap: 14px;
      border-top: 1px solid var(--line);
    }

    .setup-row,
    .hud,
    .legend,
    .actions,
    .result-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    select,
    button {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 11px 16px;
      color: var(--text);
      background: #fffaf4;
      transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
    }

    button:hover,
    select:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(59, 39, 21, 0.08);
      border-color: rgba(229, 106, 69, 0.35);
    }

    .primary {
      background: var(--accent);
      color: #fff9f4;
      border-color: transparent;
      font-weight: 700;
    }

    .shell {
      display: grid;
      gap: 16px;
      border-top: 1px solid var(--line);
    }

    .hud {
      justify-content: space-between;
    }

    .hud-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    .beat-board {
      display: grid;
      gap: 16px;
      align-items: center;
      grid-template-columns: minmax(0, 1fr) 100px;
    }

    .beat-strip {
      display: grid;
      grid-template-columns: repeat(16, minmax(0, 1fr));
      gap: 8px;
    }

    .beat-cell {
      height: 18px;
      border-radius: 999px;
      background: rgba(104, 80, 53, 0.12);
      transition: transform 140ms ease, background 140ms ease, opacity 140ms ease;
      opacity: 0.5;
    }

    .beat-cell.current {
      background: var(--beat-color, var(--accent));
      opacity: 1;
      transform: scaleY(1.35);
    }

    .beat-cell.done {
      background: rgba(104, 80, 53, 0.28);
      opacity: 0.9;
    }

    .pulse-shell {
      display: grid;
      place-items: center;
      width: 100px;
      height: 100px;
      justify-self: end;
    }

    .pulse-core {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--beat-color, rgba(229, 106, 69, 0.9)) 0%, rgba(229, 106, 69, 0.14) 68%, transparent 74%);
      transform: scale(0.76);
      opacity: 0.28;
      transition: transform 140ms ease, opacity 140ms ease, background 140ms ease;
    }

    .pulse-core.active {
      opacity: 1;
      transform: scale(1.2);
    }

    .legend {
      color: var(--muted);
    }

    .canvas-wrap {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(250, 246, 241, 0.94)),
        repeating-linear-gradient(90deg, rgba(83, 57, 32, 0.04) 0, rgba(83, 57, 32, 0.04) 1px, transparent 1px, transparent 28px),
        repeating-linear-gradient(0deg, rgba(83, 57, 32, 0.04) 0, rgba(83, 57, 32, 0.04) 1px, transparent 1px, transparent 28px);
    }

    canvas {
      display: block;
      width: 100%;
      height: min(68vw, 640px);
      touch-action: none;
      cursor: crosshair;
    }

    .overlay,
    .results {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(31, 22, 16, 0.2);
    }

    .overlay[hidden],
    .results[hidden] {
      display: none;
    }

    .overlay-card,
    .results-card {
      width: min(92%, 560px);
      padding: 24px 26px;
      border-radius: 28px;
      text-align: center;
      color: #fff8f3;
      background: rgba(33, 24, 19, 0.84);
      box-shadow: 0 24px 48px rgba(18, 10, 6, 0.22);
      backdrop-filter: blur(8px);
    }

    .overlay-card h2,
    .results-card h2 {
      font-size: clamp(2rem, 5vw, 3.1rem);
      line-height: 0.92;
    }

    .overlay-card p,
    .results-card p {
      margin-top: 10px;
      color: rgba(255, 248, 243, 0.82);
      line-height: 1.6;
    }

    .results-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 18px;
    }

    .results-stat {
      min-width: 132px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .results-stat strong {
      display: block;
      font-size: 1.2rem;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100vw - 12px, 1120px);
      }

      .hero,
      .setup,
      .shell {
        padding-left: 16px;
        padding-right: 16px;
      }

      .beat-board {
        grid-template-columns: 1fr;
      }

      .pulse-shell {
        justify-self: start;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <header class="hero">
        <div class="chip">Creative Toy</div>
        <h1>节奏涂鸦接力</h1>
        <p class="lede">跟着 16 拍节奏，在同一张画布上合作留下随机色彩的笔触。单人可独自完成整幅涂鸦，双人模式会在第 8 拍后自动切换画手。</p>
      </header>

      <section class="setup" id="setup-screen">
        <div class="setup-row">
          <label for="mode-select">模式</label>
          <select id="mode-select">
            <option value="1">单人 16 拍</option>
            <option value="2">双人热座 8 + 8 拍</option>
          </select>

          <label for="speed-select">速度</label>
          <select id="speed-select">
            <option value="84">慢</option>
            <option value="112" selected>中</option>
            <option value="144">快</option>
          </select>

          <button class="primary" id="start-button" type="button">开始创作</button>
        </div>
        <p class="subtle">每拍都会切换颜色，并根据节拍强弱改变笔触粗细。使用鼠标或触屏拖动画布即可作画，结束后可下载 PNG 或重新开始。</p>
      </section>

      <section class="shell">
        <div class="hud">
          <div class="hud-group">
            <div class="metric" id="mode-label">模式：未开始</div>
            <div class="metric" id="player-label">当前画手：玩家 1</div>
          </div>
          <div class="hud-group">
            <div class="metric" id="beat-label">第 0 / 16 拍</div>
            <div class="metric" id="brush-label">笔触：0 px</div>
          </div>
        </div>

        <div class="beat-board">
          <div class="beat-strip" id="beat-strip" aria-label="节拍条"></div>
          <div class="pulse-shell" aria-hidden="true">
            <div class="pulse-core" id="pulse-core"></div>
          </div>
        </div>

        <div class="legend">
          <div class="legend-item"><span class="swatch" id="color-swatch"></span><span id="color-label">当前颜色：等待开始</span></div>
          <div class="legend-item" id="status-label">状态：选择模式与速度后开始</div>
        </div>

        <div class="canvas-wrap">
          <canvas id="paint-canvas" width="960" height="640" aria-label="节奏涂鸦画布"></canvas>

          <div class="overlay" id="turn-overlay">
            <div class="overlay-card">
              <h2 id="overlay-title">准备好开始</h2>
              <p id="overlay-note">选择单人或双人模式，再按下开始创作。</p>
            </div>
          </div>

          <div class="results" id="results-overlay" hidden>
            <div class="results-card">
              <h2>作品完成</h2>
              <p class="results-note" id="results-note">16 拍结束，这张节奏涂鸦已经可以保存。</p>
              <div class="results-stats" id="results-stats"></div>
              <div class="result-actions" style="justify-content:center;margin-top:18px;">
                <button class="primary" id="download-button" type="button">下载 PNG</button>
                <button id="restart-button" type="button">重新开始</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const totalBeats = 16;
    const beatsPerPlayer = 8;
    const beatPalette = [
      "#f05c52",
      "#f59d2f",
      "#f1d54d",
      "#6ecb63",
      "#2dbecf",
      "#4d78ff",
      "#8257e6",
      "#f25cb1"
    ];
    const bpmOptions = {
      slow: 84,
      medium: 112,
      fast: 144
    };

    const beatStrip = document.getElementById("beat-strip");
    const canvas = document.getElementById("paint-canvas");
    const ctx = canvas.getContext("2d");
    const modeSelect = document.getElementById("mode-select");
    const speedSelect = document.getElementById("speed-select");
    const startButton = document.getElementById("start-button");
    const modeLabel = document.getElementById("mode-label");
    const playerLabel = document.getElementById("player-label");
    const beatLabel = document.getElementById("beat-label");
    const brushLabel = document.getElementById("brush-label");
    const colorSwatch = document.getElementById("color-swatch");
    const colorLabel = document.getElementById("color-label");
    const statusLabel = document.getElementById("status-label");
    const pulseCore = document.getElementById("pulse-core");
    const turnOverlay = document.getElementById("turn-overlay");
    const overlayTitle = document.getElementById("overlay-title");
    const overlayNote = document.getElementById("overlay-note");
    const resultsOverlay = document.getElementById("results-overlay");
    const resultsStats = document.getElementById("results-stats");
    const resultsNote = document.getElementById("results-note");
    const downloadButton = document.getElementById("download-button");
    const restartButton = document.getElementById("restart-button");

    let intervalId = 0;
    let pulseTimeoutId = 0;
    let gameMode = 1;
    let bpm = 112;
    let beatMs = Math.round(60000 / bpm);
    let currentBeat = -1;
    let currentPlayer = 1;
    let currentColor = beatPalette[0];
    let currentBrushSize = 10;
    let phase = "idle";
    let isPointerDown = false;
    let lastPoint = null;
    let playerMarks = [0, 0];

    function createBeatCells() {
      beatStrip.innerHTML = "";
      for (let index = 0; index < totalBeats; index += 1) {
        const cell = document.createElement("div");
        cell.className = "beat-cell";
        cell.dataset.index = String(index);
        beatStrip.appendChild(cell);
      }
    }

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#fffaf5";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function getCurrentColor(beatIndex) {
      return beatPalette[beatIndex % beatPalette.length];
    }

    function getCurrentBrushSize(beatIndex) {
      const phaseStrength = (Math.sin((beatIndex / 4) * Math.PI - Math.PI / 2) + 1) / 2;
      return 6 + phaseStrength * 16;
    }

    function updateBeatStrip() {
      const cells = beatStrip.children;
      for (let index = 0; index < cells.length; index += 1) {
        const cell = cells[index];
        cell.classList.toggle("done", index < currentBeat);
        cell.classList.toggle("current", index === currentBeat);
        if (index === currentBeat) {
          cell.style.setProperty("--beat-color", currentColor);
        }
      }
    }

    function updateHud() {
      const modeText = gameMode === 2 ? "双人热座" : "单人创作";
      modeLabel.textContent = `模式：${modeText}`;
      playerLabel.textContent = `当前画手：玩家 ${currentPlayer}`;
      beatLabel.textContent = `第 ${Math.max(currentBeat + 1, 0)} / ${totalBeats} 拍`;
      brushLabel.textContent = `笔触：${Math.round(currentBrushSize)} px`;
      colorSwatch.style.background = currentColor;
      colorLabel.textContent = `当前颜色：${currentColor}`;
      const statusText =
        phase === "playing" ? "状态：跟拍涂鸦中" :
        phase === "switching" ? "状态：切换画手中" :
        phase === "finished" ? "状态：作品完成" :
        "状态：选择模式与速度后开始";
      statusLabel.textContent = statusText;
    }

    function setOverlay(title, note, hidden) {
      overlayTitle.textContent = title;
      overlayNote.textContent = note;
      turnOverlay.hidden = hidden;
    }

    function triggerPulse() {
      pulseCore.style.setProperty("--beat-color", currentColor);
      pulseCore.classList.add("active");
      window.clearTimeout(pulseTimeoutId);
      pulseTimeoutId = window.setTimeout(() => pulseCore.classList.remove("active"), Math.min(220, beatMs * 0.45));
    }

    function stopLoop() {
      window.clearInterval(intervalId);
      intervalId = 0;
      window.clearTimeout(pulseTimeoutId);
      pulseCore.classList.remove("active");
    }

    function resetGame() {
      stopLoop();
      gameMode = Number(modeSelect.value);
      bpm = Number(speedSelect.value);
      beatMs = Math.round(60000 / bpm);
      currentBeat = -1;
      currentPlayer = 1;
      currentColor = beatPalette[0];
      currentBrushSize = 10;
      phase = "idle";
      isPointerDown = false;
      lastPoint = null;
      playerMarks = [0, 0];
      resultsOverlay.hidden = true;
      setOverlay("准备好开始", "选择单人或双人模式，再按下开始创作。", false);
      updateBeatStrip();
      updateHud();
      clearCanvas();
    }

    function pauseForPlayerSwitch() {
      phase = "switching";
      currentPlayer = 2;
      updateHud();
      setOverlay("玩家 2 接棒", "前 8 拍结束，1.2 秒后自动进入后半段。", false);
      window.setTimeout(() => {
        if (phase !== "switching") {
          return;
        }
        phase = "playing";
        setOverlay("", "", true);
        updateHud();
      }, 1200);
    }

    function renderResults() {
      resultsStats.innerHTML = "";
      const participantCount = gameMode === 2 ? 2 : 1;
      for (let index = 0; index < participantCount; index += 1) {
        const card = document.createElement("div");
        card.className = "results-stat";
        card.innerHTML = `<strong>玩家 ${index + 1}</strong><span>${playerMarks[index]} 笔</span>`;
        resultsStats.appendChild(card);
      }
      resultsNote.textContent = gameMode === 2
        ? "双人 16 拍合作完成，点击下载 PNG 保存这张接力涂鸦。"
        : "单人 16 拍创作完成，点击下载 PNG 保存这张节奏作品。";
    }

    function finishGame() {
      stopLoop();
      phase = "finished";
      updateHud();
      setOverlay("16 拍完成", "最终作品已经固定，可以下载 PNG 或重新开始。", false);
      renderResults();
      resultsOverlay.hidden = false;
    }

    function advanceBeat() {
      currentBeat += 1;

      if (currentBeat >= totalBeats) {
        finishGame();
        return;
      }

      currentColor = getCurrentColor(currentBeat);
      currentBrushSize = getCurrentBrushSize(currentBeat);
      if (gameMode === 2 && currentBeat >= beatsPerPlayer) {
        currentPlayer = 2;
      }

      updateBeatStrip();
      updateHud();
      triggerPulse();

      if (gameMode === 2 && currentBeat === beatsPerPlayer) {
        pauseForPlayerSwitch();
      }
    }

    function startGame() {
      resetGame();
      phase = "playing";
      const speedName =
        bpm === bpmOptions.slow ? "慢" :
        bpm === bpmOptions.fast ? "快" :
        "中";
      setOverlay(
        gameMode === 2 ? "玩家 1 先画" : "单人开始",
        `${speedName}速 ${bpm} BPM，跟着每一拍拖动画布。`,
        false
      );
      updateHud();
      window.setTimeout(() => {
        if (phase !== "playing") {
          return;
        }
        setOverlay("", "", true);
      }, 900);
      advanceBeat();
      intervalId = window.setInterval(advanceBeat, beatMs);
    }

    function canDraw() {
      return phase === "playing";
    }

    function getCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * (canvas.width / rect.width),
        y: (event.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function drawSegment(from, to) {
      ctx.save();
      ctx.strokeStyle = currentColor;
      ctx.lineWidth = currentBrushSize;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.stroke();
      ctx.restore();
    }

    function handlePointerDown(event) {
      if (!canDraw()) {
        return;
      }
      event.preventDefault();
      isPointerDown = true;
      lastPoint = getCanvasPoint(event);
      playerMarks[currentPlayer - 1] += 1;
      canvas.setPointerCapture(event.pointerId);
      drawSegment(lastPoint, { x: lastPoint.x + 0.01, y: lastPoint.y + 0.01 });
    }

    function handlePointerMove(event) {
      if (!isPointerDown || !canDraw()) {
        return;
      }
      event.preventDefault();
      const nextPoint = getCanvasPoint(event);
      drawSegment(lastPoint, nextPoint);
      lastPoint = nextPoint;
    }

    function endStroke(event) {
      if (!isPointerDown) {
        return;
      }
      if (event) {
        event.preventDefault();
      }
      isPointerDown = false;
      lastPoint = null;
    }

    function downloadImage() {
      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/png");
      link.download = "rhythm-doodle-relay.png";
      link.click();
    }

    createBeatCells();
    resetGame();

    startButton.addEventListener("click", startGame);
    restartButton.addEventListener("click", resetGame);
    downloadButton.addEventListener("click", downloadImage);
    canvas.addEventListener("pointerdown", handlePointerDown);
    canvas.addEventListener("pointermove", handlePointerMove);
    canvas.addEventListener("pointerup", endStroke);
    canvas.addEventListener("pointercancel", endStroke);
    canvas.addEventListener("pointerleave", endStroke);
  </script>
</body>
</html>
