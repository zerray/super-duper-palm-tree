<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节奏涂鸦接力</title>
  <style>
    :root {
      --bg: #101522;
      --panel: rgba(15, 22, 35, 0.86);
      --panel-strong: rgba(12, 17, 28, 0.96);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f4f7ff;
      --muted: #a8b2cb;
      --accent: #7cf6d5;
      --player-one: #7cf6d5;
      --player-two: #ff6ba8;
      --scan: rgba(255, 232, 140, 0.26);
      --shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124, 246, 213, 0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(255, 107, 168, 0.18), transparent 26%),
        linear-gradient(180deg, #131a2b 0%, #0b101b 48%, #060910 100%);
    }

    button,
    input {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1100px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 20px 0 32px;
      display: grid;
      gap: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .hero,
    .controls,
    .stage {
      padding: 20px;
    }

    .hero {
      display: grid;
      gap: 12px;
    }

    .hero h1,
    .hero p,
    .status,
    .legend,
    .hint {
      margin: 0;
    }

    .hero h1 {
      font-size: clamp(2.4rem, 5vw, 4rem);
      line-height: 0.92;
      max-width: 7ch;
      letter-spacing: -0.04em;
    }

    .chip,
    .metric,
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
    }

    .hero-copy,
    .hint {
      color: var(--muted);
      line-height: 1.6;
    }

    .controls {
      display: grid;
      gap: 14px;
      border-top: 1px solid var(--line);
    }

    .row,
    .legend,
    .status {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .row {
      justify-content: space-between;
    }

    .buttons,
    .tempo-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button,
    input[type="range"] {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    button {
      padding: 11px 16px;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.14);
    }

    .primary {
      background: linear-gradient(135deg, rgba(124, 246, 213, 0.3), rgba(77, 167, 255, 0.32));
      font-weight: 700;
    }

    .secondary {
      background: linear-gradient(135deg, rgba(255, 107, 168, 0.24), rgba(255, 170, 98, 0.24));
    }

    .status {
      justify-content: space-between;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18);
    }

    .stage {
      border-top: 1px solid var(--line);
      display: grid;
      gap: 12px;
    }

    .canvas-shell {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
    }

    canvas {
      display: block;
      width: 100%;
      height: min(78vw, 720px);
      touch-action: none;
      cursor: crosshair;
    }

    .tempo-wrap label {
      color: var(--muted);
    }

    .tempo-value {
      min-width: 66px;
      text-align: right;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 760px) {
      .app {
        width: min(100vw - 12px, 1100px);
      }

      .hero,
      .controls,
      .stage {
        padding: 16px;
      }

      .row,
      .status {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <header class="hero">
        <div class="chip">Creative Toy</div>
        <h1>节奏涂鸦接力</h1>
        <p class="hero-copy">在 16×16 网格上画线，把颜色与位置直接变成音符。播放时扫描线会从左到右逐列经过，双人热座模式下两位玩家共用一张画布，用不同颜色与音色一起完成合奏。</p>
      </header>

      <section class="controls">
        <div class="row">
          <div class="buttons">
            <button class="primary" id="play-button" type="button">播放</button>
            <button id="replay-button" type="button">重新播放</button>
            <button class="secondary" id="switch-player-button" type="button">切换到玩家 2</button>
            <button id="clear-button" type="button">清除画布</button>
          </div>

          <div class="tempo-wrap">
            <label for="tempo-control">速度</label>
            <input id="tempo-control" type="range" min="72" max="180" value="108" step="6">
            <span class="tempo-value" id="tempo-value">108 BPM</span>
          </div>
        </div>

        <div class="status">
          <div class="metric" id="player-indicator">当前玩家：玩家 1</div>
          <div class="metric" id="playback-indicator">状态：待机</div>
          <div class="metric" id="scan-indicator">扫描列：-</div>
        </div>

        <div class="legend">
          <div class="legend-item"><span class="swatch" style="background: var(--player-one);"></span>玩家 1：青绿色 / 正弦波</div>
          <div class="legend-item"><span class="swatch" style="background: var(--player-two);"></span>玩家 2：洋红色 / 方波</div>
        </div>

        <p class="hint">按住鼠标或触摸拖拽即可绘制。再次划过已点亮的格子不会抹除，清空请用“清除画布”。</p>
      </section>

      <section class="stage">
        <div class="canvas-shell">
          <canvas id="grid-canvas" width="800" height="800" aria-label="16乘16节奏网格画布"></canvas>
        </div>
      </section>
    </section>
  </main>

  <script>
    const gridSize = 16;
    const steps = 16;
    const playerStyles = {
      1: { color: "#7cf6d5", wave: "sine" },
      2: { color: "#ff6ba8", wave: "square" }
    };
    const pentatonicSemitones = [0, 2, 4, 7, 9];
    const grid = Array.from({ length: gridSize }, () => Array.from({ length: steps }, () => 0));

    const canvas = document.getElementById("grid-canvas");
    const context = canvas.getContext("2d");
    const playButton = document.getElementById("play-button");
    const replayButton = document.getElementById("replay-button");
    const switchPlayerButton = document.getElementById("switch-player-button");
    const clearButton = document.getElementById("clear-button");
    const tempoControl = document.getElementById("tempo-control");
    const tempoValue = document.getElementById("tempo-value");
    const playerIndicator = document.getElementById("player-indicator");
    const playbackIndicator = document.getElementById("playback-indicator");
    const scanIndicator = document.getElementById("scan-indicator");

    let currentPlayer = 1;
    let isPointerDown = false;
    let isPlaying = false;
    let currentScanColumn = -1;
    let playbackTimer = 0;
    let audioContext = null;

    function getCellSize() {
      return canvas.width / gridSize;
    }

    function getFrequencyForRow(row) {
      const noteIndex = gridSize - 1 - row;
      const octave = Math.floor(noteIndex / pentatonicSemitones.length);
      const scaleIndex = noteIndex % pentatonicSemitones.length;
      const midi = 48 + octave * 12 + pentatonicSemitones[scaleIndex];
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function ensureAudioContext() {
      if (audioContext) {
        return audioContext;
      }
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        return null;
      }
      audioContext = new AudioContextClass();
      return audioContext;
    }

    async function unlockAudio() {
      const instance = ensureAudioContext();
      if (!instance) {
        return null;
      }
      if (instance.state === "suspended") {
        await instance.resume();
      }
      return instance;
    }

    function paintCell(row, column, player) {
      if (row < 0 || row >= gridSize || column < 0 || column >= steps) {
        return false;
      }
      if (grid[row][column] === player) {
        return false;
      }
      grid[row][column] = player;
      drawGrid();
      return true;
    }

    function getGridPosition(clientX, clientY) {
      const bounds = canvas.getBoundingClientRect();
      const scaleX = canvas.width / bounds.width;
      const scaleY = canvas.height / bounds.height;
      const x = (clientX - bounds.left) * scaleX;
      const y = (clientY - bounds.top) * scaleY;
      const size = getCellSize();
      return {
        column: Math.max(0, Math.min(steps - 1, Math.floor(x / size))),
        row: Math.max(0, Math.min(gridSize - 1, Math.floor(y / size)))
      };
    }

    function drawGrid() {
      const cellSize = getCellSize();
      context.clearRect(0, 0, canvas.width, canvas.height);

      context.fillStyle = "#0b1120";
      context.fillRect(0, 0, canvas.width, canvas.height);

      if (currentScanColumn >= 0) {
        context.fillStyle = "rgba(255, 232, 140, 0.26)";
        context.fillRect(currentScanColumn * cellSize, 0, cellSize, canvas.height);
      }

      for (let row = 0; row < gridSize; row += 1) {
        for (let column = 0; column < steps; column += 1) {
          const owner = grid[row][column];
          const x = column * cellSize;
          const y = row * cellSize;

          context.fillStyle = owner ? "rgba(255, 255, 255, 0.06)" : "rgba(255, 255, 255, 0.03)";
          context.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);

          if (owner) {
            context.fillStyle = playerStyles[owner].color;
            context.fillRect(x + 4, y + 4, cellSize - 8, cellSize - 8);
          }
        }
      }

      context.strokeStyle = "rgba(255, 255, 255, 0.12)";
      context.lineWidth = 1;
      for (let index = 0; index <= gridSize; index += 1) {
        const offset = Math.round(index * cellSize) + 0.5;
        context.beginPath();
        context.moveTo(0, offset);
        context.lineTo(canvas.width, offset);
        context.stroke();

        context.beginPath();
        context.moveTo(offset, 0);
        context.lineTo(offset, canvas.height);
        context.stroke();
      }
    }

    function updateHud() {
      playerIndicator.textContent = `当前玩家：玩家 ${currentPlayer}`;
      playbackIndicator.textContent = isPlaying ? "状态：播放中" : "状态：待机";
      scanIndicator.textContent = currentScanColumn >= 0 ? `扫描列：${currentScanColumn + 1} / ${steps}` : "扫描列：-";
      switchPlayerButton.textContent = currentPlayer === 1 ? "切换到玩家 2" : "切换到玩家 1";
      tempoValue.textContent = `${tempoControl.value} BPM`;
    }

    function triggerColumn(column) {
      const instance = audioContext;
      if (!instance) {
        return;
      }

      const now = instance.currentTime;
      const duration = 60 / Number(tempoControl.value) * 0.75;

      for (let row = 0; row < gridSize; row += 1) {
        const owner = grid[row][column];
        if (!owner) {
          continue;
        }

        const oscillator = instance.createOscillator();
        const gainNode = instance.createGain();
        oscillator.type = playerStyles[owner].wave;
        oscillator.frequency.setValueAtTime(getFrequencyForRow(row), now);

        const velocity = owner === 1 ? 0.16 : 0.12;
        gainNode.gain.setValueAtTime(0.0001, now);
        gainNode.gain.exponentialRampToValueAtTime(velocity, now + 0.02);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        oscillator.connect(gainNode);
        gainNode.connect(instance.destination);
        oscillator.start(now);
        oscillator.stop(now + duration + 0.03);
      }
    }

    function stopPlayback(resetColumn) {
      if (playbackTimer) {
        window.clearInterval(playbackTimer);
        playbackTimer = 0;
      }
      isPlaying = false;
      currentScanColumn = resetColumn ? -1 : currentScanColumn;
      drawGrid();
      updateHud();
    }

    async function startPlayback(fromBeginning) {
      const instance = await unlockAudio();
      if (!instance) {
        playbackIndicator.textContent = "状态：当前浏览器不支持 Web Audio";
        return;
      }

      stopPlayback(false);
      isPlaying = true;
      currentScanColumn = fromBeginning ? 0 : Math.max(0, currentScanColumn);
      drawGrid();
      updateHud();
      triggerColumn(currentScanColumn);

      const stepMs = Math.round(60000 / Number(tempoControl.value));
      playbackTimer = window.setInterval(() => {
        currentScanColumn += 1;
        if (currentScanColumn >= steps) {
          stopPlayback(true);
          return;
        }
        drawGrid();
        updateHud();
        triggerColumn(currentScanColumn);
      }, stepMs);
    }

    function clearGrid() {
      for (let row = 0; row < gridSize; row += 1) {
        for (let column = 0; column < steps; column += 1) {
          grid[row][column] = 0;
        }
      }
      stopPlayback(true);
      drawGrid();
    }

    function handlePointer(event) {
      const position = getGridPosition(event.clientX, event.clientY);
      paintCell(position.row, position.column, currentPlayer);
    }

    canvas.addEventListener("pointerdown", (event) => {
      isPointerDown = true;
      canvas.setPointerCapture(event.pointerId);
      handlePointer(event);
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!isPointerDown) {
        return;
      }
      handlePointer(event);
    });

    function endPointer(event) {
      isPointerDown = false;
      if (canvas.hasPointerCapture(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }
    }

    canvas.addEventListener("pointerup", endPointer);
    canvas.addEventListener("pointercancel", endPointer);
    canvas.addEventListener("pointerleave", () => {
      isPointerDown = false;
    });

    switchPlayerButton.addEventListener("click", () => {
      currentPlayer = currentPlayer === 1 ? 2 : 1;
      updateHud();
    });

    clearButton.addEventListener("click", clearGrid);
    playButton.addEventListener("click", () => startPlayback(true));
    replayButton.addEventListener("click", () => startPlayback(true));
    tempoControl.addEventListener("input", updateHud);

    drawGrid();
    updateHud();
  </script>
</body>
</html>
