<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节奏调色盘：音乐驱动的生成艺术玩具</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050816;
      --panel: rgba(10, 14, 32, 0.78);
      --panel-line: rgba(255, 255, 255, 0.12);
      --text: #f3f6ff;
      --muted: rgba(243, 246, 255, 0.72);
      --accent: #ffb34d;
      --accent-2: #66e0ff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(74, 110, 255, 0.18), transparent 36%),
        radial-gradient(circle at 20% 20%, rgba(255, 90, 180, 0.12), transparent 28%),
        linear-gradient(180deg, #090d1d 0%, var(--bg) 52%, #02040d 100%);
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      overflow: hidden;
    }

    button,
    select {
      font: inherit;
      color: inherit;
    }

    #art-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      cursor: crosshair;
    }

    .hud {
      position: fixed;
      inset: 18px 18px auto auto;
      width: min(360px, calc(100vw - 36px));
      padding: 16px;
      border: 1px solid var(--panel-line);
      border-radius: 22px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    .hud h1,
    .hud p {
      margin: 0;
    }

    .hud h1 {
      font-size: 1.2rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .subtle {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.92rem;
    }

    .controls {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .pill {
      min-width: 0;
      padding: 10px 14px;
      border: 1px solid var(--panel-line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
    }

    .preset-select,
    .shot-button {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.07);
      padding: 12px 14px;
    }

    .shot-button {
      cursor: pointer;
      background: linear-gradient(135deg, rgba(255, 179, 77, 0.22), rgba(102, 224, 255, 0.18));
    }

    .hint-list {
      display: grid;
      gap: 8px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .hint-list span strong {
      color: var(--text);
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(1, 3, 10, 0.58);
      backdrop-filter: blur(10px);
    }

    .overlay[hidden] {
      display: none;
    }

    .overlay-card {
      width: min(460px, 100%);
      padding: 26px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 28px;
      background: rgba(8, 12, 28, 0.9);
      text-align: center;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    }

    .overlay-card h2,
    .overlay-card p {
      margin: 0;
    }

    .overlay-card p {
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .start-button {
      margin-top: 18px;
      padding: 13px 22px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #08101d;
      font-weight: 700;
      cursor: pointer;
    }

    @media (max-width: 720px) {
      .hud {
        inset: auto 12px 12px 12px;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <canvas id="art-canvas" aria-label="节奏调色盘生成艺术画布"></canvas>

  <section class="hud" aria-label="控制面板">
    <h1>节奏调色盘</h1>
    <p class="subtle">内置三段合成节拍，拖拽实时改色、改密度、改对称。单击画面切换对称轴，保存当前生成画作为 PNG。</p>

    <div class="controls">
      <label class="row" for="preset-select">
        <span>节拍预设</span>
        <span class="pill" id="preset-label">Neon Bloom</span>
      </label>
      <select class="preset-select" id="preset-select" aria-label="节拍预设选择">
        <option value="0">Neon Bloom</option>
        <option value="1">Pulse Lattice</option>
        <option value="2">Mirror Drift</option>
      </select>

      <div class="row">
        <span class="pill" id="hue-readout">Hue 215</span>
        <span class="pill" id="density-readout">Density 14</span>
        <span class="pill" id="symmetry-readout">Symmetry 6</span>
      </div>

      <button class="shot-button" id="save-button" type="button">保存 PNG</button>
    </div>

    <div class="hint-list">
      <span><strong>水平拖拽</strong> 改变色相</span>
      <span><strong>垂直拖拽</strong> 改变图案密度</span>
      <span><strong>点击/轻触</strong> 轮换对称轴数量</span>
    </div>
  </section>

  <div class="overlay" id="start-overlay">
    <div class="overlay-card">
      <h2>点击启动音画循环</h2>
      <p>页面会尝试自动开始播放内置节拍。若浏览器阻止自动音频，点击下方按钮后会立刻进入循环并持续驱动画面。</p>
      <button class="start-button" id="start-button" type="button">开始</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("art-canvas");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("start-overlay");
    const startButton = document.getElementById("start-button");
    const saveButton = document.getElementById("save-button");
    const presetSelect = document.getElementById("preset-select");
    const presetLabel = document.getElementById("preset-label");
    const hueReadout = document.getElementById("hue-readout");
    const densityReadout = document.getElementById("density-readout");
    const symmetryReadout = document.getElementById("symmetry-readout");

    const symmetryOptions = [3, 4, 5, 6, 8, 12];
    const presets = [
      {
        name: "Neon Bloom",
        bpm: 112,
        steps: 16,
        voices: [
          { type: "sine", freq: 64, gain: 0.48, decay: 0.2, pattern: [1, 0, 0, 0, 0.9, 0, 0, 0, 1, 0, 0, 0, 0.8, 0, 0.25, 0] },
          { type: "triangle", freq: 220, gain: 0.12, decay: 0.08, pattern: [0, 0.35, 0, 0.35, 0, 0.35, 0, 0.4, 0, 0.35, 0, 0.35, 0, 0.4, 0, 0.55] }
        ]
      },
      {
        name: "Pulse Lattice",
        bpm: 132,
        steps: 16,
        voices: [
          { type: "triangle", freq: 82, gain: 0.36, decay: 0.18, pattern: [1, 0, 0.2, 0, 0.85, 0, 0.2, 0, 1, 0, 0.2, 0, 0.7, 0, 0.15, 0.3] },
          { type: "square", freq: 330, gain: 0.08, decay: 0.05, pattern: [0, 0.42, 0.34, 0.42, 0, 0.44, 0.34, 0.42, 0, 0.42, 0.34, 0.42, 0, 0.44, 0.34, 0.56] }
        ]
      },
      {
        name: "Mirror Drift",
        bpm: 96,
        steps: 12,
        voices: [
          { type: "sine", freq: 72, gain: 0.42, decay: 0.24, pattern: [1, 0, 0.25, 0, 0.72, 0, 1, 0, 0.25, 0, 0.72, 0] },
          { type: "sawtooth", freq: 176, gain: 0.07, decay: 0.09, pattern: [0, 0.3, 0.5, 0.25, 0, 0.58, 0, 0.3, 0.5, 0.25, 0, 0.68] }
        ]
      }
    ];

    const state = {
      dragging: false,
      dragMoved: false,
      targetHue: 215,
      currentHue: 215,
      targetDensity: 14,
      currentDensity: 14,
      targetSymmetry: 6,
      currentSymmetry: 6,
      beatPulse: 0,
      accentPulse: 0,
      smoothedLevel: 0,
      analyserLevel: 0,
      currentPresetIndex: 0
    };

    let audioContext = null;
    let masterGain = null;
    let analyserNode = null;
    let activePresetGain = null;
    let currentPreset = presets[0];
    let schedulerTimer = 0;
    let nextNoteTime = 0;
    let currentStep = 0;
    let analyserData = null;
    let lastPointer = { x: 0, y: 0 };

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function lerp(from, to, alpha) {
      return from + (to - from) * alpha;
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.round(window.innerWidth * dpr));
      canvas.height = Math.max(1, Math.round(window.innerHeight * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function updateReadouts() {
      hueReadout.textContent = `Hue ${Math.round(state.currentHue)}`;
      densityReadout.textContent = `Density ${Math.round(state.currentDensity)}`;
      symmetryReadout.textContent = `Symmetry ${Math.round(state.currentSymmetry)}`;
      presetLabel.textContent = currentPreset.name;
    }

    function cycleSymmetry() {
      const currentIndex = symmetryOptions.indexOf(state.targetSymmetry);
      const nextIndex = (currentIndex + 1) % symmetryOptions.length;
      state.targetSymmetry = symmetryOptions[nextIndex];
    }

    function pointerToCanvas(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top,
        width: rect.width,
        height: rect.height
      };
    }

    function applyPointerParameters(point) {
      state.targetHue = (point.x / Math.max(1, point.width)) * 360;
      state.targetDensity = 6 + (1 - point.y / Math.max(1, point.height)) * 22;
      lastPointer = point;
    }

    function spawnVoice(voice, intensity, when, destinationGain) {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const filter = audioContext.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(voice.freq * 6, when);
      filter.Q.value = 0.6;
      osc.type = voice.type;
      osc.frequency.setValueAtTime(voice.freq, when);
      gain.gain.setValueAtTime(0.0001, when);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, voice.gain * intensity), when + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, when + voice.decay);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(destinationGain);
      osc.start(when);
      osc.stop(when + voice.decay + 0.08);
    }

    function scheduleNote(stepIndex, when) {
      currentPreset.voices.forEach((voice, voiceIndex) => {
        const intensity = voice.pattern[stepIndex % voice.pattern.length] || 0;
        if (intensity <= 0) {
          return;
        }
        spawnVoice(voice, intensity, when, activePresetGain);
        const pulseBoost = intensity * (voiceIndex === 0 ? 1 : 0.55);
        state.beatPulse = Math.max(state.beatPulse, pulseBoost);
        state.accentPulse = Math.max(state.accentPulse, pulseBoost * (voiceIndex === 0 ? 0.9 : 0.45));
      });
    }

    function secondsPerStep(preset) {
      return 60 / preset.bpm / 4;
    }

    function scheduleAhead() {
      if (!audioContext || !currentPreset) {
        return;
      }
      while (nextNoteTime < audioContext.currentTime + 0.14) {
        scheduleNote(currentStep, nextNoteTime);
        nextNoteTime += secondsPerStep(currentPreset);
        currentStep = (currentStep + 1) % currentPreset.steps;
      }
    }

    function startScheduler() {
      if (schedulerTimer) {
        window.clearInterval(schedulerTimer);
      }
      schedulerTimer = window.setInterval(scheduleAhead, 25);
    }

    function createAudioGraph() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        return false;
      }
      if (!audioContext) {
        audioContext = new AudioContextClass();
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 256;
        analyserData = new Uint8Array(analyserNode.frequencyBinCount);
        masterGain = audioContext.createGain();
        masterGain.gain.value = 0.64;
        masterGain.connect(analyserNode);
        analyserNode.connect(audioContext.destination);
      }
      return true;
    }

    function switchPreset(index) {
      if (!audioContext || !masterGain) {
        state.currentPresetIndex = index;
        currentPreset = presets[index];
        presetLabel.textContent = currentPreset.name;
        return;
      }
      const fadeNow = audioContext.currentTime;
      const incomingGain = audioContext.createGain();
      incomingGain.gain.setValueAtTime(0.0001, fadeNow);
      incomingGain.connect(masterGain);
      incomingGain.gain.exponentialRampToValueAtTime(1, fadeNow + 0.22);

      if (activePresetGain) {
        activePresetGain.gain.cancelScheduledValues(fadeNow);
        activePresetGain.gain.setValueAtTime(Math.max(0.0001, activePresetGain.gain.value || 1), fadeNow);
        activePresetGain.gain.exponentialRampToValueAtTime(0.0001, fadeNow + 0.22);
        const oldGain = activePresetGain;
        window.setTimeout(() => oldGain.disconnect(), 320);
      }

      activePresetGain = incomingGain;
      state.currentPresetIndex = index;
      currentPreset = presets[index];
      currentStep = 0;
      nextNoteTime = audioContext.currentTime + 0.03;
      updateReadouts();
    }

    async function ensureAudioRunning() {
      const available = createAudioGraph();
      if (!available) {
        overlay.hidden = true;
        return false;
      }
      if (!activePresetGain) {
        switchPreset(state.currentPresetIndex);
      }
      if (audioContext.state === "suspended") {
        await audioContext.resume();
      }
      nextNoteTime = audioContext.currentTime + 0.03;
      startScheduler();
      overlay.hidden = true;
      return true;
    }

    function readAnalyserLevel() {
      if (!analyserNode || !analyserData) {
        return 0;
      }
      analyserNode.getByteFrequencyData(analyserData);
      let sum = 0;
      for (let i = 0; i < analyserData.length; i += 1) {
        sum += analyserData[i];
      }
      return sum / analyserData.length / 255;
    }

    function drawBackground(width, height, energy) {
      const gradient = ctx.createRadialGradient(width * 0.5, height * 0.5, 60, width * 0.5, height * 0.5, Math.max(width, height) * 0.6);
      gradient.addColorStop(0, `hsla(${(state.currentHue + 30) % 360}, 78%, ${16 + energy * 10}%, 0.36)`);
      gradient.addColorStop(0.55, "rgba(4, 9, 22, 0.55)");
      gradient.addColorStop(1, "rgba(2, 5, 14, 0.96)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
    }

    function drawPulseGeometry(width, height, energy, nowSeconds) {
      const cx = width * 0.5;
      const cy = height * 0.5;
      const symmetry = Math.max(3, Math.round(state.currentSymmetry));
      const density = Math.max(5, Math.round(state.currentDensity));
      const baseRadius = Math.min(width, height) * 0.12;
      const maxRadius = Math.min(width, height) * 0.44;
      const pulseRadius = baseRadius + state.beatPulse * 56 + energy * 40;

      ctx.save();
      ctx.translate(cx, cy);

      for (let ring = 0; ring < density; ring += 1) {
        const t = ring / Math.max(1, density - 1);
        const radius = lerp(pulseRadius * 0.45, maxRadius, t);
        const spokeWave = nowSeconds * (0.45 + t * 1.35);
        const spokeLength = 10 + t * 28 + energy * 30;
        const hue = (state.currentHue + ring * (8 + energy * 14) + state.accentPulse * 50) % 360;
        const alpha = 0.08 + (1 - t) * 0.2 + energy * 0.18;
        const lineWidth = 0.8 + (1 - t) * 1.8 + energy * 2.4;

        for (let axis = 0; axis < symmetry; axis += 1) {
          const angle = (Math.PI * 2 * axis) / symmetry + ring * 0.12 + nowSeconds * 0.2;
          const wobble = Math.sin(spokeWave + axis * 0.85) * (8 + energy * 24);
          const inner = radius - wobble * 0.3;
          const outer = radius + spokeLength + wobble;
          const orbitX = Math.cos(angle) * inner;
          const orbitY = Math.sin(angle) * inner;

          ctx.strokeStyle = `hsla(${hue}, 92%, ${58 + energy * 16}%, ${alpha})`;
          ctx.lineWidth = lineWidth;
          ctx.beginPath();
          ctx.moveTo(Math.cos(angle) * inner, Math.sin(angle) * inner);
          ctx.lineTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
          ctx.stroke();

          ctx.fillStyle = `hsla(${(hue + 40) % 360}, 96%, ${66 + energy * 12}%, ${alpha * 0.88})`;
          ctx.beginPath();
          ctx.arc(orbitX, orbitY, 2 + (1 - t) * 3.5 + energy * 6, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = `hsla(${(hue + 120) % 360}, 88%, 62%, ${alpha * 0.78})`;
          ctx.lineWidth = 0.7 + energy * 1.6;
          ctx.beginPath();
          ctx.arc(0, 0, radius + Math.sin(nowSeconds + axis + t * 8) * 10, angle - 0.18, angle + 0.18);
          ctx.stroke();
        }
      }

      ctx.rotate(nowSeconds * 0.24);
      for (let layer = 0; layer < 3; layer += 1) {
        const scale = 0.45 + layer * 0.24 + energy * 0.08;
        const points = symmetry * 2;
        ctx.beginPath();
        for (let i = 0; i <= points; i += 1) {
          const angle = (Math.PI * 2 * i) / points;
          const wave = i % 2 === 0 ? 1 : 0.45 + energy * 0.45;
          const radius = baseRadius * (1.2 + layer * 0.55) * wave / scale;
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle) * radius;
          if (i === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        }
        ctx.closePath();
        ctx.strokeStyle = `hsla(${(state.currentHue + layer * 48 + energy * 60) % 360}, 90%, 72%, ${0.18 + energy * 0.16})`;
        ctx.lineWidth = 1.2 + layer + energy * 2;
        ctx.stroke();
      }

      ctx.restore();
    }

    function renderFrame(now) {
      const width = window.innerWidth;
      const height = window.innerHeight;
      const seconds = now * 0.001;
      state.currentHue = lerp(state.currentHue, state.targetHue, 0.08);
      state.currentDensity = lerp(state.currentDensity, state.targetDensity, 0.08);
      state.currentSymmetry = lerp(state.currentSymmetry, state.targetSymmetry, 0.08);

      state.analyserLevel = readAnalyserLevel();
      state.smoothedLevel = lerp(state.smoothedLevel, state.analyserLevel, 0.16);
      state.beatPulse *= 0.92;
      state.accentPulse *= 0.9;

      drawBackground(width, height, state.smoothedLevel);
      drawPulseGeometry(width, height, state.smoothedLevel, seconds);
      updateReadouts();
      window.requestAnimationFrame(renderFrame);
    }

    function saveScreenshot() {
      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/png");
      link.download = `rhythm-palette-${Date.now()}.png`;
      link.click();
    }

    function handlePointerDown(event) {
      canvas.setPointerCapture(event.pointerId);
      state.dragging = true;
      state.dragMoved = false;
      const point = pointerToCanvas(event);
      applyPointerParameters(point);
      ensureAudioRunning();
    }

    function handlePointerMove(event) {
      if (!state.dragging) {
        return;
      }
      const point = pointerToCanvas(event);
      const dx = Math.abs(point.x - lastPointer.x);
      const dy = Math.abs(point.y - lastPointer.y);
      if (dx + dy > 4) {
        state.dragMoved = true;
      }
      applyPointerParameters(point);
    }

    function handlePointerUp(event) {
      if (canvas.hasPointerCapture(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }
      if (!state.dragMoved) {
        cycleSymmetry();
      }
      state.dragging = false;
    }

    presetSelect.addEventListener("change", async (event) => {
      state.currentPresetIndex = Number(event.target.value);
      await ensureAudioRunning();
      switchPreset(state.currentPresetIndex);
    });
    saveButton.addEventListener("click", saveScreenshot);
    startButton.addEventListener("click", ensureAudioRunning);
    canvas.addEventListener("pointerdown", handlePointerDown);
    canvas.addEventListener("pointermove", handlePointerMove);
    canvas.addEventListener("pointerup", handlePointerUp);
    canvas.addEventListener("pointercancel", handlePointerUp);

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("load", async () => {
      resizeCanvas();
      updateReadouts();
      window.requestAnimationFrame(renderFrame);
      try {
        const started = await ensureAudioRunning();
        overlay.hidden = Boolean(started);
      } catch (error) {
        overlay.hidden = false;
      }
    });
  </script>
</body>
</html>
