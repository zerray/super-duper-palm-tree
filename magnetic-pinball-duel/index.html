<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双人磁力弹球竞技场</title>
  <style>
    :root {
      --bg: #08111c;
      --panel: rgba(8, 18, 30, 0.9);
      --line: rgba(126, 192, 255, 0.18);
      --text: #eef6ff;
      --muted: #95abc1;
      --left: #72d6ff;
      --right: #ff8dac;
      --zone: #ffe087;
      --good: #8cffb5;
      --bad: #ff7b8e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(114, 214, 255, 0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255, 141, 172, 0.14), transparent 30%),
        linear-gradient(180deg, #0a1320 0%, #03070d 100%);
    }

    .app {
      width: min(1180px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 14px 0 28px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel {
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(10px);
    }

    .eyebrow,
    .meta {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 8px 0 10px;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 0.95;
    }

    p {
      margin: 0;
      line-height: 1.55;
    }

    .stats,
    .controls {
      display: grid;
      gap: 10px;
    }

    .stats {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 12px;
    }

    .stat,
    .control {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-size: 1.45rem;
    }

    .control strong {
      display: block;
      margin-bottom: 4px;
    }

    .left {
      color: var(--left);
    }

    .right {
      color: var(--right);
    }

    .stage {
      position: relative;
      padding: 12px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.03), transparent 28%),
        linear-gradient(180deg, rgba(8, 16, 28, 0.95), rgba(3, 8, 14, 0.98));
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 20px;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.03), transparent 35%),
        linear-gradient(180deg, #132236 0%, #09131f 100%);
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 24px;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .overlay-card {
      width: min(460px, calc(100% - 24px));
      padding: 24px;
      border-radius: 24px;
      text-align: center;
      border: 1px solid rgba(140, 255, 181, 0.24);
      background: rgba(3, 8, 14, 0.92);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.34);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .overlay-card.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .overlay-card h2 {
      margin: 0 0 10px;
      font-size: 1.9rem;
    }

    .overlay-card p {
      color: var(--muted);
    }

    button {
      margin-top: 18px;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      color: #06111d;
      background: linear-gradient(135deg, var(--good), #ffd774);
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="panel">
        <div class="eyebrow">Physics Toy</div>
        <h1>双人磁力弹球竞技场</h1>
        <p>两位玩家分守左右发射器，把带磁性的弹球甩进中央得分区争夺占领权。相同磁极会排斥，异极会吸引；随机障碍物和磁极反转道具会不断打乱局面，60 秒后占区更多的一方获胜。</p>
      </div>
      <div class="panel">
        <div class="stats">
          <div class="stat">
            <div class="meta">玩家 1 控区</div>
            <strong class="left" id="score-left">0</strong>
          </div>
          <div class="stat">
            <div class="meta">玩家 2 控区</div>
            <strong class="right" id="score-right">0</strong>
          </div>
          <div class="stat">
            <div class="meta">倒计时</div>
            <strong id="match-timer">60.0s</strong>
          </div>
          <div class="stat">
            <div class="meta">磁极反转</div>
            <strong id="pickup-timer">8.0s</strong>
          </div>
        </div>
        <div class="controls">
          <div class="control">
            <strong class="left">玩家 1</strong>
            <span>鼠标或触屏左半区拖拽瞄准，松开发射。双触屏时左半区也归玩家 1。</span>
          </div>
          <div class="control">
            <strong class="right">玩家 2</strong>
            <span>WASD 调整右侧发射方向，空格发射。触屏也可拖拽右半区直接发射。</span>
          </div>
        </div>
      </div>
    </section>

    <section class="stage">
      <canvas id="game" width="1200" height="720" aria-label="双人磁力弹球竞技场画布"></canvas>
      <div class="overlay">
        <div class="overlay-card visible" id="overlay-card">
          <h2 id="overlay-title">双人磁力弹球竞技场</h2>
          <p id="overlay-text">点击开始后，玩家 1 在左半区拖拽发射，玩家 2 用 WASD 加空格发射。60 秒结束时，控制更多得分区的一方获胜。</p>
          <button id="restart-button" type="button">开始对局</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const magneticPinballDuel = (() => {
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const overlayCard = document.querySelector("#overlay-card");
      const overlayTitle = document.querySelector("#overlay-title");
      const overlayText = document.querySelector("#overlay-text");
      const restartButton = document.querySelector("#restart-button");
      const scoreLeftLabel = document.querySelector("#score-left");
      const scoreRightLabel = document.querySelector("#score-right");
      const matchTimerLabel = document.querySelector("#match-timer");
      const pickupTimerLabel = document.querySelector("#pickup-timer");

      const WIDTH = canvas.width;
      const HEIGHT = canvas.height;
      const HALF_WIDTH = WIDTH / 2;
      const MATCH_DURATION = 60;
      const MAX_DT = 1 / 30;
      const BALL_RADIUS = 10;
      const MAX_BALLS = 24;
      const LAUNCH_POWER = 3.6;
      const LAUNCH_COOLDOWN = 0.65;
      const BALL_FRICTION = 0.994;
      const WALL_BOUNCE = 0.94;
      const MAGNET_FORCE = 52000;
      const COLLISION_PUSH = 0.9;
      const PICKUP_INTERVAL = 8;
      const OBSTACLE_INTERVAL = 11;
      const ZONE_LAYOUT = [
        { x: WIDTH * 0.34, y: HEIGHT * 0.3, radius: 56 },
        { x: WIDTH * 0.5, y: HEIGHT * 0.52, radius: 64 },
        { x: WIDTH * 0.66, y: HEIGHT * 0.74, radius: 56 }
      ];

      const state = {
        running: false,
        gameOver: false,
        lastTime: 0,
        timeLeft: MATCH_DURATION,
        pickupTimer: PICKUP_INTERVAL,
        obstacleTimer: OBSTACLE_INTERVAL,
        scores: { left: 0, right: 0 },
        winnerText: "",
        keysPressed: new Set(),
        pointers: new Map(),
        particles: [],
        balls: [],
        powerups: [],
        obstacles: [],
        zones: ZONE_LAYOUT.map((zone) => ({ ...zone, owner: "" })),
        players: {
          left: {
            key: "left",
            name: "玩家 1",
            color: "#72d6ff",
            launcher: { x: 92, y: HEIGHT / 2 },
            aim: { x: 100, y: 0 },
            polarity: 1,
            cooldown: 0,
            drag: null
          },
          right: {
            key: "right",
            name: "玩家 2",
            color: "#ff8dac",
            launcher: { x: WIDTH - 92, y: HEIGHT / 2 },
            aim: { x: -100, y: 0 },
            polarity: -1,
            cooldown: 0,
            drag: null
          }
        }
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function randomRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function normalizeVector(x, y, fallbackX, fallbackY) {
        const length = Math.hypot(x, y);
        if (!length) {
          return { x: fallbackX, y: fallbackY };
        }
        return { x: x / length, y: y / length };
      }

      function setOverlay(visible, title, text, buttonText = "开始对局") {
        overlayCard.classList.toggle("visible", visible);
        overlayTitle.textContent = title;
        overlayText.textContent = text;
        restartButton.textContent = buttonText;
      }

      function updateHud() {
        scoreLeftLabel.textContent = String(state.scores.left);
        scoreRightLabel.textContent = String(state.scores.right);
        matchTimerLabel.textContent = `${Math.max(0, state.timeLeft).toFixed(1)}s`;
        pickupTimerLabel.textContent = `${Math.max(0, state.pickupTimer).toFixed(1)}s`;
      }

      function addParticles(x, y, color, amount) {
        for (let i = 0; i < amount; i += 1) {
          state.particles.push({
            x,
            y,
            vx: randomRange(-140, 140),
            vy: randomRange(-140, 140),
            life: randomRange(0.25, 0.5),
            age: 0,
            size: randomRange(2, 4),
            color
          });
        }
        if (state.particles.length > 180) {
          state.particles.splice(0, state.particles.length - 180);
        }
      }

      function resetMatch() {
        state.running = true;
        state.gameOver = false;
        state.lastTime = 0;
        state.timeLeft = MATCH_DURATION;
        state.pickupTimer = PICKUP_INTERVAL;
        state.obstacleTimer = OBSTACLE_INTERVAL;
        state.scores.left = 0;
        state.scores.right = 0;
        state.winnerText = "";
        state.particles = [];
        state.balls = [];
        state.powerups = [];
        state.obstacles = [];
        state.zones = ZONE_LAYOUT.map((zone) => ({ ...zone, owner: "" }));
        state.players.left.polarity = 1;
        state.players.right.polarity = -1;
        state.players.left.cooldown = 0;
        state.players.right.cooldown = 0;
        state.players.left.drag = null;
        state.players.right.drag = null;
        state.players.left.aim = { x: 100, y: 0 };
        state.players.right.aim = { x: -100, y: 0 };
        spawnObstacleSet();
        updateHud();
        setOverlay(false, "", "");
      }

      function createBall(player, aimX, aimY, powerScale = 1) {
        if (!state.running || player.cooldown > 0 || state.balls.length >= MAX_BALLS) {
          return;
        }

        const unit = normalizeVector(aimX, aimY, player.key === "left" ? 1 : -1, 0);
        const power = clamp(Math.hypot(aimX, aimY), 24, 140) * LAUNCH_POWER * powerScale;
        state.balls.push({
          x: player.launcher.x + unit.x * 22,
          y: player.launcher.y + unit.y * 22,
          vx: unit.x * power,
          vy: unit.y * power,
          radius: BALL_RADIUS,
          owner: player.key,
          color: player.color,
          polarity: player.polarity,
          age: 0
        });
        player.cooldown = LAUNCH_COOLDOWN;
        addParticles(player.launcher.x, player.launcher.y, player.color, 8);
      }

      function getCanvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (event.clientX - rect.left) * (WIDTH / rect.width),
          y: (event.clientY - rect.top) * (HEIGHT / rect.height)
        };
      }

      function getPlayerFromPoint(point) {
        return point.x < HALF_WIDTH ? state.players.left : state.players.right;
      }

      function beginPointerAim(event) {
        if (!state.running) {
          return;
        }
        const point = getCanvasPoint(event);
        const player = getPlayerFromPoint(point);
        player.drag = { startX: point.x, startY: point.y, currentX: point.x, currentY: point.y };
        state.pointers.set(event.pointerId, player.key);
        canvas.setPointerCapture(event.pointerId);
      }

      function updatePointerAim(event) {
        const playerKey = state.pointers.get(event.pointerId);
        if (!playerKey) {
          return;
        }
        const point = getCanvasPoint(event);
        const player = state.players[playerKey];
        if (!player.drag) {
          return;
        }
        player.drag.currentX = point.x;
        player.drag.currentY = point.y;
        player.aim = {
          x: player.launcher.x - point.x,
          y: player.launcher.y - point.y
        };
      }

      function finishPointerAim(event) {
        const playerKey = state.pointers.get(event.pointerId);
        if (!playerKey) {
          return;
        }
        const player = state.players[playerKey];
        if (player.drag) {
          const aimX = player.launcher.x - player.drag.currentX;
          const aimY = player.launcher.y - player.drag.currentY;
          createBall(player, aimX, aimY);
        }
        player.drag = null;
        state.pointers.delete(event.pointerId);
      }

      function spawnObstacleSet() {
        state.obstacles = [];
        for (let i = 0; i < 3; i += 1) {
          trySpawnObstacle();
        }
      }

      function circleRectCollision(circle, rect) {
        const nearestX = clamp(circle.x, rect.x, rect.x + rect.width);
        const nearestY = clamp(circle.y, rect.y, rect.y + rect.height);
        const dx = circle.x - nearestX;
        const dy = circle.y - nearestY;
        return dx * dx + dy * dy <= circle.radius * circle.radius;
      }

      function trySpawnObstacle() {
        for (let attempt = 0; attempt < 18; attempt += 1) {
          const width = randomRange(60, 130);
          const height = randomRange(20, 36);
          const obstacle = {
            x: randomRange(WIDTH * 0.22, WIDTH * 0.78 - width),
            y: randomRange(80, HEIGHT - 80 - height),
            width,
            height
          };
          const overlapsZone = state.zones.some((zone) => circleRectCollision(zone, obstacle));
          const blocksLauncher =
            circleRectCollision({ x: state.players.left.launcher.x, y: state.players.left.launcher.y, radius: 70 }, obstacle) ||
            circleRectCollision({ x: state.players.right.launcher.x, y: state.players.right.launcher.y, radius: 70 }, obstacle);
          if (!overlapsZone && !blocksLauncher) {
            state.obstacles.push(obstacle);
            addParticles(obstacle.x + obstacle.width / 2, obstacle.y + obstacle.height / 2, "#ffd774", 10);
            if (state.obstacles.length > 5) {
              state.obstacles.shift();
            }
            return;
          }
        }
      }

      function trySpawnPickup() {
        state.powerups = [];
        for (let attempt = 0; attempt < 16; attempt += 1) {
          const pickup = {
            x: randomRange(WIDTH * 0.28, WIDTH * 0.72),
            y: randomRange(90, HEIGHT - 90),
            radius: 16,
            type: "polarity-flip"
          };
          const blocked = state.obstacles.some((rect) => circleRectCollision({ x: pickup.x, y: pickup.y, radius: 34 }, rect));
          if (!blocked) {
            state.powerups.push(pickup);
            return;
          }
        }
      }

      function applyPowerup(ball, powerup) {
        const player = state.players[ball.owner];
        player.polarity *= -1;
        state.balls.forEach((item) => {
          if (item.owner === ball.owner) {
            item.polarity *= -1;
          }
        });
        addParticles(powerup.x, powerup.y, player.color, 16);
      }

      function resolveObstacleCollision(ball, rect) {
        const nearestX = clamp(ball.x, rect.x, rect.x + rect.width);
        const nearestY = clamp(ball.y, rect.y, rect.y + rect.height);
        const dx = ball.x - nearestX;
        const dy = ball.y - nearestY;
        if (Math.abs(dx) > Math.abs(dy)) {
          ball.vx *= -WALL_BOUNCE;
          ball.x += Math.sign(dx || ball.vx || 1) * 5;
        } else {
          ball.vy *= -WALL_BOUNCE;
          ball.y += Math.sign(dy || ball.vy || 1) * 5;
        }
      }

      function updateP2Aim(dt) {
        const player = state.players.right;
        let dx = 0;
        let dy = 0;
        if (state.keysPressed.has("KeyA")) dx -= 1;
        if (state.keysPressed.has("KeyD")) dx += 1;
        if (state.keysPressed.has("KeyW")) dy -= 1;
        if (state.keysPressed.has("KeyS")) dy += 1;
        if (!dx && !dy) {
          return;
        }
        const aim = normalizeVector(dx, dy, -1, 0);
        player.aim.x = clamp(player.aim.x + aim.x * 280 * dt, -140, 140);
        player.aim.y = clamp(player.aim.y + aim.y * 280 * dt, -140, 140);
        if (player.aim.x > -16) {
          player.aim.x = -16;
        }
      }

      function applyMagneticForce(ballA, ballB, dt) {
        const dx = ballB.x - ballA.x;
        const dy = ballB.y - ballA.y;
        const distanceSq = clamp(dx * dx + dy * dy, 320, 30000);
        const distance = Math.sqrt(distanceSq);
        const unitX = dx / distance;
        const unitY = dy / distance;
        const polarityProduct = ballA.polarity * ballB.polarity;
        const direction = polarityProduct > 0 ? -1 : 1;
        const force = (MAGNET_FORCE / distanceSq) * dt;
        ballA.vx -= unitX * force * direction;
        ballA.vy -= unitY * force * direction;
        ballB.vx += unitX * force * direction;
        ballB.vy += unitY * force * direction;
      }

      function resolveBallCollision(ballA, ballB) {
        const dx = ballB.x - ballA.x;
        const dy = ballB.y - ballA.y;
        const distance = Math.hypot(dx, dy);
        const minDistance = ballA.radius + ballB.radius;
        if (!distance || distance >= minDistance) {
          return;
        }
        const nx = dx / distance;
        const ny = dy / distance;
        const overlap = (minDistance - distance) / 2;
        ballA.x -= nx * overlap;
        ballA.y -= ny * overlap;
        ballB.x += nx * overlap;
        ballB.y += ny * overlap;
        ballA.vx -= nx * COLLISION_PUSH;
        ballA.vy -= ny * COLLISION_PUSH;
        ballB.vx += nx * COLLISION_PUSH;
        ballB.vy += ny * COLLISION_PUSH;
      }

      function updateBalls(dt) {
        for (let i = 0; i < state.balls.length; i += 1) {
          const ball = state.balls[i];
          ball.age += dt;
          for (let j = i + 1; j < state.balls.length; j += 1) {
            const other = state.balls[j];
            applyMagneticForce(ball, other, dt);
            resolveBallCollision(ball, other);
          }
        }

        state.balls.forEach((ball) => {
          ball.vx *= BALL_FRICTION;
          ball.vy *= BALL_FRICTION;
          ball.x += ball.vx * dt;
          ball.y += ball.vy * dt;

          if (ball.x - ball.radius <= 18) {
            ball.x = 18 + ball.radius;
            ball.vx = Math.abs(ball.vx) * WALL_BOUNCE;
          } else if (ball.x + ball.radius >= WIDTH - 18) {
            ball.x = WIDTH - 18 - ball.radius;
            ball.vx = -Math.abs(ball.vx) * WALL_BOUNCE;
          }

          if (ball.y - ball.radius <= 18) {
            ball.y = 18 + ball.radius;
            ball.vy = Math.abs(ball.vy) * WALL_BOUNCE;
          } else if (ball.y + ball.radius >= HEIGHT - 18) {
            ball.y = HEIGHT - 18 - ball.radius;
            ball.vy = -Math.abs(ball.vy) * WALL_BOUNCE;
          }

          state.obstacles.forEach((rect) => {
            if (circleRectCollision(ball, rect)) {
              resolveObstacleCollision(ball, rect);
            }
          });

          state.powerups.forEach((powerup) => {
            const dx = ball.x - powerup.x;
            const dy = ball.y - powerup.y;
            const minDistance = ball.radius + powerup.radius;
            if (dx * dx + dy * dy <= minDistance * minDistance) {
              applyPowerup(ball, powerup);
              powerup.collected = true;
            }
          });
        });

        state.balls = state.balls
          .filter((ball) => ball.age < 24)
          .slice(-MAX_BALLS);
        state.powerups = state.powerups.filter((powerup) => !powerup.collected);
      }

      function updateZones() {
        let leftScore = 0;
        let rightScore = 0;

        state.zones.forEach((zone) => {
          let leftCount = 0;
          let rightCount = 0;
          state.balls.forEach((ball) => {
            const dx = ball.x - zone.x;
            const dy = ball.y - zone.y;
            if (dx * dx + dy * dy <= zone.radius * zone.radius) {
              if (ball.owner === "left") {
                leftCount += 1;
              } else {
                rightCount += 1;
              }
            }
          });
          zone.owner = leftCount === rightCount ? "" : leftCount > rightCount ? "left" : "right";
          if (zone.owner === "left") {
            leftScore += 1;
          } else if (zone.owner === "right") {
            rightScore += 1;
          }
        });

        state.scores.left = leftScore;
        state.scores.right = rightScore;
      }

      function finishMatch() {
        state.running = false;
        state.gameOver = true;
        if (state.scores.left === state.scores.right) {
          state.winnerText = "平局";
          setOverlay(true, "比赛结束", `60 秒结束，双方各占 ${state.scores.left} 个得分区。点击按钮或按空格再来一局。`, "再来一局");
          return;
        }
        const winner = state.scores.left > state.scores.right ? state.players.left.name : state.players.right.name;
        const winnerScore = Math.max(state.scores.left, state.scores.right);
        const loserScore = Math.min(state.scores.left, state.scores.right);
        state.winnerText = winner;
        setOverlay(true, `${winner} 获胜`, `终场控区 ${winnerScore} : ${loserScore}。点击按钮或按空格再开一局。`, "再来一局");
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => particle.age < particle.life);
        state.particles.forEach((particle) => {
          particle.age += dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.98;
          particle.vy *= 0.98;
        });
      }

      function update(dt) {
        if (!state.running) {
          updateParticles(dt);
          updateHud();
          return;
        }

        state.timeLeft -= dt;
        state.pickupTimer -= dt;
        state.obstacleTimer -= dt;

        state.players.left.cooldown = Math.max(0, state.players.left.cooldown - dt);
        state.players.right.cooldown = Math.max(0, state.players.right.cooldown - dt);

        updateP2Aim(dt);
        updateBalls(dt);
        updateZones();
        updateParticles(dt);

        if (state.pickupTimer <= 0) {
          state.pickupTimer += PICKUP_INTERVAL;
          trySpawnPickup();
        }

        if (state.obstacleTimer <= 0) {
          state.obstacleTimer += OBSTACLE_INTERVAL;
          trySpawnObstacle();
        }

        if (state.timeLeft <= 0) {
          state.timeLeft = 0;
          finishMatch();
        }

        updateHud();
      }

      function drawBackground() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = "rgba(114,214,255,0.05)";
        ctx.fillRect(0, 0, HALF_WIDTH, HEIGHT);
        ctx.fillStyle = "rgba(255,141,172,0.05)";
        ctx.fillRect(HALF_WIDTH, 0, HALF_WIDTH, HEIGHT);

        ctx.strokeStyle = "rgba(184, 213, 255, 0.16)";
        ctx.lineWidth = 2;
        ctx.setLineDash([12, 12]);
        ctx.beginPath();
        ctx.moveTo(HALF_WIDTH, 20);
        ctx.lineTo(HALF_WIDTH, HEIGHT - 20);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      function drawLauncher(player) {
        const polarityColor = player.polarity > 0 ? "#ffd774" : "#8da9ff";
        ctx.save();
        ctx.translate(player.launcher.x, player.launcher.y);
        ctx.strokeStyle = polarityColor;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, 28, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.arc(0, 0, 20, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = player.color;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(player.aim.x * 0.38, player.aim.y * 0.38);
        ctx.stroke();

        ctx.fillStyle = "#08111c";
        ctx.font = "bold 18px Segoe UI";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(player.polarity > 0 ? "+" : "-", 0, 1);
        ctx.restore();

        if (player.drag) {
          ctx.strokeStyle = "rgba(255,255,255,0.35)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(player.launcher.x, player.launcher.y);
          ctx.lineTo(player.drag.currentX, player.drag.currentY);
          ctx.stroke();
        }
      }

      function drawZones() {
        state.zones.forEach((zone, index) => {
          const fillColor =
            zone.owner === "left"
              ? "rgba(114,214,255,0.2)"
              : zone.owner === "right"
                ? "rgba(255,141,172,0.2)"
                : "rgba(255,224,135,0.12)";
          ctx.fillStyle = fillColor;
          ctx.strokeStyle = zone.owner ? (zone.owner === "left" ? "#72d6ff" : "#ff8dac") : "rgba(255,224,135,0.7)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(zone.x, zone.y, zone.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "rgba(255,255,255,0.82)";
          ctx.font = "bold 20px Segoe UI";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(String(index + 1), zone.x, zone.y + 1);
        });
      }

      function drawObstacles() {
        state.obstacles.forEach((rect) => {
          ctx.fillStyle = "rgba(255, 215, 116, 0.18)";
          ctx.strokeStyle = "rgba(255, 215, 116, 0.74)";
          ctx.lineWidth = 2;
          ctx.fillRect(rect.x, rect.y, rect.width, rect.height);
          ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);
        });
      }

      function drawPowerups() {
        state.powerups.forEach((pickup) => {
          const pulse = 0.7 + Math.sin(performance.now() * 0.012) * 0.25;
          ctx.save();
          ctx.translate(pickup.x, pickup.y);
          ctx.strokeStyle = `rgba(140,255,181,${pulse})`;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(0, 0, pickup.radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-8, -8);
          ctx.lineTo(8, 8);
          ctx.moveTo(8, -8);
          ctx.lineTo(-8, 8);
          ctx.stroke();
          ctx.restore();
        });
      }

      function drawMagneticLinks() {
        for (let i = 0; i < state.balls.length; i += 1) {
          for (let j = i + 1; j < state.balls.length; j += 1) {
            const ballA = state.balls[i];
            const ballB = state.balls[j];
            const dx = ballB.x - ballA.x;
            const dy = ballB.y - ballA.y;
            const distance = Math.hypot(dx, dy);
            if (distance > 140) {
              continue;
            }
            const attract = ballA.polarity !== ballB.polarity;
            ctx.strokeStyle = attract ? "rgba(140,255,181,0.18)" : "rgba(255,123,142,0.18)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(ballA.x, ballA.y);
            ctx.lineTo(ballB.x, ballB.y);
            ctx.stroke();
          }
        }
      }

      function drawBalls() {
        state.balls.forEach((ball) => {
          ctx.fillStyle = ball.color;
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#08111c";
          ctx.font = "bold 12px Segoe UI";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(ball.polarity > 0 ? "+" : "-", ball.x, ball.y + 1);
        });
      }

      function drawParticles() {
        state.particles.forEach((particle) => {
          const alpha = 1 - particle.age / particle.life;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        });
      }

      function render() {
        drawBackground();
        drawZones();
        drawObstacles();
        drawPowerups();
        drawMagneticLinks();
        drawBalls();
        drawLauncher(state.players.left);
        drawLauncher(state.players.right);
        drawParticles();
      }

      function tick(timestamp) {
        if (!state.lastTime) {
          state.lastTime = timestamp;
        }
        const dt = Math.min(MAX_DT, (timestamp - state.lastTime) / 1000);
        state.lastTime = timestamp;
        update(dt);
        render();
        requestAnimationFrame(tick);
      }

      function handleKeyDown(event) {
        if (["Space", "KeyW", "KeyA", "KeyS", "KeyD"].includes(event.code)) {
          event.preventDefault();
        }
        state.keysPressed.add(event.code);
        if (event.code === "Space") {
          if (!state.running || state.gameOver || overlayCard.classList.contains("visible")) {
            resetMatch();
            return;
          }
          createBall(state.players.right, state.players.right.aim.x, state.players.right.aim.y, 1.08);
        }
      }

      function handleKeyUp(event) {
        state.keysPressed.delete(event.code);
      }

      restartButton.addEventListener("click", resetMatch);
      canvas.addEventListener("pointerdown", beginPointerAim);
      canvas.addEventListener("pointermove", updatePointerAim);
      canvas.addEventListener("pointerup", finishPointerAim);
      canvas.addEventListener("pointercancel", finishPointerAim);
      window.addEventListener("keydown", handleKeyDown);
      window.addEventListener("keyup", handleKeyUp);

      updateHud();
      render();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
