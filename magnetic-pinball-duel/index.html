<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>磁力弹珠台：双人同屏对战</title>
  <style>
    :root {
      --bg: #07121d;
      --panel: rgba(10, 20, 34, 0.88);
      --line: rgba(138, 196, 255, 0.2);
      --text: #eef6ff;
      --muted: #91a5be;
      --p1: #76d6ff;
      --p2: #ff8dad;
      --attract: #ffcc66;
      --repel: #8da9ff;
      --ball: #f4f8ff;
      --goal: #80ffb9;
      --danger: #ff758f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(118, 214, 255, 0.14), transparent 32%),
        radial-gradient(circle at bottom, rgba(255, 141, 173, 0.14), transparent 34%),
        linear-gradient(180deg, #09131f 0%, #03070d 100%);
    }

    .app {
      width: min(1180px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 12px 0 24px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel {
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 22px 50px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(10px);
    }

    .eyebrow,
    .meta {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 8px 0 10px;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 0.95;
    }

    p {
      margin: 0;
      line-height: 1.55;
    }

    .stats,
    .controls {
      display: grid;
      gap: 10px;
    }

    .stats {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 12px;
    }

    .stat,
    .control {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-size: 1.5rem;
    }

    .control strong {
      display: block;
      margin-bottom: 4px;
    }

    .p1 {
      color: var(--p1);
    }

    .p2 {
      color: var(--p2);
    }

    .stage {
      position: relative;
      padding: 12px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.04), transparent 28%),
        linear-gradient(180deg, rgba(8, 16, 28, 0.95), rgba(3, 8, 14, 0.98));
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 20px;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.03), transparent 30%),
        linear-gradient(180deg, #132236 0%, #09131f 100%);
    }

    .overlay {
      position: absolute;
      inset: 24px;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .overlay-card {
      width: min(440px, calc(100% - 24px));
      padding: 24px;
      border-radius: 24px;
      text-align: center;
      border: 1px solid rgba(128, 255, 185, 0.24);
      background: rgba(3, 8, 14, 0.92);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.34);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .overlay-card.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .overlay-card h2 {
      margin: 0 0 10px;
      font-size: 1.9rem;
    }

    .overlay-card p {
      color: var(--muted);
    }

    button {
      margin-top: 18px;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      color: #06111d;
      background: linear-gradient(135deg, var(--goal), #ffd774);
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="panel">
        <div class="eyebrow">Physics Toy</div>
        <h1>磁力弹珠台：双人同屏对战</h1>
        <p>两名玩家分别控制屏幕左右两侧的磁铁，轮流切换吸引与排斥，把共享弹珠送进对手底线。每 10 秒场上会落下一块固定挡板，随机加速道具则会进一步放大瞬间变线。</p>
      </div>
      <div class="panel">
        <div class="stats">
          <div class="stat">
            <div class="meta">Player 1</div>
            <strong id="score-left">0</strong>
          </div>
          <div class="stat">
            <div class="meta">Player 2</div>
            <strong id="score-right">0</strong>
          </div>
          <div class="stat">
            <div class="meta">Obstacle In</div>
            <strong id="obstacle-timer">10.0s</strong>
          </div>
          <div class="stat">
            <div class="meta">Goal</div>
            <strong id="target-score">7</strong>
          </div>
        </div>
        <div class="controls">
          <div class="control">
            <strong class="p1">玩家 1</strong>
            <span>WASD 移动磁铁，Q 切换吸引，E 切换排斥。</span>
          </div>
          <div class="control">
            <strong class="p2">玩家 2</strong>
            <span>方向键移动磁铁，逗号切换吸引，句号切换排斥。</span>
          </div>
        </div>
      </div>
    </section>

    <section class="stage">
      <canvas id="game" width="1200" height="720" aria-label="磁力弹珠台：双人同屏对战画布"></canvas>
      <div class="overlay">
        <div class="overlay-card visible" id="overlay-card">
          <h2 id="overlay-title">磁力弹珠台</h2>
          <p id="overlay-text">打开即玩。先把弹珠送进对手底线拿到 7 分，按空格开始，胜利后可重新开始。</p>
          <button id="restart-button" type="button">重新开始</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const magneticPinballDuel = (() => {
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const overlayCard = document.querySelector("#overlay-card");
      const overlayTitle = document.querySelector("#overlay-title");
      const overlayText = document.querySelector("#overlay-text");
      const restartButton = document.querySelector("#restart-button");
      const scoreLeftLabel = document.querySelector("#score-left");
      const scoreRightLabel = document.querySelector("#score-right");
      const obstacleTimerLabel = document.querySelector("#obstacle-timer");
      const targetScoreLabel = document.querySelector("#target-score");

      const WIDTH = canvas.width;
      const HEIGHT = canvas.height;
      const CENTER_X = WIDTH / 2;
      const TARGET_SCORE = 7;
      const MAX_DT = 0.032;
      const MAGNET_RADIUS = 26;
      const BALL_RADIUS = 13;
      const PICKUP_RADIUS = 14;
      const MAX_SPEED = 980;
      const FRICTION = 0.996;
      const WALL_BOUNCE = 0.96;
      const MAGNET_FORCE = 210000;
      const MAGNET_COLLISION_PUSH = 520;
      const GOAL_FLASH = 0.42;
      const OBSTACLE_INTERVAL = 10;
      const PICKUP_INTERVAL = 14;
      const MAX_OBSTACLES = 5;
      const BALL_TRAIL_LENGTH = 18;

      const state = {
        keysPressed: new Set(),
        lastTime: 0,
        running: false,
        winner: "",
        goalFlash: { left: 0, right: 0 },
        obstacleTimer: OBSTACLE_INTERVAL,
        pickupTimer: PICKUP_INTERVAL,
        resetTimer: 0,
        particles: [],
        obstacles: [],
        pickups: [],
        players: {
          left: {
            name: "玩家 1",
            score: 0,
            polarity: 1,
            color: "#76d6ff",
            controls: {
              up: "KeyW",
              down: "KeyS",
              left: "KeyA",
              right: "KeyD",
              attract: "KeyQ",
              repel: "KeyE"
            },
            magnet: { x: WIDTH * 0.2, y: HEIGHT / 2, vx: 0, vy: 0 }
          },
          right: {
            name: "玩家 2",
            score: 0,
            polarity: -1,
            color: "#ff8dad",
            controls: {
              up: "ArrowUp",
              down: "ArrowDown",
              left: "ArrowLeft",
              right: "ArrowRight",
              attract: "Comma",
              repel: "Period"
            },
            magnet: { x: WIDTH * 0.8, y: HEIGHT / 2, vx: 0, vy: 0 }
          }
        },
        ball: {
          x: CENTER_X,
          y: HEIGHT / 2,
          vx: 0,
          vy: 0,
          radius: BALL_RADIUS,
          trail: []
        }
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function randomRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function setOverlay(visible, title, text) {
        overlayCard.classList.toggle("visible", visible);
        overlayTitle.textContent = title;
        overlayText.textContent = text;
      }

      function updateHud() {
        scoreLeftLabel.textContent = String(state.players.left.score);
        scoreRightLabel.textContent = String(state.players.right.score);
        obstacleTimerLabel.textContent = `${state.obstacleTimer.toFixed(1)}s`;
        targetScoreLabel.textContent = String(TARGET_SCORE);
      }

      function addParticles(x, y, color, amount) {
        for (let i = 0; i < amount; i += 1) {
          state.particles.push({
            x,
            y,
            vx: randomRange(-220, 220),
            vy: randomRange(-220, 220),
            life: randomRange(0.25, 0.55),
            age: 0,
            size: randomRange(2, 4),
            color
          });
        }
        if (state.particles.length > 180) {
          state.particles.splice(0, state.particles.length - 180);
        }
      }

      function resetBall(direction = 1) {
        state.ball.x = CENTER_X;
        state.ball.y = HEIGHT / 2 + randomRange(-40, 40);
        state.ball.vx = 210 * direction;
        state.ball.vy = randomRange(-150, 150);
        state.ball.trail = [];
      }

      function startRound(direction = Math.random() > 0.5 ? 1 : -1) {
        state.resetTimer = 0;
        resetBall(direction);
        state.running = true;
        state.winner = "";
        setOverlay(false, "", "");
      }

      function resetMatch() {
        state.players.left.score = 0;
        state.players.right.score = 0;
        state.players.left.polarity = 1;
        state.players.right.polarity = -1;
        state.players.left.magnet.x = WIDTH * 0.2;
        state.players.left.magnet.y = HEIGHT / 2;
        state.players.right.magnet.x = WIDTH * 0.8;
        state.players.right.magnet.y = HEIGHT / 2;
        state.players.left.magnet.vx = 0;
        state.players.left.magnet.vy = 0;
        state.players.right.magnet.vx = 0;
        state.players.right.magnet.vy = 0;
        state.goalFlash.left = 0;
        state.goalFlash.right = 0;
        state.obstacleTimer = OBSTACLE_INTERVAL;
        state.pickupTimer = PICKUP_INTERVAL;
        state.obstacles = [];
        state.pickups = [];
        state.particles = [];
        updateHud();
        startRound();
      }

      function awardPoint(playerKey) {
        state.players[playerKey].score += 1;
        state.goalFlash[playerKey] = GOAL_FLASH;
        addParticles(state.ball.x, state.ball.y, playerKey === "left" ? "#80ffb9" : "#ffd774", 18);
        updateHud();

        if (state.players[playerKey].score >= TARGET_SCORE) {
          state.running = false;
          state.winner = state.players[playerKey].name;
          setOverlay(true, `${state.winner} 获胜`, `比分 ${state.players.left.score} : ${state.players.right.score}。点击按钮或按空格重新开始。`);
          return;
        }

        state.running = false;
        state.resetTimer = 1.1;
      }

      function handleGoalCheck() {
        if (state.ball.x - state.ball.radius <= 0) {
          awardPoint("right");
        } else if (state.ball.x + state.ball.radius >= WIDTH) {
          awardPoint("left");
        }
      }

      function updateMagnet(player, dt, bounds) {
        const moveSpeed = 360;
        let dx = 0;
        let dy = 0;
        if (state.keysPressed.has(player.controls.left)) dx -= 1;
        if (state.keysPressed.has(player.controls.right)) dx += 1;
        if (state.keysPressed.has(player.controls.up)) dy -= 1;
        if (state.keysPressed.has(player.controls.down)) dy += 1;

        const length = Math.hypot(dx, dy) || 1;
        player.magnet.vx = (dx / length) * moveSpeed;
        player.magnet.vy = (dy / length) * moveSpeed;
        player.magnet.x = clamp(player.magnet.x + player.magnet.vx * dt, bounds.minX, bounds.maxX);
        player.magnet.y = clamp(player.magnet.y + player.magnet.vy * dt, bounds.minY, bounds.maxY);
      }

      function applyMagneticForce(player, dt) {
        const dx = player.magnet.x - state.ball.x;
        const dy = player.magnet.y - state.ball.y;
        const distanceSq = clamp(dx * dx + dy * dy, 3000, 220000);
        const distance = Math.sqrt(distanceSq);
        const direction = player.polarity;
        const force = (MAGNET_FORCE / distanceSq) * direction * dt;
        state.ball.vx += (dx / distance) * force;
        state.ball.vy += (dy / distance) * force;
      }

      function resolveMagnetCollision(player) {
        const dx = state.ball.x - player.magnet.x;
        const dy = state.ball.y - player.magnet.y;
        const distance = Math.hypot(dx, dy);
        const minDistance = state.ball.radius + MAGNET_RADIUS;
        if (!distance || distance >= minDistance) {
          return;
        }
        const nx = dx / distance;
        const ny = dy / distance;
        const overlap = minDistance - distance;
        state.ball.x += nx * overlap;
        state.ball.y += ny * overlap;
        state.ball.vx += nx * MAGNET_COLLISION_PUSH;
        state.ball.vy += ny * MAGNET_COLLISION_PUSH;
      }

      function resolveWallCollision() {
        if (state.ball.y - state.ball.radius <= 0) {
          state.ball.y = state.ball.radius;
          state.ball.vy = Math.abs(state.ball.vy) * WALL_BOUNCE;
        } else if (state.ball.y + state.ball.radius >= HEIGHT) {
          state.ball.y = HEIGHT - state.ball.radius;
          state.ball.vy = -Math.abs(state.ball.vy) * WALL_BOUNCE;
        }
      }

      function circleRectCollision(circle, rect) {
        const nearestX = clamp(circle.x, rect.x, rect.x + rect.width);
        const nearestY = clamp(circle.y, rect.y, rect.y + rect.height);
        const dx = circle.x - nearestX;
        const dy = circle.y - nearestY;
        return dx * dx + dy * dy <= circle.radius * circle.radius;
      }

      function resolveObstacleCollision(rect) {
        const nearestX = clamp(state.ball.x, rect.x, rect.x + rect.width);
        const nearestY = clamp(state.ball.y, rect.y, rect.y + rect.height);
        const dx = state.ball.x - nearestX;
        const dy = state.ball.y - nearestY;
        const hitX = Math.abs(dx) > Math.abs(dy);

        if (hitX) {
          state.ball.vx *= -WALL_BOUNCE;
          state.ball.x += Math.sign(dx || state.ball.vx || 1) * 8;
        } else {
          state.ball.vy *= -WALL_BOUNCE;
          state.ball.y += Math.sign(dy || state.ball.vy || 1) * 8;
        }
      }

      function trySpawnObstacle() {
        if (state.obstacles.length >= MAX_OBSTACLES) {
          state.obstacles.shift();
        }

        for (let attempt = 0; attempt < 18; attempt += 1) {
          const width = randomRange(70, 130);
          const height = randomRange(20, 34);
          const obstacle = {
            x: randomRange(WIDTH * 0.2, WIDTH * 0.8 - width),
            y: randomRange(70, HEIGHT - 70 - height),
            width,
            height
          };

          const blocked =
            circleRectCollision({ x: state.ball.x, y: state.ball.y, radius: 80 }, obstacle) ||
            circleRectCollision({ x: state.players.left.magnet.x, y: state.players.left.magnet.y, radius: 90 }, obstacle) ||
            circleRectCollision({ x: state.players.right.magnet.x, y: state.players.right.magnet.y, radius: 90 }, obstacle);

          if (!blocked) {
            state.obstacles.push(obstacle);
            addParticles(obstacle.x + obstacle.width / 2, obstacle.y + obstacle.height / 2, "#ffd774", 10);
            break;
          }
        }
      }

      function trySpawnPickup() {
        state.pickups = [];
        for (let attempt = 0; attempt < 16; attempt += 1) {
          const pickup = {
            x: randomRange(WIDTH * 0.3, WIDTH * 0.7),
            y: randomRange(80, HEIGHT - 80),
            radius: PICKUP_RADIUS,
            life: 8
          };
          const blocked = state.obstacles.some((rect) => circleRectCollision({ x: pickup.x, y: pickup.y, radius: 34 }, rect));
          if (!blocked) {
            state.pickups.push(pickup);
            break;
          }
        }
      }

      function handlePickups(dt) {
        state.pickups = state.pickups.filter((pickup) => pickup.life > 0);
        for (const pickup of state.pickups) {
          pickup.life -= dt;
          const dx = state.ball.x - pickup.x;
          const dy = state.ball.y - pickup.y;
          const radius = state.ball.radius + pickup.radius;
          if (dx * dx + dy * dy <= radius * radius) {
            state.ball.vx *= 1.35;
            state.ball.vy *= 1.35;
            addParticles(pickup.x, pickup.y, "#80ffb9", 14);
            pickup.life = 0;
          }
        }
      }

      function updateBall(dt) {
        applyMagneticForce(state.players.left, dt);
        applyMagneticForce(state.players.right, dt);

        const speed = Math.hypot(state.ball.vx, state.ball.vy);
        if (speed > MAX_SPEED) {
          const scale = MAX_SPEED / speed;
          state.ball.vx *= scale;
          state.ball.vy *= scale;
        }

        state.ball.vx *= FRICTION;
        state.ball.vy *= FRICTION;
        state.ball.x += state.ball.vx * dt;
        state.ball.y += state.ball.vy * dt;

        resolveMagnetCollision(state.players.left);
        resolveMagnetCollision(state.players.right);
        resolveWallCollision();

        for (const obstacle of state.obstacles) {
          if (circleRectCollision(state.ball, obstacle)) {
            resolveObstacleCollision(obstacle);
          }
        }

        state.ball.trail.push({ x: state.ball.x, y: state.ball.y });
        if (state.ball.trail.length > BALL_TRAIL_LENGTH) {
          state.ball.trail.shift();
        }

        handlePickups(dt);
        handleGoalCheck();
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => particle.age < particle.life);
        for (const particle of state.particles) {
          particle.age += dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.98;
          particle.vy *= 0.98;
        }
      }

      function updateTimers(dt) {
        if (state.goalFlash.left > 0) state.goalFlash.left -= dt;
        if (state.goalFlash.right > 0) state.goalFlash.right -= dt;

        if (state.running) {
          state.obstacleTimer -= dt;
          state.pickupTimer -= dt;
          if (state.obstacleTimer <= 0) {
            state.obstacleTimer += OBSTACLE_INTERVAL;
            trySpawnObstacle();
          }
          if (state.pickupTimer <= 0) {
            state.pickupTimer += PICKUP_INTERVAL;
            trySpawnPickup();
          }
        } else if (state.resetTimer > 0) {
          state.resetTimer -= dt;
          if (state.resetTimer <= 0) {
            startRound(Math.random() > 0.5 ? 1 : -1);
          }
        }

        updateHud();
      }

      function drawField() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = "rgba(128,255,185,0.08)";
        ctx.fillRect(0, 0, 12, HEIGHT);
        ctx.fillStyle = "rgba(255,117,143,0.08)";
        ctx.fillRect(WIDTH - 12, 0, 12, HEIGHT);

        ctx.strokeStyle = "rgba(184, 213, 255, 0.16)";
        ctx.lineWidth = 2;
        ctx.setLineDash([10, 12]);
        ctx.beginPath();
        ctx.moveTo(CENTER_X, 20);
        ctx.lineTo(CENTER_X, HEIGHT - 20);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.strokeStyle = `rgba(128,255,185,${state.goalFlash.left})`;
        ctx.lineWidth = 14;
        ctx.beginPath();
        ctx.moveTo(6, 30);
        ctx.lineTo(6, HEIGHT - 30);
        ctx.stroke();

        ctx.strokeStyle = `rgba(255,117,143,${state.goalFlash.right})`;
        ctx.beginPath();
        ctx.moveTo(WIDTH - 6, 30);
        ctx.lineTo(WIDTH - 6, HEIGHT - 30);
        ctx.stroke();
      }

      function drawObstacle(rect) {
        ctx.fillStyle = "rgba(255, 215, 116, 0.2)";
        ctx.strokeStyle = "rgba(255, 215, 116, 0.72)";
        ctx.lineWidth = 2;
        ctx.fillRect(rect.x, rect.y, rect.width, rect.height);
        ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);
      }

      function drawPickup(pickup) {
        const pulse = 0.5 + Math.sin(performance.now() * 0.01) * 0.2;
        ctx.save();
        ctx.translate(pickup.x, pickup.y);
        ctx.strokeStyle = `rgba(128,255,185,${pulse})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, pickup.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-8, 0);
        ctx.lineTo(8, 0);
        ctx.moveTo(0, -8);
        ctx.lineTo(0, 8);
        ctx.stroke();
        ctx.restore();
      }

      function drawMagnet(player) {
        const magnet = player.magnet;
        const attract = player.polarity > 0;
        ctx.save();
        ctx.translate(magnet.x, magnet.y);

        ctx.strokeStyle = attract ? "rgba(255,204,102,0.85)" : "rgba(141,169,255,0.85)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, MAGNET_RADIUS + 6, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.arc(0, 0, MAGNET_RADIUS, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#06111d";
        ctx.font = "bold 20px Segoe UI";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(attract ? "+" : "-", 0, 1);
        ctx.restore();

        ctx.strokeStyle = attract ? "rgba(255,204,102,0.22)" : "rgba(141,169,255,0.22)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(magnet.x, magnet.y);
        ctx.lineTo(state.ball.x, state.ball.y);
        ctx.stroke();
      }

      function drawBall() {
        state.ball.trail.forEach((point, index) => {
          const alpha = (index + 1) / state.ball.trail.length * 0.24;
          ctx.fillStyle = `rgba(244,248,255,${alpha})`;
          ctx.beginPath();
          ctx.arc(point.x, point.y, 4 + index * 0.18, 0, Math.PI * 2);
          ctx.fill();
        });

        ctx.fillStyle = "rgba(244,248,255,0.96)";
        ctx.beginPath();
        ctx.arc(state.ball.x, state.ball.y, state.ball.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawParticles() {
        for (const particle of state.particles) {
          const alpha = 1 - particle.age / particle.life;
          ctx.fillStyle = particle.color.replace(")", `, ${alpha})`).replace("rgb", "rgba");
          if (!particle.color.includes("rgb")) {
            ctx.fillStyle = particle.color;
            ctx.globalAlpha = alpha;
          }
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function render() {
        drawField();
        state.obstacles.forEach(drawObstacle);
        state.pickups.forEach(drawPickup);
        drawMagnet(state.players.left);
        drawMagnet(state.players.right);
        drawBall();
        drawParticles();
      }

      function update(dt) {
        updateMagnet(state.players.left, dt, {
          minX: 40,
          maxX: CENTER_X - 70,
          minY: 40,
          maxY: HEIGHT - 40
        });
        updateMagnet(state.players.right, dt, {
          minX: CENTER_X + 70,
          maxX: WIDTH - 40,
          minY: 40,
          maxY: HEIGHT - 40
        });

        if (state.running) {
          updateBall(dt);
        }
        updateParticles(dt);
        updateTimers(dt);
      }

      function tick(timestamp) {
        if (!state.lastTime) {
          state.lastTime = timestamp;
        }
        const dt = Math.min(MAX_DT, (timestamp - state.lastTime) / 1000);
        state.lastTime = timestamp;
        update(dt);
        render();
        requestAnimationFrame(tick);
      }

      function handleKeyDown(event) {
        if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Comma", "Period"].includes(event.code)) {
          event.preventDefault();
        }

        state.keysPressed.add(event.code);

        if (event.code === state.players.left.controls.attract) {
          state.players.left.polarity = 1;
        } else if (event.code === state.players.left.controls.repel) {
          state.players.left.polarity = -1;
        } else if (event.code === state.players.right.controls.attract) {
          state.players.right.polarity = 1;
        } else if (event.code === state.players.right.controls.repel) {
          state.players.right.polarity = -1;
        } else if (event.code === "Space" && (!state.running || state.winner || overlayCard.classList.contains("visible"))) {
          resetMatch();
        }
      }

      function handleKeyUp(event) {
        state.keysPressed.delete(event.code);
      }

      restartButton.addEventListener("click", resetMatch);
      window.addEventListener("keydown", handleKeyDown);
      window.addEventListener("keyup", handleKeyUp);

      updateHud();
      render();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
