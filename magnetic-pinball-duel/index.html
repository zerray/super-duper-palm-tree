<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双人磁力弹珠台</title>
  <style>
    :root {
      --bg-1: #08111d;
      --bg-2: #03070d;
      --panel: rgba(7, 14, 25, 0.86);
      --line: rgba(132, 208, 255, 0.18);
      --text: #eff7ff;
      --muted: #8ba0b8;
      --p1: #74d4ff;
      --p2: #ff8ea9;
      --goal-1: #6df5c5;
      --goal-2: #ffd05f;
      --north: #ff6f61;
      --south: #79a7ff;
      --amp: #7aff9a;
      --wall: #ffc85a;
      --split: #d28fff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% 18%, rgba(121, 167, 255, 0.12), transparent 30%),
        radial-gradient(circle at 50% 82%, rgba(255, 111, 97, 0.12), transparent 30%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
    }

    .app {
      width: min(1240px, calc(100vw - 20px));
      margin: 0 auto;
      padding: 10px 0 18px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel {
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(12px);
    }

    .eyebrow,
    .meta,
    .lane small {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 6px 0 8px;
      font-size: clamp(2rem, 5vw, 3.7rem);
      line-height: 0.94;
    }

    p {
      margin: 0;
      line-height: 1.55;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat,
    .lane,
    .pickup {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-size: 1.4rem;
    }

    .legend {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .lane {
      display: grid;
      gap: 5px;
    }

    .lane strong {
      font-size: 1rem;
    }

    .p1 {
      color: var(--p1);
    }

    .p2 {
      color: var(--p2);
    }

    .pickups {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .pickup {
      display: grid;
      gap: 4px;
      font-size: 0.92rem;
    }

    .pickup strong {
      font-size: 0.95rem;
    }

    .stage {
      position: relative;
      padding: 12px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.04), transparent 26%),
        linear-gradient(180deg, rgba(10, 18, 30, 0.96), rgba(4, 8, 14, 0.98));
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 20px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03), transparent 32%),
        linear-gradient(180deg, #0f1c31 0%, #050912 100%);
    }

    .overlay {
      position: absolute;
      inset: 22px;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .overlay-card {
      width: min(480px, calc(100% - 20px));
      padding: 22px 24px;
      border-radius: 24px;
      text-align: center;
      border: 1px solid rgba(255, 208, 95, 0.28);
      background: rgba(4, 10, 18, 0.92);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.38);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .overlay-card.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .overlay-card h2 {
      margin: 0 0 10px;
      font-size: 1.8rem;
    }

    .overlay-card p {
      color: var(--muted);
    }

    button {
      margin-top: 18px;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      color: #04111d;
      background: linear-gradient(135deg, var(--p1), var(--goal-2));
    }

    @media (max-width: 940px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .stats,
      .pickups {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .stats,
      .pickups {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="panel">
        <div class="eyebrow">Physics Toy</div>
        <h1>双人磁力弹珠台</h1>
        <p>页面打开后立即进入同屏双人对战。玩家 1 守下方，玩家 2 守上方，把带磁性的弹珠轰进对手底线。中央区域会随机刷出磁力增幅、反弹壁和弹珠分裂，让每次交锋都失控一点。</p>
      </div>
      <div class="panel">
        <div class="stats">
          <div class="stat">
            <div class="meta">Player 1</div>
            <strong id="score-bottom">0</strong>
          </div>
          <div class="stat">
            <div class="meta">Player 2</div>
            <strong id="score-top">0</strong>
          </div>
          <div class="stat">
            <div class="meta">Target</div>
            <strong id="target-score">7</strong>
          </div>
          <div class="stat">
            <div class="meta">Next Polarity</div>
            <strong id="polarity-indicator">N / S</strong>
          </div>
        </div>
        <div class="legend">
          <div class="lane">
            <small>Bottom Launcher</small>
            <strong class="p1">Player 1: A/D 瞄准，W 发射</strong>
          </div>
          <div class="lane">
            <small>Top Launcher</small>
            <strong class="p2">Player 2: ←/→ 瞄准，↑ 发射</strong>
          </div>
        </div>
        <div class="pickups">
          <div class="pickup">
            <strong style="color:var(--amp)">磁力增幅</strong>
            <span>短时间强化该弹珠的吸引/排斥</span>
          </div>
          <div class="pickup">
            <strong style="color:var(--wall)">反弹壁</strong>
            <span>中央生成临时障碍物改写弹道</span>
          </div>
          <div class="pickup">
            <strong style="color:var(--split)">弹珠分裂</strong>
            <span>把命中的弹珠拆成两颗小球</span>
          </div>
        </div>
      </div>
    </section>

    <section class="stage">
      <canvas id="game" width="1280" height="820" aria-label="双人磁力弹珠台画布"></canvas>
      <div class="overlay">
        <div class="overlay-card" id="overlay-card">
          <h2 id="overlay-title">胜利</h2>
          <p id="overlay-text"></p>
          <button id="restart-button" type="button">一键重开</button>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
  <script>
    const { Engine, World, Bodies, Body, Events, Vector } = Matter;

    const magneticPinballDuel = (() => {
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const overlayCard = document.querySelector("#overlay-card");
      const overlayTitle = document.querySelector("#overlay-title");
      const overlayText = document.querySelector("#overlay-text");
      const restartButton = document.querySelector("#restart-button");
      const scoreBottomLabel = document.querySelector("#score-bottom");
      const scoreTopLabel = document.querySelector("#score-top");
      const targetScoreLabel = document.querySelector("#target-score");
      const polarityIndicatorLabel = document.querySelector("#polarity-indicator");

      const WIDTH = canvas.width;
      const HEIGHT = canvas.height;
      const TARGET_SCORE = 7;
      const GOAL_DEPTH = 34;
      const SIDE_MARGIN = 76;
      const LAUNCHER_Y_BOTTOM = HEIGHT - 84;
      const LAUNCHER_Y_TOP = 84;
      const POWERUP_INTERVAL = 4.2;
      const MAGNET_STRENGTH = 0.000018;
      const POWERUP_RADIUS = 20;
      const MAX_BALLS = 12;
      const BALL_COLORS = { N: "#ff6f61", S: "#79a7ff" };
      const POWERUP_TYPES = ["amp", "wall", "split"];

      const engine = Engine.create({ gravity: { x: 0, y: 0 } });
      const state = {
        running: true,
        winner: "",
        lastTime: 0,
        forceLines: [],
        particles: [],
        flashes: [],
        powerupTimer: POWERUP_INTERVAL,
        wallTimer: 0,
        nextPolarity: "N",
        players: {
          bottom: {
            name: "Player 1",
            score: 0,
            aim: -Math.PI / 2,
            aimMin: -Math.PI * 0.86,
            aimMax: -Math.PI * 0.14,
            launcher: { x: WIDTH / 2, y: LAUNCHER_Y_BOTTOM },
            keys: { left: "KeyA", right: "KeyD", fire: "KeyW" },
            tint: "#74d4ff"
          },
          top: {
            name: "Player 2",
            score: 0,
            aim: Math.PI / 2,
            aimMin: Math.PI * 0.14,
            aimMax: Math.PI * 0.86,
            launcher: { x: WIDTH / 2, y: LAUNCHER_Y_TOP },
            keys: { left: "ArrowLeft", right: "ArrowRight", fire: "ArrowUp" },
            tint: "#ff8ea9"
          }
        },
        input: new Set(),
        cooldowns: { bottom: 0, top: 0 },
        walls: {},
        marbles: [],
        powerups: [],
        bounceWalls: []
      };

      function createStaticArena() {
        const thickness = 48;
        const leftWall = Bodies.rectangle(SIDE_MARGIN - thickness / 2, HEIGHT / 2, thickness, HEIGHT, {
          isStatic: true,
          restitution: 0.96,
          label: "boundary"
        });
        const rightWall = Bodies.rectangle(WIDTH - SIDE_MARGIN + thickness / 2, HEIGHT / 2, thickness, HEIGHT, {
          isStatic: true,
          restitution: 0.96,
          label: "boundary"
        });
        const topGoalSensor = Bodies.rectangle(WIDTH / 2, GOAL_DEPTH / 2, WIDTH - SIDE_MARGIN * 2, GOAL_DEPTH, {
          isStatic: true,
          isSensor: true,
          label: "goal-top"
        });
        const bottomGoalSensor = Bodies.rectangle(WIDTH / 2, HEIGHT - GOAL_DEPTH / 2, WIDTH - SIDE_MARGIN * 2, GOAL_DEPTH, {
          isStatic: true,
          isSensor: true,
          label: "goal-bottom"
        });
        const topGuideLeft = Bodies.rectangle(SIDE_MARGIN + 80, 58, 140, 22, { isStatic: true, angle: 0.18, restitution: 1, label: "boundary" });
        const topGuideRight = Bodies.rectangle(WIDTH - SIDE_MARGIN - 80, 58, 140, 22, { isStatic: true, angle: -0.18, restitution: 1, label: "boundary" });
        const bottomGuideLeft = Bodies.rectangle(SIDE_MARGIN + 80, HEIGHT - 58, 140, 22, { isStatic: true, angle: -0.18, restitution: 1, label: "boundary" });
        const bottomGuideRight = Bodies.rectangle(WIDTH - SIDE_MARGIN - 80, HEIGHT - 58, 140, 22, { isStatic: true, angle: 0.18, restitution: 1, label: "boundary" });
        const centerPillarLeft = Bodies.rectangle(WIDTH / 2 - 120, HEIGHT / 2, 20, 140, { isStatic: true, angle: 0.18, restitution: 1.02, label: "boundary" });
        const centerPillarRight = Bodies.rectangle(WIDTH / 2 + 120, HEIGHT / 2, 20, 140, { isStatic: true, angle: -0.18, restitution: 1.02, label: "boundary" });

        state.walls = {
          leftWall,
          rightWall,
          topGoalSensor,
          bottomGoalSensor,
          topGuideLeft,
          topGuideRight,
          bottomGuideLeft,
          bottomGuideRight,
          centerPillarLeft,
          centerPillarRight
        };
        World.add(engine.world, Object.values(state.walls));
      }

      function updateHud() {
        scoreBottomLabel.textContent = String(state.players.bottom.score);
        scoreTopLabel.textContent = String(state.players.top.score);
        targetScoreLabel.textContent = String(TARGET_SCORE);
        polarityIndicatorLabel.textContent = `${state.nextPolarity} / ${state.nextPolarity === "N" ? "S" : "N"}`;
      }

      function setOverlay(visible, title = "", text = "") {
        overlayTitle.textContent = title;
        overlayText.textContent = text;
        overlayCard.classList.toggle("visible", visible);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function randomRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function addParticle(x, y, color, scale = 1) {
        state.particles.push({
          x,
          y,
          vx: randomRange(-120, 120) * scale,
          vy: randomRange(-120, 120) * scale,
          life: randomRange(0.18, 0.42),
          age: 0,
          color
        });
        if (state.particles.length > 320) {
          state.particles.splice(0, state.particles.length - 320);
        }
      }

      function addFlash(color) {
        state.flashes.push({ color, age: 0, life: 0.2 });
      }

      function clearBodies(collection) {
        for (const body of collection) {
          World.remove(engine.world, body);
        }
      }

      function resetRound() {
        clearBodies(state.marbles);
        clearBodies(state.powerups);
        clearBodies(state.bounceWalls);
        state.marbles = [];
        state.powerups = [];
        state.bounceWalls = [];
        state.forceLines = [];
        state.particles = [];
        state.flashes = [];
        state.powerupTimer = POWERUP_INTERVAL;
        state.wallTimer = 0;
        state.cooldowns.bottom = 0;
        state.cooldowns.top = 0;
        state.nextPolarity = "N";
      }

      function resetGame() {
        state.players.bottom.score = 0;
        state.players.top.score = 0;
        state.players.bottom.aim = -Math.PI / 2;
        state.players.top.aim = Math.PI / 2;
        state.running = true;
        state.winner = "";
        setOverlay(false);
        resetRound();
        updateHud();
      }

      function createMarble(playerKey, x, y, vx, vy, radius = 14, ownerOverride = null, polarityOverride = null, advancePolarity = true) {
        if (state.marbles.length >= MAX_BALLS) {
          return null;
        }
        const polarity = polarityOverride || state.nextPolarity;
        const marble = Bodies.circle(x, y, radius, {
          restitution: 0.97,
          frictionAir: 0.006,
          friction: 0,
          frictionStatic: 0,
          density: 0.0012,
          label: "marble"
        });
        marble.plugin = {
          owner: ownerOverride || playerKey,
          polarity,
          trail: [],
          ampTimer: 0,
          scored: false
        };
        Body.setVelocity(marble, { x: vx, y: vy });
        state.marbles.push(marble);
        World.add(engine.world, marble);
        addParticle(x, y, BALL_COLORS[polarity], 1.2);
        if (advancePolarity) {
          state.nextPolarity = state.nextPolarity === "N" ? "S" : "N";
        }
        updateHud();
        return marble;
      }

      function fireMarble(playerKey) {
        if (!state.running || state.cooldowns[playerKey] > 0 || state.marbles.length >= MAX_BALLS) {
          return;
        }
        const player = state.players[playerKey];
        const muzzle = 42;
        const x = player.launcher.x + Math.cos(player.aim) * muzzle;
        const y = player.launcher.y + Math.sin(player.aim) * muzzle;
        const speed = 14;
        createMarble(playerKey, x, y, Math.cos(player.aim) * speed, Math.sin(player.aim) * speed);
        state.cooldowns[playerKey] = 0.5;
      }

      function spawnPowerup() {
        if (!state.running || state.powerups.length > 1) {
          return;
        }
        const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
        const body = Bodies.circle(
          randomRange(WIDTH * 0.28, WIDTH * 0.72),
          randomRange(HEIGHT * 0.38, HEIGHT * 0.62),
          POWERUP_RADIUS,
          { isStatic: true, isSensor: true, label: `powerup-${type}` }
        );
        body.plugin = { type, pulse: randomRange(0, Math.PI * 2) };
        state.powerups.push(body);
        World.add(engine.world, body);
      }

      function spawnBounceWall() {
        clearBodies(state.bounceWalls);
        state.bounceWalls = [];
        const wall = Bodies.rectangle(
          randomRange(WIDTH * 0.34, WIDTH * 0.66),
          randomRange(HEIGHT * 0.34, HEIGHT * 0.66),
          randomRange(140, 210),
          18,
          { isStatic: true, angle: randomRange(-0.9, 0.9), restitution: 1.04, label: "bounce-wall" }
        );
        wall.plugin = { width: wall.bounds.max.x - wall.bounds.min.x, height: wall.bounds.max.y - wall.bounds.min.y };
        state.bounceWalls.push(wall);
        state.wallTimer = 5.4;
        World.add(engine.world, wall);
      }

      function applyPowerup(type, marble) {
        if (!marble || marble.plugin.scored) {
          return;
        }
        if (type === "amp") {
          marble.plugin.ampTimer = 4;
          addFlash("rgba(122, 255, 154, 0.18)");
        } else if (type === "wall") {
          spawnBounceWall();
          addFlash("rgba(255, 200, 90, 0.18)");
        } else if (type === "split") {
          const velocity = marble.velocity;
          const owner = marble.plugin.owner;
          const polarity = marble.plugin.polarity;
          const splitA = createMarble(owner, marble.position.x - 10, marble.position.y, velocity.x - 2, velocity.y + 1.5, 10, owner, polarity, false);
          const splitB = createMarble(owner, marble.position.x + 10, marble.position.y, velocity.x + 2, velocity.y - 1.5, 10, owner, polarity === "N" ? "S" : "N", false);
          if (splitA || splitB) {
            World.remove(engine.world, marble);
            state.marbles = state.marbles.filter((item) => item !== marble);
          }
          addFlash("rgba(210, 143, 255, 0.18)");
        }
      }

      function scorePoint(playerKey, marble) {
        if (!state.running || marble.plugin.scored) {
          return;
        }
        marble.plugin.scored = true;
        state.players[playerKey].score += 1;
        addFlash(playerKey === "bottom" ? "rgba(109, 245, 197, 0.22)" : "rgba(255, 208, 95, 0.22)");
        for (let i = 0; i < 18; i += 1) {
          addParticle(marble.position.x, marble.position.y, playerKey === "bottom" ? "rgba(109,245,197,0.95)" : "rgba(255,208,95,0.95)", 1.4);
        }
        World.remove(engine.world, marble);
        state.marbles = state.marbles.filter((item) => item !== marble);
        updateHud();

        if (state.players[playerKey].score >= TARGET_SCORE) {
          state.running = false;
          state.winner = state.players[playerKey].name;
          setOverlay(true, `${state.winner} 获胜`, `比分 ${state.players.bottom.score} : ${state.players.top.score}。点击下方按钮立即重开。`);
        }
      }

      function handleGoalCollision(goalLabel, marble) {
        if (goalLabel === "goal-top") {
          scorePoint("bottom", marble);
        } else if (goalLabel === "goal-bottom") {
          scorePoint("top", marble);
        }
      }

      function installCollisionHandlers() {
        Events.on(engine, "collisionStart", (event) => {
          for (const pair of event.pairs) {
            const labels = [pair.bodyA.label, pair.bodyB.label];
            const marble = pair.bodyA.label === "marble" ? pair.bodyA : pair.bodyB.label === "marble" ? pair.bodyB : null;
            if (!marble) {
              continue;
            }
            const goalLabel = labels.find((label) => label === "goal-top" || label === "goal-bottom");
            if (goalLabel) {
              handleGoalCollision(goalLabel, marble);
              continue;
            }
            const powerupLabel = labels.find((label) => label.startsWith("powerup-"));
            if (powerupLabel) {
              const powerup = pair.bodyA.label.startsWith("powerup-") ? pair.bodyA : pair.bodyB;
              applyPowerup(powerup.plugin.type, marble);
              World.remove(engine.world, powerup);
              state.powerups = state.powerups.filter((item) => item !== powerup);
            }
          }
        });
      }

      function updateInput(dt) {
        const aimSpeed = 2.6;
        const bottom = state.players.bottom;
        const top = state.players.top;

        if (state.input.has(bottom.keys.left)) {
          bottom.aim -= aimSpeed * dt;
        }
        if (state.input.has(bottom.keys.right)) {
          bottom.aim += aimSpeed * dt;
        }
        if (state.input.has(top.keys.left)) {
          top.aim += aimSpeed * dt;
        }
        if (state.input.has(top.keys.right)) {
          top.aim -= aimSpeed * dt;
        }

        bottom.aim = clamp(bottom.aim, bottom.aimMin, bottom.aimMax);
        top.aim = clamp(top.aim, top.aimMin, top.aimMax);
        state.cooldowns.bottom = Math.max(0, state.cooldowns.bottom - dt);
        state.cooldowns.top = Math.max(0, state.cooldowns.top - dt);
      }

      function updatePowerups(dt) {
        state.powerupTimer -= dt;
        if (state.powerupTimer <= 0) {
          spawnPowerup();
          state.powerupTimer = POWERUP_INTERVAL;
        }

        for (const powerup of state.powerups) {
          powerup.plugin.pulse += dt * 4;
        }

        if (state.wallTimer > 0) {
          state.wallTimer -= dt;
          if (state.wallTimer <= 0) {
            clearBodies(state.bounceWalls);
            state.bounceWalls = [];
          }
        }
      }

      function applyMagnetism(dt) {
        state.forceLines = [];
        for (let i = 0; i < state.marbles.length; i += 1) {
          const a = state.marbles[i];
          if (a.plugin.ampTimer > 0) {
            a.plugin.ampTimer -= dt;
          }
          for (let j = i + 1; j < state.marbles.length; j += 1) {
            const b = state.marbles[j];
            const delta = Vector.sub(b.position, a.position);
            const distanceSq = Math.max(Vector.magnitudeSquared(delta), 900);
            if (distanceSq > 220000) {
              continue;
            }
            const distance = Math.sqrt(distanceSq);
            const direction = Vector.normalise(delta);
            const sign = a.plugin.polarity === b.plugin.polarity ? -1 : 1;
            const ampMultiplier = (a.plugin.ampTimer > 0 ? 1.8 : 1) * (b.plugin.ampTimer > 0 ? 1.8 : 1);
            const magnitude = (MAGNET_STRENGTH * ampMultiplier * sign) / distanceSq;
            const force = Vector.mult(direction, magnitude);
            Body.applyForce(a, a.position, force);
            Body.applyForce(b, b.position, Vector.neg(force));
            state.forceLines.push({
              ax: a.position.x,
              ay: a.position.y,
              bx: b.position.x,
              by: b.position.y,
              sign,
              alpha: 1 - distance / 470
            });
            if (distance < 180 && Math.random() < 0.28) {
              const color = sign > 0 ? "rgba(113, 255, 198, 0.8)" : "rgba(255, 208, 95, 0.75)";
              addParticle((a.position.x + b.position.x) * 0.5, (a.position.y + b.position.y) * 0.5, color, 0.25);
            }
          }
        }
      }

      function pruneMarbles() {
        for (const marble of [...state.marbles]) {
          marble.plugin.trail.push({ x: marble.position.x, y: marble.position.y });
          if (marble.plugin.trail.length > 14) {
            marble.plugin.trail.shift();
          }
          const velocity = Vector.magnitude(marble.velocity);
          if (velocity > 18) {
            Body.setVelocity(marble, Vector.mult(Vector.normalise(marble.velocity), 18));
          }
          if (
            marble.position.x < -120 || marble.position.x > WIDTH + 120 ||
            marble.position.y < -120 || marble.position.y > HEIGHT + 120
          ) {
            World.remove(engine.world, marble);
            state.marbles = state.marbles.filter((item) => item !== marble);
          }
        }
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.age += dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.94;
          particle.vy *= 0.94;
          return particle.age < particle.life;
        });
        state.flashes = state.flashes.filter((flash) => {
          flash.age += dt;
          return flash.age < flash.life;
        });
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, HEIGHT);
        gradient.addColorStop(0, "rgba(18, 34, 58, 1)");
        gradient.addColorStop(0.5, "rgba(7, 12, 22, 1)");
        gradient.addColorStop(1, "rgba(22, 10, 20, 1)");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.strokeStyle = "rgba(132, 208, 255, 0.16)";
        ctx.lineWidth = 2;
        ctx.strokeRect(SIDE_MARGIN, GOAL_DEPTH, WIDTH - SIDE_MARGIN * 2, HEIGHT - GOAL_DEPTH * 2);
        ctx.setLineDash([12, 10]);
        ctx.beginPath();
        ctx.moveTo(SIDE_MARGIN, HEIGHT / 2);
        ctx.lineTo(WIDTH - SIDE_MARGIN, HEIGHT / 2);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.beginPath();
        ctx.arc(WIDTH / 2, HEIGHT / 2, 104, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = "rgba(109, 245, 197, 0.12)";
        ctx.fillRect(SIDE_MARGIN, 0, WIDTH - SIDE_MARGIN * 2, GOAL_DEPTH);
        ctx.fillStyle = "rgba(255, 208, 95, 0.12)";
        ctx.fillRect(SIDE_MARGIN, HEIGHT - GOAL_DEPTH, WIDTH - SIDE_MARGIN * 2, GOAL_DEPTH);
      }

      function drawLauncher(playerKey) {
        const player = state.players[playerKey];
        const tipX = player.launcher.x + Math.cos(player.aim) * 70;
        const tipY = player.launcher.y + Math.sin(player.aim) * 70;

        ctx.save();
        ctx.translate(player.launcher.x, player.launcher.y);
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.beginPath();
        ctx.arc(0, 0, 38, 0, Math.PI * 2);
        ctx.fill();
        ctx.rotate(player.aim);
        ctx.fillStyle = player.tint;
        ctx.fillRect(-9, -14, 72, 28);
        ctx.fillStyle = "rgba(255,255,255,0.25)";
        ctx.fillRect(14, -9, 26, 18);
        ctx.restore();

        ctx.strokeStyle = player.tint;
        ctx.lineWidth = 2;
        ctx.setLineDash([10, 8]);
        ctx.beginPath();
        ctx.moveTo(player.launcher.x, player.launcher.y);
        ctx.lineTo(player.launcher.x + Math.cos(player.aim) * 160, player.launcher.y + Math.sin(player.aim) * 160);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = BALL_COLORS[state.nextPolarity];
        ctx.beginPath();
        ctx.arc(tipX, tipY, 11, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawBounceWalls() {
        for (const wall of state.bounceWalls) {
          ctx.save();
          ctx.translate(wall.position.x, wall.position.y);
          ctx.rotate(wall.angle);
          ctx.fillStyle = "rgba(255, 200, 90, 0.18)";
          ctx.fillRect(-wall.plugin.width / 2, -wall.plugin.height / 2, wall.plugin.width, wall.plugin.height);
          ctx.strokeStyle = "rgba(255, 200, 90, 0.92)";
          ctx.lineWidth = 3;
          ctx.strokeRect(-wall.plugin.width / 2, -wall.plugin.height / 2, wall.plugin.width, wall.plugin.height);
          ctx.restore();
        }
      }

      function drawPowerups() {
        for (const powerup of state.powerups) {
          const { type, pulse } = powerup.plugin;
          const actualColor = type === "amp" ? "#7aff9a" : type === "wall" ? "#ffc85a" : "#d28fff";
          const radius = POWERUP_RADIUS + Math.sin(pulse) * 3;

          ctx.save();
          ctx.fillStyle = type === "amp" ? "rgba(122,255,154,0.16)" : type === "wall" ? "rgba(255,200,90,0.16)" : "rgba(210,143,255,0.16)";
          ctx.beginPath();
          ctx.arc(powerup.position.x, powerup.position.y, radius * 1.7, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = actualColor || "#ffffff";
          ctx.beginPath();
          ctx.arc(powerup.position.x, powerup.position.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#08111d";
          ctx.font = "700 13px Segoe UI";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(type === "amp" ? "M" : type === "wall" ? "B" : "S", powerup.position.x, powerup.position.y + 0.5);
          ctx.restore();
        }
      }

      function drawForceLines() {
        for (const line of state.forceLines) {
          ctx.strokeStyle = line.sign > 0 ? `rgba(113,255,198,${Math.max(0.1, line.alpha)})` : `rgba(255,208,95,${Math.max(0.1, line.alpha)})`;
          ctx.lineWidth = line.sign > 0 ? 2.2 : 1.6;
          ctx.beginPath();
          ctx.moveTo(line.ax, line.ay);
          ctx.lineTo(line.bx, line.by);
          ctx.stroke();
        }
      }

      function drawMarbles() {
        for (const marble of state.marbles) {
          for (let i = 0; i < marble.plugin.trail.length; i += 1) {
            const trail = marble.plugin.trail[i];
            const alpha = (i + 1) / marble.plugin.trail.length;
            ctx.fillStyle = `rgba(255,255,255,${alpha * 0.13})`;
            ctx.beginPath();
            ctx.arc(trail.x, trail.y, marble.circleRadius * Math.max(0.3, alpha * 0.8), 0, Math.PI * 2);
            ctx.fill();
          }

          const accent = BALL_COLORS[marble.plugin.polarity];
          const aura = ctx.createRadialGradient(marble.position.x, marble.position.y, 4, marble.position.x, marble.position.y, marble.circleRadius * 3);
          aura.addColorStop(0, "rgba(255,255,255,0.98)");
          aura.addColorStop(0.35, accent);
          aura.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = aura;
          ctx.beginPath();
          ctx.arc(marble.position.x, marble.position.y, marble.circleRadius * 3, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#f8fbff";
          ctx.beginPath();
          ctx.arc(marble.position.x, marble.position.y, marble.circleRadius, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = accent;
          ctx.lineWidth = marble.plugin.ampTimer > 0 ? 4 : 3;
          ctx.beginPath();
          ctx.arc(marble.position.x, marble.position.y, marble.circleRadius - 1.5, 0, Math.PI * 2);
          ctx.stroke();

          ctx.fillStyle = accent;
          ctx.font = "700 14px Segoe UI";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(marble.plugin.polarity, marble.position.x, marble.position.y + 0.5);
        }
      }

      function drawParticles() {
        for (const particle of state.particles) {
          const alpha = 1 - particle.age / particle.life;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.color;
          ctx.fillRect(particle.x, particle.y, 3, 3);
        }
        ctx.globalAlpha = 1;
      }

      function drawFlashes() {
        for (const flash of state.flashes) {
          const alpha = 1 - flash.age / flash.life;
          ctx.fillStyle = flash.color.replace(/0\.\d+\)/, `${alpha * 0.6})`);
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
        }
      }

      function drawLabels() {
        ctx.fillStyle = "rgba(239,247,255,0.76)";
        ctx.font = "700 18px Segoe UI";
        ctx.fillText("P2 底线", SIDE_MARGIN + 14, 26);
        ctx.fillText("P1 底线", SIDE_MARGIN + 14, HEIGHT - 14);
      }

      function render() {
        drawBackground();
        drawForceLines();
        drawBounceWalls();
        drawPowerups();
        drawLauncher("top");
        drawLauncher("bottom");
        drawMarbles();
        drawParticles();
        drawFlashes();
        drawLabels();
      }

      function tick(timestamp) {
        if (!state.lastTime) {
          state.lastTime = timestamp;
        }
        const dt = Math.min(0.02, (timestamp - state.lastTime) / 1000);
        state.lastTime = timestamp;

        if (state.running) {
          updateInput(dt);
          updatePowerups(dt);
          applyMagnetism(dt);
          Engine.update(engine, dt * 1000);
          pruneMarbles();
          updateParticles(dt);
        } else {
          updateParticles(dt);
        }

        render();
        requestAnimationFrame(tick);
      }

      function handleKeyDown(event) {
        const controlled = ["KeyA", "KeyD", "KeyW", "ArrowLeft", "ArrowRight", "ArrowUp"];
        if (controlled.includes(event.code)) {
          event.preventDefault();
        }
        state.input.add(event.code);
        if (!event.repeat) {
          if (event.code === state.players.bottom.keys.fire) {
            fireMarble("bottom");
          } else if (event.code === state.players.top.keys.fire) {
            fireMarble("top");
          }
        }
      }

      function handleKeyUp(event) {
        state.input.delete(event.code);
      }

      createStaticArena();
      installCollisionHandlers();
      updateHud();
      window.addEventListener("keydown", handleKeyDown);
      window.addEventListener("keyup", handleKeyUp);
      restartButton.addEventListener("click", resetGame);
      requestAnimationFrame(tick);

      return { resetGame };
    })();
  </script>
</body>
</html>
