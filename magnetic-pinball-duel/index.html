<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双人磁力弹珠台</title>
  <style>
    :root {
      --bg-1: #08111d;
      --bg-2: #03070d;
      --panel: rgba(7, 14, 25, 0.86);
      --line: rgba(132, 208, 255, 0.18);
      --text: #eff7ff;
      --muted: #8ba0b8;
      --p1: #74d4ff;
      --p2: #ff8ea9;
      --goal-1: #6df5c5;
      --goal-2: #ffd05f;
      --north: #ff6f61;
      --south: #79a7ff;
      --amp: #7aff9a;
      --wall: #ffc85a;
      --split: #d28fff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% 18%, rgba(121, 167, 255, 0.12), transparent 30%),
        radial-gradient(circle at 50% 82%, rgba(255, 111, 97, 0.12), transparent 30%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
    }

    .app {
      width: min(1240px, calc(100vw - 20px));
      margin: 0 auto;
      padding: 10px 0 18px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel {
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(12px);
    }

    .eyebrow,
    .meta,
    .lane small {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 6px 0 8px;
      font-size: clamp(2rem, 5vw, 3.7rem);
      line-height: 0.94;
    }

    p {
      margin: 0;
      line-height: 1.55;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat,
    .lane,
    .pickup {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-size: 1.4rem;
    }

    .legend {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .lane {
      display: grid;
      gap: 5px;
    }

    .lane strong {
      font-size: 1rem;
    }

    .p1 {
      color: var(--p1);
    }

    .p2 {
      color: var(--p2);
    }

    .pickups {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .pickup {
      display: grid;
      gap: 4px;
      font-size: 0.92rem;
    }

    .pickup strong {
      font-size: 0.95rem;
    }

    .stage {
      position: relative;
      padding: 12px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.04), transparent 26%),
        linear-gradient(180deg, rgba(10, 18, 30, 0.96), rgba(4, 8, 14, 0.98));
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 20px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03), transparent 32%),
        linear-gradient(180deg, #0f1c31 0%, #050912 100%);
    }

    .overlay {
      position: absolute;
      inset: 22px;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .overlay-card {
      width: min(480px, calc(100% - 20px));
      padding: 22px 24px;
      border-radius: 24px;
      text-align: center;
      border: 1px solid rgba(255, 208, 95, 0.28);
      background: rgba(4, 10, 18, 0.92);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.38);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .overlay-card.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .overlay-card h2 {
      margin: 0 0 10px;
      font-size: 1.8rem;
    }

    .overlay-card p {
      color: var(--muted);
    }

    button {
      margin-top: 18px;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      color: #04111d;
      background: linear-gradient(135deg, var(--p1), var(--goal-2));
    }

    @media (max-width: 940px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .stats,
      .pickups {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .stats,
      .pickups {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="panel">
        <div class="eyebrow">Physics Toy</div>
        <h1>双人磁力弹珠台</h1>
        <p>页面打开后立即进入同屏双人对战。玩家 1 守左侧，玩家 2 守右侧，用不同磁极的弹珠轰击中央得分区并冲破对手底线。磁力连线会实时显示吸引或排斥，让每次弯折弹道都一眼可见。</p>
      </div>
      <div class="panel">
        <div class="stats">
          <div class="stat">
            <div class="meta">Player 1</div>
            <strong id="score-left">0</strong>
          </div>
          <div class="stat">
            <div class="meta">Player 2</div>
            <strong id="score-right">0</strong>
          </div>
          <div class="stat">
            <div class="meta">Target</div>
            <strong id="target-score">9</strong>
          </div>
          <div class="stat">
            <div class="meta">Next Marble</div>
            <strong id="polarity-indicator">N</strong>
          </div>
        </div>
        <div class="legend">
          <div class="lane">
            <small>Left Launcher</small>
            <strong class="p1">Player 1: WASD 调角，空格发射</strong>
          </div>
          <div class="lane">
            <small>Right Launcher</small>
            <strong class="p2">Player 2: 方向键调角，Enter 发射</strong>
          </div>
        </div>
        <div class="pickups">
          <div class="pickup">
            <strong style="color:var(--north)">N 极</strong>
            <span>与 S 相吸，同极相斥，推力更强</span>
          </div>
          <div class="pickup">
            <strong style="color:var(--south)">S 极</strong>
            <span>与 N 相吸，同极相斥，适合对抗</span>
          </div>
          <div class="pickup">
            <strong style="color:var(--split)">± 双极</strong>
            <span>弱吸所有附近弹珠，擅长制造弯线</span>
          </div>
        </div>
      </div>
    </section>

    <section class="stage">
      <canvas id="game" width="1280" height="820" aria-label="双人磁力弹珠台画布"></canvas>
      <div class="overlay">
        <div class="overlay-card" id="overlay-card">
          <h2 id="overlay-title">胜利</h2>
          <p id="overlay-text"></p>
          <button id="restart-button" type="button">一键重开</button>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
  <script>
    const { Engine, World, Bodies, Body, Events, Vector } = Matter;

    const magneticPinballDuel = (() => {
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const overlayCard = document.querySelector("#overlay-card");
      const overlayTitle = document.querySelector("#overlay-title");
      const overlayText = document.querySelector("#overlay-text");
      const restartButton = document.querySelector("#restart-button");
      const scoreLeftLabel = document.querySelector("#score-left");
      const scoreRightLabel = document.querySelector("#score-right");
      const targetScoreLabel = document.querySelector("#target-score");
      const polarityIndicatorLabel = document.querySelector("#polarity-indicator");

      const WIDTH = canvas.width;
      const HEIGHT = canvas.height;
      const TARGET_SCORE = 9;
      const GOAL_DEPTH = 38;
      const SIDE_MARGIN = 84;
      const TOP_BOTTOM_MARGIN = 64;
      const LAUNCHER_X_LEFT = 112;
      const LAUNCHER_X_RIGHT = WIDTH - 112;
      const MAGNET_STRENGTH = 0.011;
      const MAX_BALLS = 14;
      const BALL_TYPES = [
        { key: "N", label: "N", color: "#ff6f61", charge: 1, bias: 1.15 },
        { key: "S", label: "S", color: "#79a7ff", charge: -1, bias: 1.15 },
        { key: "B", label: "±", color: "#d28fff", charge: 0.35, bias: 0.72 }
      ];
      const SCORE_ZONES = [
        { x: WIDTH / 2, y: HEIGHT / 2 - 144, width: 132, height: 48, score: 1, color: "rgba(122,255,154,0.22)", pulse: 0, label: "+1" },
        { x: WIDTH / 2, y: HEIGHT / 2, width: 180, height: 54, score: 2, color: "rgba(255,208,95,0.22)", pulse: 0, label: "+2" },
        { x: WIDTH / 2, y: HEIGHT / 2 + 144, width: 132, height: 48, score: 1, color: "rgba(122,255,154,0.22)", pulse: 0, label: "+1" }
      ];

      const engine = Engine.create({ gravity: { x: 0, y: 0 } });
      const state = {
        running: true,
        winner: "",
        lastTime: 0,
        forceLines: [],
        particles: [],
        flashes: [],
        nextTypeIndex: 0,
        players: {
          left: {
            name: "Player 1",
            score: 0,
            aim: 0,
            aimMin: -Math.PI * 0.38,
            aimMax: Math.PI * 0.38,
            launcher: { x: LAUNCHER_X_LEFT, y: HEIGHT / 2 },
            keys: { up: "KeyW", down: "KeyS", left: "KeyA", right: "KeyD", fire: "Space" },
            tint: "#74d4ff"
          },
          right: {
            name: "Player 2",
            score: 0,
            aim: Math.PI,
            aimMin: Math.PI - Math.PI * 0.38,
            aimMax: Math.PI + Math.PI * 0.38,
            launcher: { x: LAUNCHER_X_RIGHT, y: HEIGHT / 2 },
            keys: { up: "ArrowUp", down: "ArrowDown", left: "ArrowLeft", right: "ArrowRight", fire: "Enter" },
            tint: "#ff8ea9"
          }
        },
        input: new Set(),
        cooldowns: { left: 0, right: 0 },
        walls: {},
        marbles: [],
        scoreZones: []
      };

      function createStaticArena() {
        const thickness = 48;
        const topWall = Bodies.rectangle(WIDTH / 2, TOP_BOTTOM_MARGIN - thickness / 2, WIDTH - SIDE_MARGIN * 2, thickness, {
          isStatic: true,
          restitution: 0.98,
          label: "boundary"
        });
        const bottomWall = Bodies.rectangle(WIDTH / 2, HEIGHT - TOP_BOTTOM_MARGIN + thickness / 2, WIDTH - SIDE_MARGIN * 2, thickness, {
          isStatic: true,
          restitution: 0.98,
          label: "boundary"
        });
        const leftGoalSensor = Bodies.rectangle(GOAL_DEPTH / 2, HEIGHT / 2, GOAL_DEPTH, HEIGHT - TOP_BOTTOM_MARGIN * 2, {
          isStatic: true,
          isSensor: true,
          label: "goal-left"
        });
        const rightGoalSensor = Bodies.rectangle(WIDTH - GOAL_DEPTH / 2, HEIGHT / 2, GOAL_DEPTH, HEIGHT - TOP_BOTTOM_MARGIN * 2, {
          isStatic: true,
          isSensor: true,
          label: "goal-right"
        });
        const leftTopGuide = Bodies.rectangle(180, TOP_BOTTOM_MARGIN + 82, 120, 20, { isStatic: true, angle: -0.62, restitution: 1, label: "boundary" });
        const leftBottomGuide = Bodies.rectangle(180, HEIGHT - TOP_BOTTOM_MARGIN - 82, 120, 20, { isStatic: true, angle: 0.62, restitution: 1, label: "boundary" });
        const rightTopGuide = Bodies.rectangle(WIDTH - 180, TOP_BOTTOM_MARGIN + 82, 120, 20, { isStatic: true, angle: 0.62, restitution: 1, label: "boundary" });
        const rightBottomGuide = Bodies.rectangle(WIDTH - 180, HEIGHT - TOP_BOTTOM_MARGIN - 82, 120, 20, { isStatic: true, angle: -0.62, restitution: 1, label: "boundary" });
        const centerPillarTop = Bodies.rectangle(WIDTH / 2, HEIGHT / 2 - 84, 22, 160, { isStatic: true, angle: 0.22, restitution: 1.02, label: "boundary" });
        const centerPillarBottom = Bodies.rectangle(WIDTH / 2, HEIGHT / 2 + 84, 22, 160, { isStatic: true, angle: -0.22, restitution: 1.02, label: "boundary" });
        const centerDiamond = Bodies.polygon(WIDTH / 2, HEIGHT / 2, 4, 58, { isStatic: true, angle: Math.PI / 4, restitution: 1.03, label: "boundary" });

        state.walls = {
          topWall,
          bottomWall,
          leftGoalSensor,
          rightGoalSensor,
          leftTopGuide,
          leftBottomGuide,
          rightTopGuide,
          rightBottomGuide,
          centerPillarTop,
          centerPillarBottom,
          centerDiamond
        };
        World.add(engine.world, Object.values(state.walls));

        state.scoreZones = SCORE_ZONES.map((zone, index) => {
          const body = Bodies.rectangle(zone.x, zone.y, zone.width, zone.height, {
            isStatic: true,
            isSensor: true,
            label: `score-zone-${index}`
          });
          body.plugin = { index, score: zone.score };
          return body;
        });
        World.add(engine.world, state.scoreZones);
      }

      function updateHud() {
        scoreLeftLabel.textContent = String(state.players.left.score);
        scoreRightLabel.textContent = String(state.players.right.score);
        targetScoreLabel.textContent = String(TARGET_SCORE);
        polarityIndicatorLabel.textContent = BALL_TYPES[state.nextTypeIndex].label;
      }

      function setOverlay(visible, title = "", text = "") {
        overlayTitle.textContent = title;
        overlayText.textContent = text;
        overlayCard.classList.toggle("visible", visible);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function randomRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function addParticle(x, y, color, scale = 1) {
        state.particles.push({
          x,
          y,
          vx: randomRange(-120, 120) * scale,
          vy: randomRange(-120, 120) * scale,
          life: randomRange(0.18, 0.42),
          age: 0,
          color
        });
        if (state.particles.length > 320) {
          state.particles.splice(0, state.particles.length - 320);
        }
      }

      function addFlash(color) {
        state.flashes.push({ color, age: 0, life: 0.2 });
      }

      function clearBodies(collection) {
        for (const body of collection) {
          World.remove(engine.world, body);
        }
      }

      function resetRound() {
        clearBodies(state.marbles);
        state.marbles = [];
        state.forceLines = [];
        state.particles = [];
        state.flashes = [];
        state.cooldowns.left = 0;
        state.cooldowns.right = 0;
        state.nextTypeIndex = 0;
      }

      function resetGame() {
        state.players.left.score = 0;
        state.players.right.score = 0;
        state.players.left.aim = 0;
        state.players.right.aim = Math.PI;
        state.running = true;
        state.winner = "";
        setOverlay(false);
        resetRound();
        updateHud();
      }

      function createMarble(playerKey, x, y, vx, vy, radius = 14, ownerOverride = null, typeOverride = null, advanceType = true) {
        if (state.marbles.length >= MAX_BALLS) {
          return null;
        }
        const type = typeOverride || BALL_TYPES[state.nextTypeIndex];
        const marble = Bodies.circle(x, y, radius, {
          restitution: 0.97,
          frictionAir: 0.006,
          friction: 0,
          frictionStatic: 0,
          density: 0.0012,
          label: "marble"
        });
        marble.plugin = {
          owner: ownerOverride || playerKey,
          type,
          trail: [],
          scored: false,
          scoreCooldown: 0
        };
        Body.setVelocity(marble, { x: vx, y: vy });
        state.marbles.push(marble);
        World.add(engine.world, marble);
        addParticle(x, y, type.color, 1.2);
        if (advanceType) {
          state.nextTypeIndex = (state.nextTypeIndex + 1) % BALL_TYPES.length;
        }
        updateHud();
        return marble;
      }

      function fireMarble(playerKey) {
        if (!state.running || state.cooldowns[playerKey] > 0 || state.marbles.length >= MAX_BALLS) {
          return;
        }
        const player = state.players[playerKey];
        const muzzle = 42;
        const x = player.launcher.x + Math.cos(player.aim) * muzzle;
        const y = player.launcher.y + Math.sin(player.aim) * muzzle;
        const speed = 14.5;
        createMarble(playerKey, x, y, Math.cos(player.aim) * speed, Math.sin(player.aim) * speed);
        state.cooldowns[playerKey] = 0.5;
      }

      function handleGoalCollision(goalLabel, marble) {
        if (goalLabel === "goal-left") {
          scorePoint("right", marble, 3);
        } else if (goalLabel === "goal-right") {
          scorePoint("left", marble, 3);
        }
      }

      function handleScoreZoneCollision(zoneIndex, marble) {
        if (marble.plugin.scored || marble.plugin.scoreCooldown > 0) {
          return;
        }
        const zone = SCORE_ZONES[zoneIndex];
        zone.pulse = 0.36;
        scorePoint(marble.plugin.owner, marble, zone.score);
        const kick = Vector.normalise(Vector.sub(marble.position, { x: zone.x, y: zone.y }));
        Body.applyForce(marble, marble.position, Vector.mult(kick, 0.015));
      }

      function flashForPlayer(playerKey) {
        return playerKey === "left" ? "rgba(109, 245, 197, 0.22)" : "rgba(255, 208, 95, 0.22)";
      }

      function scorePoint(playerKey, marble, amount) {
        if (!state.running || marble.plugin.scored) {
          return;
        }
        state.players[playerKey].score += amount;
        addFlash(flashForPlayer(playerKey));
        for (let i = 0; i < 14 + amount * 6; i += 1) {
          addParticle(marble.position.x, marble.position.y, playerKey === "left" ? "rgba(109,245,197,0.95)" : "rgba(255,208,95,0.95)", 1.2 + amount * 0.1);
        }
        if (amount >= 3) {
          marble.plugin.scored = true;
          World.remove(engine.world, marble);
          state.marbles = state.marbles.filter((item) => item !== marble);
        } else {
          marble.plugin.scoreCooldown = 0.5;
          Body.setVelocity(marble, Vector.mult(marble.velocity, 0.9));
        }
        updateHud();

        if (state.players[playerKey].score >= TARGET_SCORE) {
          state.running = false;
          state.winner = state.players[playerKey].name;
          setOverlay(true, `${state.winner} 获胜`, `比分 ${state.players.left.score} : ${state.players.right.score}。按空格、Enter 或点击按钮立即重开。`);
        }
      }

      function installCollisionHandlers() {
        Events.on(engine, "collisionStart", (event) => {
          for (const pair of event.pairs) {
            const labels = [pair.bodyA.label, pair.bodyB.label];
            const marble = pair.bodyA.label === "marble" ? pair.bodyA : pair.bodyB.label === "marble" ? pair.bodyB : null;
            if (!marble) {
              continue;
            }
            const goalLabel = labels.find((label) => label === "goal-left" || label === "goal-right");
            if (goalLabel) {
              handleGoalCollision(goalLabel, marble);
              continue;
            }
            const scoreZoneLabel = labels.find((label) => label.startsWith("score-zone-"));
            if (scoreZoneLabel) {
              const zone = pair.bodyA.label.startsWith("score-zone-") ? pair.bodyA : pair.bodyB;
              handleScoreZoneCollision(zone.plugin.index, marble);
            }
          }
        });
      }

      function updateInput(dt) {
        const coarseAimSpeed = 2.6;
        const fineAimSpeed = 1.35;
        const left = state.players.left;
        const right = state.players.right;

        if (state.input.has(left.keys.up)) {
          left.aim -= coarseAimSpeed * dt;
        }
        if (state.input.has(left.keys.down)) {
          left.aim += coarseAimSpeed * dt;
        }
        if (state.input.has(left.keys.left)) {
          left.aim -= fineAimSpeed * dt;
        }
        if (state.input.has(left.keys.right)) {
          left.aim += fineAimSpeed * dt;
        }

        if (state.input.has(right.keys.up)) {
          right.aim += coarseAimSpeed * dt;
        }
        if (state.input.has(right.keys.down)) {
          right.aim -= coarseAimSpeed * dt;
        }
        if (state.input.has(right.keys.left)) {
          right.aim += fineAimSpeed * dt;
        }
        if (state.input.has(right.keys.right)) {
          right.aim -= fineAimSpeed * dt;
        }

        left.aim = clamp(left.aim, left.aimMin, left.aimMax);
        right.aim = clamp(right.aim, right.aimMin, right.aimMax);
        state.cooldowns.left = Math.max(0, state.cooldowns.left - dt);
        state.cooldowns.right = Math.max(0, state.cooldowns.right - dt);
      }

      function applyMagnetism(dt) {
        state.forceLines = [];
        for (let i = 0; i < state.marbles.length; i += 1) {
          const a = state.marbles[i];
          a.plugin.scoreCooldown = Math.max(0, a.plugin.scoreCooldown - dt);
          for (let j = i + 1; j < state.marbles.length; j += 1) {
            const b = state.marbles[j];
            const delta = Vector.sub(b.position, a.position);
            const distanceSq = Math.max(Vector.magnitudeSquared(delta), 1000);
            if (distanceSq > 250000) {
              continue;
            }
            const distance = Math.sqrt(distanceSq);
            const direction = Vector.normalise(delta);
            const typeA = a.plugin.type;
            const typeB = b.plugin.type;
            const eitherBipolar = typeA.key === "B" || typeB.key === "B";
            const sign = eitherBipolar ? 1 : (typeA.charge * typeB.charge > 0 ? -1 : 1);
            const magnitude = Math.min(0.00095, (MAGNET_STRENGTH * typeA.bias * typeB.bias) / distanceSq);
            const force = Vector.mult(direction, magnitude * sign);
            Body.applyForce(a, a.position, force);
            Body.applyForce(b, b.position, Vector.neg(force));
            state.forceLines.push({
              ax: a.position.x,
              ay: a.position.y,
              bx: b.position.x,
              by: b.position.y,
              sign,
              alpha: 1 - distance / 470
            });
            if (distance < 180 && Math.random() < 0.28) {
              const color = sign > 0 ? "rgba(113, 255, 198, 0.8)" : "rgba(255, 111, 97, 0.75)";
              addParticle((a.position.x + b.position.x) * 0.5, (a.position.y + b.position.y) * 0.5, color, 0.25);
            }
          }
        }
      }

      function pruneMarbles() {
        for (const marble of [...state.marbles]) {
          marble.plugin.trail.push({ x: marble.position.x, y: marble.position.y });
          if (marble.plugin.trail.length > 14) {
            marble.plugin.trail.shift();
          }
          const velocity = Vector.magnitude(marble.velocity);
          if (velocity > 18) {
            Body.setVelocity(marble, Vector.mult(Vector.normalise(marble.velocity), 18));
          }
          if (
            marble.position.x < -120 || marble.position.x > WIDTH + 120 ||
            marble.position.y < -120 || marble.position.y > HEIGHT + 120
          ) {
            World.remove(engine.world, marble);
            state.marbles = state.marbles.filter((item) => item !== marble);
          }
        }
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.age += dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.94;
          particle.vy *= 0.94;
          return particle.age < particle.life;
        });
        state.flashes = state.flashes.filter((flash) => {
          flash.age += dt;
          return flash.age < flash.life;
        });
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, HEIGHT);
        gradient.addColorStop(0, "rgba(18, 34, 58, 1)");
        gradient.addColorStop(0.5, "rgba(7, 12, 22, 1)");
        gradient.addColorStop(1, "rgba(22, 10, 20, 1)");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.strokeStyle = "rgba(132, 208, 255, 0.16)";
        ctx.lineWidth = 2;
        ctx.strokeRect(GOAL_DEPTH, TOP_BOTTOM_MARGIN, WIDTH - GOAL_DEPTH * 2, HEIGHT - TOP_BOTTOM_MARGIN * 2);
        ctx.setLineDash([12, 10]);
        ctx.beginPath();
        ctx.moveTo(WIDTH / 2, TOP_BOTTOM_MARGIN);
        ctx.lineTo(WIDTH / 2, HEIGHT - TOP_BOTTOM_MARGIN);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.beginPath();
        ctx.arc(WIDTH / 2, HEIGHT / 2, 104, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = "rgba(109, 245, 197, 0.12)";
        ctx.fillRect(0, TOP_BOTTOM_MARGIN, GOAL_DEPTH, HEIGHT - TOP_BOTTOM_MARGIN * 2);
        ctx.fillStyle = "rgba(255, 208, 95, 0.12)";
        ctx.fillRect(WIDTH - GOAL_DEPTH, TOP_BOTTOM_MARGIN, GOAL_DEPTH, HEIGHT - TOP_BOTTOM_MARGIN * 2);
      }

      function drawLauncher(playerKey) {
        const player = state.players[playerKey];
        const tipX = player.launcher.x + Math.cos(player.aim) * 70;
        const tipY = player.launcher.y + Math.sin(player.aim) * 70;

        ctx.save();
        ctx.translate(player.launcher.x, player.launcher.y);
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.beginPath();
        ctx.arc(0, 0, 38, 0, Math.PI * 2);
        ctx.fill();
        ctx.rotate(player.aim);
        ctx.fillStyle = player.tint;
        ctx.fillRect(-9, -14, 72, 28);
        ctx.fillStyle = "rgba(255,255,255,0.25)";
        ctx.fillRect(14, -9, 26, 18);
        ctx.restore();

        ctx.strokeStyle = player.tint;
        ctx.lineWidth = 2;
        ctx.setLineDash([10, 8]);
        ctx.beginPath();
        ctx.moveTo(player.launcher.x, player.launcher.y);
        ctx.lineTo(player.launcher.x + Math.cos(player.aim) * 160, player.launcher.y + Math.sin(player.aim) * 160);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = BALL_TYPES[state.nextTypeIndex].color;
        ctx.beginPath();
        ctx.arc(tipX, tipY, 11, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#08111d";
        ctx.font = "700 11px Segoe UI";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(BALL_TYPES[state.nextTypeIndex].label, tipX, tipY + 0.5);
      }

      function drawScoreZones() {
        SCORE_ZONES.forEach((zone) => {
          const pulse = zone.pulse > 0 ? 1 + zone.pulse * 1.2 : 1;
          ctx.save();
          ctx.translate(zone.x, zone.y);
          ctx.fillStyle = zone.color;
          ctx.beginPath();
          ctx.roundRect(-zone.width * 0.5 * pulse, -zone.height * 0.5 * pulse, zone.width * pulse, zone.height * pulse, 18);
          ctx.fill();
          ctx.strokeStyle = zone.pulse > 0 ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.28)";
          ctx.lineWidth = zone.pulse > 0 ? 4 : 2;
          ctx.stroke();
          ctx.fillStyle = "#eff7ff";
          ctx.font = "700 18px Segoe UI";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(zone.label, 0, 1);
          ctx.restore();
          zone.pulse = Math.max(0, zone.pulse - 0.016);
        });
      }

      function drawForceLines() {
        for (const line of state.forceLines) {
          ctx.strokeStyle = line.sign > 0 ? `rgba(113,255,198,${Math.max(0.1, line.alpha)})` : `rgba(255,111,97,${Math.max(0.1, line.alpha)})`;
          ctx.lineWidth = line.sign > 0 ? 2.2 : 1.6;
          ctx.beginPath();
          ctx.moveTo(line.ax, line.ay);
          ctx.lineTo(line.bx, line.by);
          ctx.stroke();
        }
      }

      function drawMarbles() {
        for (const marble of state.marbles) {
          for (let i = 0; i < marble.plugin.trail.length; i += 1) {
            const trail = marble.plugin.trail[i];
            const alpha = (i + 1) / marble.plugin.trail.length;
            ctx.fillStyle = `rgba(255,255,255,${alpha * 0.13})`;
            ctx.beginPath();
            ctx.arc(trail.x, trail.y, marble.circleRadius * Math.max(0.3, alpha * 0.8), 0, Math.PI * 2);
            ctx.fill();
          }

          const accent = marble.plugin.type.color;
          const aura = ctx.createRadialGradient(marble.position.x, marble.position.y, 4, marble.position.x, marble.position.y, marble.circleRadius * 3);
          aura.addColorStop(0, "rgba(255,255,255,0.98)");
          aura.addColorStop(0.35, accent);
          aura.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = aura;
          ctx.beginPath();
          ctx.arc(marble.position.x, marble.position.y, marble.circleRadius * 3, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#f8fbff";
          ctx.beginPath();
          ctx.arc(marble.position.x, marble.position.y, marble.circleRadius, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = accent;
          ctx.lineWidth = marble.plugin.scoreCooldown > 0 ? 4 : 3;
          ctx.beginPath();
          ctx.arc(marble.position.x, marble.position.y, marble.circleRadius - 1.5, 0, Math.PI * 2);
          ctx.stroke();

          ctx.fillStyle = accent;
          ctx.font = "700 14px Segoe UI";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(marble.plugin.type.label, marble.position.x, marble.position.y + 0.5);
        }
      }

      function drawParticles() {
        for (const particle of state.particles) {
          const alpha = 1 - particle.age / particle.life;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.color;
          ctx.fillRect(particle.x, particle.y, 3, 3);
        }
        ctx.globalAlpha = 1;
      }

      function drawFlashes() {
        for (const flash of state.flashes) {
          const alpha = 1 - flash.age / flash.life;
          ctx.fillStyle = flash.color.replace(/0\.\d+\)/, `${alpha * 0.6})`);
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
        }
      }

      function drawLabels() {
        ctx.fillStyle = "rgba(239,247,255,0.76)";
        ctx.font = "700 18px Segoe UI";
        ctx.fillText("P1 发射区", 52, TOP_BOTTOM_MARGIN - 18);
        ctx.fillText("P2 发射区", WIDTH - 156, TOP_BOTTOM_MARGIN - 18);
        ctx.save();
        ctx.translate(26, HEIGHT / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText("P1 失守线", 0, 0);
        ctx.restore();
        ctx.save();
        ctx.translate(WIDTH - 26, HEIGHT / 2);
        ctx.rotate(Math.PI / 2);
        ctx.fillText("P2 失守线", 0, 0);
        ctx.restore();
      }

      function render() {
        drawBackground();
        drawForceLines();
        drawScoreZones();
        drawLauncher("left");
        drawLauncher("right");
        drawMarbles();
        drawParticles();
        drawFlashes();
        drawLabels();
      }

      function tick(timestamp) {
        if (!state.lastTime) {
          state.lastTime = timestamp;
        }
        const dt = Math.min(0.02, (timestamp - state.lastTime) / 1000);
        state.lastTime = timestamp;

        if (state.running) {
          updateInput(dt);
          applyMagnetism(dt);
          Engine.update(engine, dt * 1000);
          pruneMarbles();
          updateParticles(dt);
        } else {
          updateParticles(dt);
        }

        render();
        requestAnimationFrame(tick);
      }

      function handleKeyDown(event) {
        const controlled = ["KeyA", "KeyS", "KeyD", "KeyW", "Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Enter"];
        if (controlled.includes(event.code)) {
          event.preventDefault();
        }
        state.input.add(event.code);
        if (!event.repeat) {
          if (!state.running && (event.code === "Space" || event.code === "Enter")) {
            resetGame();
          } else if (event.code === state.players.left.keys.fire) {
            fireMarble("left");
          } else if (event.code === state.players.right.keys.fire) {
            fireMarble("right");
          }
        }
      }

      function handleKeyUp(event) {
        state.input.delete(event.code);
      }

      createStaticArena();
      installCollisionHandlers();
      updateHud();
      window.addEventListener("keydown", handleKeyDown);
      window.addEventListener("keyup", handleKeyUp);
      restartButton.addEventListener("click", resetGame);
      requestAnimationFrame(tick);

      return { resetGame };
    })();
  </script>
</body>
</html>
