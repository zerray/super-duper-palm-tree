<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双人磁力弹球：同屏对战弹球竞技场</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(8, 16, 30, 0.84);
      --line: rgba(120, 222, 255, 0.18);
      --text: #edf7ff;
      --muted: #8ca9c7;
      --p1: #66e6ff;
      --p2: #ff7bc3;
      --accent: #ffd86f;
      --boost: #7cffae;
      --split: #b88cff;
      --danger: #ff9166;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(102, 230, 255, 0.18), transparent 25%),
        radial-gradient(circle at 85% 15%, rgba(255, 123, 195, 0.16), transparent 24%),
        linear-gradient(180deg, #0a1528 0%, #030711 100%);
    }

    .shell {
      width: min(1320px, calc(100vw - 20px));
      margin: 0 auto;
      padding: 16px 0 20px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 14px;
      margin-bottom: 14px;
    }

    .panel {
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.3);
      padding: 18px 20px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3.8rem);
      line-height: 0.95;
    }

    p {
      margin: 0;
      line-height: 1.6;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .stat span {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stat strong {
      font-size: 1.35rem;
    }

    .legend {
      display: grid;
      gap: 10px;
    }

    .lane {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .lane strong {
      font-size: 1.05rem;
    }

    .p1 {
      color: var(--p1);
    }

    .p2 {
      color: var(--p2);
    }

    .token {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      font-size: 0.88rem;
    }

    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 12px currentColor;
    }

    .stage {
      position: relative;
      padding: 12px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 50% 50%, rgba(102, 230, 255, 0.08), transparent 36%),
        linear-gradient(180deg, rgba(10, 17, 34, 0.96), rgba(4, 7, 17, 0.98));
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 20px;
      background:
        radial-gradient(circle at 50% 50%, rgba(102, 230, 255, 0.06), transparent 34%),
        linear-gradient(180deg, #122244 0%, #08111f 100%);
    }

    .overlay {
      position: absolute;
      inset: 20px;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .overlay-card {
      width: min(520px, calc(100% - 20px));
      padding: 22px 24px;
      border-radius: 24px;
      border: 1px solid rgba(255, 216, 111, 0.36);
      background: rgba(3, 7, 18, 0.9);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.38);
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .overlay-card.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .overlay-card h2 {
      margin: 0 0 10px;
      font-size: 1.8rem;
    }

    .overlay-card p {
      color: var(--muted);
    }

    .menu-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      font: inherit;
      font-weight: 700;
      color: #04111d;
      background: linear-gradient(135deg, #66e6ff, #ffd86f);
      cursor: pointer;
    }

    button.secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    @media (max-width: 960px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div class="panel">
        <p class="eyebrow">Magnetic Paddle Arena</p>
        <h1>双人磁力弹球</h1>
        <p>左右双方分别守住自己的门线，用磁力挡板把球轰回去。按住磁力键时，附近弹球会被显著吸附或排斥；场地中还会随机刷新加速与分裂道具。</p>
      </div>
      <div class="panel">
        <div class="stats">
          <div class="stat">
            <span>模式</span>
            <strong id="mode-label">未开始</strong>
          </div>
          <div class="stat">
            <span>Player 1</span>
            <strong id="score-left">0</strong>
          </div>
          <div class="stat">
            <span>Player 2</span>
            <strong id="score-right">0</strong>
          </div>
          <div class="stat">
            <span>目标分</span>
            <strong id="target-score">5</strong>
          </div>
        </div>
        <div class="legend">
          <div class="lane">
            <strong class="p1">Player 1</strong>
            <span>W/S 移动，按住 Q 激活磁力</span>
            <span class="token"><span class="swatch" style="color:var(--boost);background:var(--boost)"></span>磁力吸附</span>
          </div>
          <div class="lane">
            <strong class="p2">Player 2 / AI</strong>
            <span>↑/↓ 移动，按住 / 激活磁力</span>
            <span class="token"><span class="swatch" style="color:var(--split);background:var(--split)"></span>分裂道具</span>
          </div>
          <p style="color: var(--muted);">加速道具会提升球速，分裂道具会复制额外弹球。单人模式下右侧改为简易 AI，带轻微跟随延迟与误差。</p>
        </div>
      </div>
    </section>

    <section class="stage">
      <canvas id="magnetic-duel-canvas" width="1280" height="720" aria-label="双人磁力弹球竞技场"></canvas>
      <div class="overlay">
        <div class="overlay-card visible" id="overlay-card">
          <h2 id="overlay-title">选择模式</h2>
          <p id="overlay-text">同屏双人或单人对战 AI。先让对方漏球达到 5 分者获胜。</p>
          <div class="menu-actions" id="overlay-actions">
            <button id="start-duel">2P Local</button>
            <button id="start-ai" class="secondary">vs AI</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const magneticPinballDuel = (() => {
      const canvas = document.querySelector("#magnetic-duel-canvas");
      const ctx = canvas.getContext("2d");
      const scoreLeftLabel = document.querySelector("#score-left");
      const scoreRightLabel = document.querySelector("#score-right");
      const modeLabel = document.querySelector("#mode-label");
      const targetScoreLabel = document.querySelector("#target-score");
      const overlayCard = document.querySelector("#overlay-card");
      const overlayTitle = document.querySelector("#overlay-title");
      const overlayText = document.querySelector("#overlay-text");
      const overlayActions = document.querySelector("#overlay-actions");
      const startDuelButton = document.querySelector("#start-duel");
      const startAiButton = document.querySelector("#start-ai");

      const WIDTH = canvas.width;
      const HEIGHT = canvas.height;
      const FIELD = { left: 60, right: WIDTH - 60, top: 40, bottom: HEIGHT - 40 };
      const TARGET_SCORE = 5;
      const paddleHeight = 140;
      const paddleWidth = 18;
      const BALL_RADIUS = 12;
      const maxBalls = 3;
      const magnetRange = 230;
      const magnetStrength = 62000;
      const splitLifetime = 16;
      const powerUpSpawnInterval = 6.2;
      const powerUpRadius = 16;
      const boostMultiplier = 1.22;
      const startBallSpeed = 410;
      const maxBallSpeed = 980;
      const aiReaction = 0.08;
      const aiRandomness = 22;

      const powerupTypes = {
        speed: { key: "speed", color: "#7cffae", label: "加速" },
        split: { key: "split", color: "#b88cff", label: "分裂" }
      };

      const state = {
        mode: "menu",
        opponentLabel: "Player 2",
        running: false,
        winner: "",
        lastTime: 0,
        spawnTimer: 0,
        rallyCount: 0,
        particles: [],
        powerups: [],
        balls: [],
        keys: new Set(),
        paddles: {
          left: {
            side: "left",
            x: FIELD.left + 22,
            y: HEIGHT / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: "#66e6ff",
            controls: { up: "KeyW", down: "KeyS", magnet: "KeyQ" },
            isMagnetOn: false,
            score: 0,
            energy: 100
          },
          right: {
            side: "right",
            x: FIELD.right - 22 - paddleWidth,
            y: HEIGHT / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: "#ff7bc3",
            controls: { up: "ArrowUp", down: "ArrowDown", magnet: "Slash" },
            isMagnetOn: false,
            score: 0,
            energy: 100
          }
        }
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function randomRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function resetMatch(mode) {
        state.mode = mode;
        state.opponentLabel = mode === "ai" ? "AI" : "Player 2";
        state.running = true;
        state.winner = "";
        state.spawnTimer = 2.4;
        state.rallyCount = 0;
        state.powerups = [];
        state.particles = [];
        state.balls = [];
        state.lastTime = 0;
        for (const paddle of Object.values(state.paddles)) {
          paddle.y = HEIGHT / 2 - paddle.height / 2;
          paddle.score = 0;
          paddle.energy = 100;
          paddle.isMagnetOn = false;
        }
        spawnBall(Math.random() > 0.5 ? 1 : -1);
        updateHud();
        setOverlay("", "", false, false);
      }

      function spawnBall(direction, x = WIDTH / 2, y = HEIGHT / 2, speedScale = 1, ttl = Infinity) {
        const angle = randomRange(-0.45, 0.45);
        const speed = startBallSpeed * speedScale;
        state.balls.push({
          x,
          y,
          vx: Math.cos(angle) * speed * direction,
          vy: Math.sin(angle) * speed,
          radius: BALL_RADIUS,
          glow: direction > 0 ? "#66e6ff" : "#ff7bc3",
          ttl,
          trail: []
        });
      }

      function updateHud() {
        scoreLeftLabel.textContent = String(state.paddles.left.score);
        scoreRightLabel.textContent = String(state.paddles.right.score);
        modeLabel.textContent = state.mode === "ai" ? "vs AI" : state.mode === "duel" ? "2P Local" : "未开始";
        targetScoreLabel.textContent = String(TARGET_SCORE);
      }

      function setOverlay(title, text, visible, showMenu = false) {
        overlayTitle.textContent = title;
        overlayText.textContent = text;
        overlayActions.style.display = showMenu ? "flex" : "none";
        overlayCard.classList.toggle("visible", visible);
      }

      function addParticles(x, y, color, amount) {
        for (let i = 0; i < amount; i += 1) {
          state.particles.push({
            x,
            y,
            vx: randomRange(-120, 120),
            vy: randomRange(-120, 120),
            life: randomRange(0.25, 0.55),
            age: 0,
            color
          });
        }
        if (state.particles.length > 180) {
          state.particles.splice(0, state.particles.length - 180);
        }
      }

      function spawnPowerup() {
        const kinds = [powerupTypes.speed, powerupTypes.split];
        const kind = kinds[Math.floor(Math.random() * kinds.length)];
        state.powerups.push({
          type: kind.key,
          x: randomRange(WIDTH * 0.32, WIDTH * 0.68),
          y: randomRange(FIELD.top + 60, FIELD.bottom - 60),
          radius: powerUpRadius,
          pulse: Math.random() * Math.PI * 2,
          ttl: 12
        });
      }

      function applyPaddleMovement(dt) {
        for (const paddle of Object.values(state.paddles)) {
          const speed = 470;
          if (paddle.side === "right" && state.mode === "ai") {
            continue;
          }
          if (state.keys.has(paddle.controls.up)) {
            paddle.y -= speed * dt;
          }
          if (state.keys.has(paddle.controls.down)) {
            paddle.y += speed * dt;
          }
        }
      }

      function updateAiPaddle(dt) {
        const paddle = state.paddles.right;
        if (state.mode !== "ai") {
          return;
        }
        const targetBall = state.balls.reduce((best, ball) => {
          if (!best) {
            return ball;
          }
          const bestBias = best.vx > 0 ? best.x : -99999;
          const currentBias = ball.vx > 0 ? ball.x : -99999;
          return currentBias > bestBias ? ball : best;
        }, null) || state.balls[0];
        const targetY = (targetBall ? targetBall.y : HEIGHT / 2) - paddle.height / 2 + randomRange(-aiRandomness, aiRandomness);
        paddle.y += (targetY - paddle.y) * Math.min(1, dt / aiReaction);
        paddle.isMagnetOn = Boolean(targetBall && targetBall.x > WIDTH * 0.55 && Math.abs(targetBall.y - (paddle.y + paddle.height / 2)) < magnetRange * 0.55 && paddle.energy > 12);
      }

      function updatePaddles(dt) {
        applyPaddleMovement(dt);
        updateAiPaddle(dt);
        for (const paddle of Object.values(state.paddles)) {
          paddle.y = clamp(paddle.y, FIELD.top, FIELD.bottom - paddle.height);
          if (!(paddle.side === "right" && state.mode === "ai")) {
            paddle.isMagnetOn = state.keys.has(paddle.controls.magnet) && paddle.energy > 8;
          }
          if (paddle.isMagnetOn) {
            paddle.energy = Math.max(0, paddle.energy - 34 * dt);
          } else {
            paddle.energy = Math.min(100, paddle.energy + 18 * dt);
          }
        }
      }

      function applyMagnetForce(ball, paddle, dt) {
        if (!paddle.isMagnetOn) {
          return;
        }
        const anchorX = paddle.side === "left" ? paddle.x + paddle.width : paddle.x;
        const anchorY = paddle.y + paddle.height / 2;
        const dx = anchorX - ball.x;
        const dy = anchorY - ball.y;
        const distSq = dx * dx + dy * dy;
        if (distSq > magnetRange * magnetRange || distSq < 80) {
          return;
        }
        const dist = Math.sqrt(distSq);
        const force = magnetStrength / distSq;
        const direction = paddle.side === "left" ? 1 : -1;
        ball.vx += ((dx / dist) * force + direction * force * 0.95) * dt;
        ball.vy += (dy / dist) * force * dt;
        addParticles(ball.x, ball.y, paddle.color, 1);
      }

      function handleBallPaddleCollision(ball, paddle) {
        const withinY = ball.y + ball.radius > paddle.y && ball.y - ball.radius < paddle.y + paddle.height;
        const touchingX = paddle.side === "left"
          ? ball.x - ball.radius <= paddle.x + paddle.width && ball.x > paddle.x
          : ball.x + ball.radius >= paddle.x && ball.x < paddle.x + paddle.width;
        if (!withinY || !touchingX) {
          return;
        }
        const relative = ((ball.y - paddle.y) / paddle.height) - 0.5;
        const bounceAngle = relative * 1.25;
        const speed = clamp(Math.hypot(ball.vx, ball.vy) * 1.03 + 26, startBallSpeed, maxBallSpeed);
        const direction = paddle.side === "left" ? 1 : -1;
        ball.x = paddle.side === "left" ? paddle.x + paddle.width + ball.radius : paddle.x - ball.radius;
        ball.vx = Math.cos(bounceAngle) * speed * direction;
        ball.vy = Math.sin(bounceAngle) * speed + relative * 140;
        if (paddle.isMagnetOn) {
          ball.vx *= 1.08;
          ball.vy += relative * 90;
        }
        state.rallyCount += 1;
        addParticles(ball.x, ball.y, paddle.color, 8);
      }

      function triggerPowerup(ball, powerup) {
        if (powerup.type === "speed") {
          ball.vx *= boostMultiplier;
          ball.vy *= boostMultiplier;
          addParticles(powerup.x, powerup.y, powerupTypes.speed.color, 18);
          return;
        }
        if (powerup.type === "split" && state.balls.length < maxBalls) {
          const speed = clamp(Math.hypot(ball.vx, ball.vy), startBallSpeed, maxBallSpeed);
          const direction = ball.vx >= 0 ? 1 : -1;
          spawnBall(direction, ball.x, ball.y, speed / startBallSpeed, splitLifetime);
          spawnBall(direction, ball.x, ball.y, speed / startBallSpeed, splitLifetime);
          state.balls = state.balls.slice(0, maxBalls);
          addParticles(powerup.x, powerup.y, powerupTypes.split.color, 20);
        }
      }

      function updatePowerups(dt) {
        state.spawnTimer -= dt;
        if (state.spawnTimer <= 0) {
          spawnPowerup();
          state.spawnTimer = powerUpSpawnInterval + randomRange(-1.2, 1.1);
        }
        state.powerups = state.powerups.filter((powerup) => {
          powerup.ttl -= dt;
          powerup.pulse += dt * 4;
          return powerup.ttl > 0;
        });
      }

      function updateBalls(dt) {
        const scoredSides = [];
        for (const ball of state.balls) {
          for (const paddle of Object.values(state.paddles)) {
            applyMagnetForce(ball, paddle, dt);
          }

          ball.x += ball.vx * dt;
          ball.y += ball.vy * dt;
          ball.ttl -= dt;
          ball.trail.push({ x: ball.x, y: ball.y });
          if (ball.trail.length > 10) {
            ball.trail.shift();
          }

          if (ball.y - ball.radius <= FIELD.top) {
            ball.y = FIELD.top + ball.radius;
            ball.vy = Math.abs(ball.vy);
          }
          if (ball.y + ball.radius >= FIELD.bottom) {
            ball.y = FIELD.bottom - ball.radius;
            ball.vy = -Math.abs(ball.vy);
          }

          handleBallPaddleCollision(ball, state.paddles.left);
          handleBallPaddleCollision(ball, state.paddles.right);

          for (const powerup of state.powerups) {
            if (Math.hypot(ball.x - powerup.x, ball.y - powerup.y) <= ball.radius + powerup.radius) {
              triggerPowerup(ball, powerup);
              powerup.ttl = -1;
            }
          }

          const speed = Math.hypot(ball.vx, ball.vy);
          if (speed > maxBallSpeed) {
            const ratio = maxBallSpeed / speed;
            ball.vx *= ratio;
            ball.vy *= ratio;
          }

          if (ball.x + ball.radius < FIELD.left) {
            state.paddles.right.score += 1;
            scoredSides.push("left");
          } else if (ball.x - ball.radius > FIELD.right) {
            state.paddles.left.score += 1;
            scoredSides.push("right");
          }
        }

        if (scoredSides.length > 0) {
          finishRound(scoredSides[0]);
          return;
        }

        state.balls = state.balls.filter((ball) => ball.ttl > 0);
        if (state.balls.length === 0 && state.running) {
          spawnBall(Math.random() > 0.5 ? 1 : -1);
        }
      }

      function finishRound(missedSide) {
        const missX = missedSide === "left" ? FIELD.left + 10 : FIELD.right - 10;
        addParticles(missX, HEIGHT / 2, missedSide === "left" ? "#66e6ff" : "#ff7bc3", 24);
        updateHud();
        const leftScore = state.paddles.left.score;
        const rightScore = state.paddles.right.score;
        if (leftScore >= TARGET_SCORE || rightScore >= TARGET_SCORE) {
          state.running = false;
          const finalWinner = leftScore >= TARGET_SCORE ? "Player 1" : state.opponentLabel;
          state.winner = `${finalWinner} 获胜`;
          setOverlay(`${finalWinner} 胜利`, `比分 ${leftScore} : ${rightScore}。点击下方重新开始。`, true, true);
          startDuelButton.textContent = "再来一局 2P";
          startAiButton.textContent = "再来一局 vs AI";
          return;
        }
        state.balls = [];
        state.powerups = [];
        state.spawnTimer = 2.2;
        spawnBall(missedSide === "left" ? 1 : -1);
        updateHud();
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.age += dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.97;
          particle.vy *= 0.97;
          return particle.age < particle.life;
        });
      }

      function drawField() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        const gradient = ctx.createLinearGradient(0, 0, WIDTH, HEIGHT);
        gradient.addColorStop(0, "rgba(19, 37, 73, 0.96)");
        gradient.addColorStop(0.5, "rgba(6, 13, 25, 0.98)");
        gradient.addColorStop(1, "rgba(45, 14, 42, 0.96)");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        drawFieldLines();
        drawGoals();
        drawPowerups();
        drawPaddles();
        drawBalls();
        drawParticles();
      }

      function drawFieldLines() {
        ctx.save();
        ctx.strokeStyle = "rgba(132, 218, 255, 0.16)";
        ctx.lineWidth = 2;
        ctx.strokeRect(FIELD.left, FIELD.top, FIELD.right - FIELD.left, FIELD.bottom - FIELD.top);
        ctx.setLineDash([14, 16]);
        ctx.beginPath();
        ctx.moveTo(WIDTH / 2, FIELD.top);
        ctx.lineTo(WIDTH / 2, FIELD.bottom);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.arc(WIDTH / 2, HEIGHT / 2, 84, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      function drawGoals() {
        ctx.save();
        ctx.fillStyle = "rgba(102, 230, 255, 0.1)";
        ctx.fillRect(FIELD.left - 24, FIELD.top, 24, FIELD.bottom - FIELD.top);
        ctx.fillStyle = "rgba(255, 123, 195, 0.1)";
        ctx.fillRect(FIELD.right, FIELD.top, 24, FIELD.bottom - FIELD.top);
        ctx.font = "700 18px Segoe UI";
        ctx.fillStyle = "rgba(237, 247, 255, 0.8)";
        ctx.fillText("P1 门线", FIELD.left + 12, FIELD.top - 10);
        ctx.fillText("P2 门线", FIELD.right - 70, FIELD.top - 10);
        ctx.restore();
      }

      function drawPaddles() {
        for (const paddle of Object.values(state.paddles)) {
          const centerY = paddle.y + paddle.height / 2;
          if (paddle.isMagnetOn) {
            const aura = ctx.createRadialGradient(
              paddle.side === "left" ? paddle.x + paddle.width : paddle.x,
              centerY,
              20,
              paddle.side === "left" ? paddle.x + paddle.width : paddle.x,
              centerY,
              magnetRange
            );
            aura.addColorStop(0, `${paddle.color}44`);
            aura.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = aura;
            ctx.beginPath();
            ctx.arc(paddle.side === "left" ? paddle.x + paddle.width : paddle.x, centerY, magnetRange, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.fillStyle = paddle.color;
          ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
          ctx.fillStyle = "rgba(255,255,255,0.28)";
          ctx.fillRect(paddle.x + 3, paddle.y + 10, paddle.width - 6, paddle.height - 20);

          ctx.fillStyle = "rgba(255,255,255,0.08)";
          ctx.fillRect(paddle.side === "left" ? 30 : WIDTH - 130, paddle.side === "left" ? 20 : 20, 100, 10);
          ctx.fillStyle = paddle.color;
          ctx.fillRect(paddle.side === "left" ? 30 : WIDTH - 130, 20, paddle.energy, 10);
        }
      }

      function drawBalls() {
        for (const ball of state.balls) {
          for (let i = 0; i < ball.trail.length; i += 1) {
            const trail = ball.trail[i];
            const alpha = i / ball.trail.length;
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.24})`;
            ctx.beginPath();
            ctx.arc(trail.x, trail.y, ball.radius * alpha, 0, Math.PI * 2);
            ctx.fill();
          }
          const glow = ctx.createRadialGradient(ball.x, ball.y, 2, ball.x, ball.y, ball.radius * 2.5);
          glow.addColorStop(0, "#ffffff");
          glow.addColorStop(0.35, ball.glow);
          glow.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.radius * 2.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#f7fbff";
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawPowerups() {
        for (const powerup of state.powerups) {
          const type = powerupTypes[powerup.type];
          const radius = powerup.radius + Math.sin(powerup.pulse) * 2;
          ctx.save();
          ctx.translate(powerup.x, powerup.y);
          ctx.rotate(powerup.pulse * 0.2);
          ctx.strokeStyle = type.color;
          ctx.lineWidth = 3;
          ctx.fillStyle = `${type.color}33`;
          ctx.beginPath();
          ctx.arc(0, 0, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = type.color;
          if (powerup.type === "speed") {
            ctx.beginPath();
            ctx.moveTo(-4, -8);
            ctx.lineTo(4, -8);
            ctx.lineTo(-2, 1);
            ctx.lineTo(5, 1);
            ctx.lineTo(-5, 10);
            ctx.lineTo(-1, 3);
            ctx.lineTo(-8, 3);
            ctx.closePath();
            ctx.fill();
          } else {
            ctx.fillRect(-10, -2, 20, 4);
            ctx.fillRect(-2, -10, 4, 20);
          }
          ctx.restore();
        }
      }

      function drawParticles() {
        for (const particle of state.particles) {
          const alpha = 1 - particle.age / particle.life;
          ctx.fillStyle = particle.color;
          ctx.globalAlpha = alpha;
          ctx.fillRect(particle.x, particle.y, 3, 3);
          ctx.globalAlpha = 1;
        }
      }

      function tick(timestamp) {
        if (!state.lastTime) {
          state.lastTime = timestamp;
        }
        const dt = Math.min(0.018, (timestamp - state.lastTime) / 1000);
        state.lastTime = timestamp;

        if (state.running) {
          updatePaddles(dt);
          updatePowerups(dt);
          updateBalls(dt);
          updateParticles(dt);
          updateHud();
        }

        drawField();
        requestAnimationFrame(tick);
      }

      window.addEventListener("keydown", (event) => {
        const controlledKeys = ["KeyW", "KeyS", "KeyQ", "ArrowUp", "ArrowDown", "Slash"];
        if (controlledKeys.includes(event.code)) {
          event.preventDefault();
        }
        state.keys.add(event.code);
      });

      window.addEventListener("keyup", (event) => {
        state.keys.delete(event.code);
      });

      startDuelButton.addEventListener("click", () => {
        resetMatch("duel");
      });

      startAiButton.addEventListener("click", () => {
        resetMatch("ai");
      });

      updateHud();
      requestAnimationFrame(tick);

      return { resetMatch };
    })();
  </script>
</body>
</html>
