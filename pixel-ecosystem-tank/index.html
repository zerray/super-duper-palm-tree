<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>像素生态缸</title>
  <style>
    :root {
      --bg-top: #d7f1ff;
      --bg-bottom: #7ca9bf;
      --glass: rgba(235, 250, 255, 0.38);
      --panel: rgba(246, 255, 252, 0.82);
      --panel-line: rgba(37, 72, 83, 0.18);
      --text: #17323f;
      --muted: #4c6a73;
      --accent: #ffd46e;
      --water: #4b84c8;
      --sand: #d8bc74;
      --seed: #805f3b;
      --sun: #ffe789;
      --fish: #ff916a;
      --plant: #3f9552;
      --leaf: #8ee07d;
      --bubble: #c7f3ff;
      --algae: #5db86f;
      --erase: #e78484;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;
      color: var(--text);
      font-family: "Trebuchet MS", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 32%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    main {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
    }

    .panel {
      border: 1px solid var(--panel-line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 20px 48px rgba(15, 43, 55, 0.18);
      backdrop-filter: blur(8px);
    }

    .stage {
      padding: 20px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.4rem, 4vw, 4.1rem);
      line-height: 0.92;
      letter-spacing: -0.05em;
    }

    h2 {
      font-size: 1.12rem;
    }

    .lede,
    .hint,
    .small,
    .stat span {
      color: var(--muted);
    }

    .lede {
      margin-top: 12px;
      max-width: 62ch;
      line-height: 1.6;
    }

    .tank-shell {
      margin-top: 18px;
      padding: 16px;
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.55), rgba(193, 227, 238, 0.22)),
        linear-gradient(180deg, rgba(255, 242, 181, 0.45), rgba(255, 255, 255, 0));
    }

    #tank {
      display: block;
      width: min(100%, 820px);
      aspect-ratio: 4 / 3;
      margin: 0 auto;
      border-radius: 18px;
      border: 1px solid rgba(23, 50, 63, 0.16);
      background: linear-gradient(180deg, #b8e3ff 0%, #79abc9 48%, #3b6984 100%);
      cursor: crosshair;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }

    .hud {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat,
    .card,
    .tool-button {
      border: 1px solid var(--panel-line);
      background: rgba(255, 255, 255, 0.64);
    }

    .stat {
      padding: 12px;
      border-radius: 16px;
    }

    .stat span {
      display: block;
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-size: 1.14rem;
    }

    aside {
      padding: 18px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .card {
      padding: 16px;
      border-radius: 18px;
      display: grid;
      gap: 12px;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .tool-button {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 10px 12px;
      border-radius: 14px;
      color: var(--text);
      font: inherit;
      cursor: pointer;
      text-align: left;
    }

    .tool-button.active {
      outline: 2px solid var(--accent);
      transform: translateY(-1px);
    }

    .swatch {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      box-shadow: 0 0 0 1px rgba(23, 50, 63, 0.12);
      flex: 0 0 auto;
    }

    .slider-row {
      display: grid;
      gap: 8px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #ecb13d;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button.action {
      min-height: 40px;
      border: 0;
      border-radius: 999px;
      padding: 0 16px;
      font: inherit;
      color: #18303a;
      background: linear-gradient(180deg, #ffe291, #e4b451);
      cursor: pointer;
    }

    .legend {
      display: grid;
      gap: 8px;
    }

    .legend-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.54);
      border: 1px solid rgba(23, 50, 63, 0.1);
    }

    @media (max-width: 980px) {
      main {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 12px;
      }

      .hud,
      .tool-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel stage">
      <h1>像素生态缸</h1>
      <p class="lede">
        在透明像素缸里投放水、沙、种子、阳光灯和小鱼。水会下落扩散，沙会堆积，种子在有水且有光的地方慢慢长成水草并吐出氧气泡，小鱼会在水域里轻轻游动。
      </p>
      <div class="tank-shell">
        <canvas id="tank" width="96" height="72" aria-label="像素生态缸画布"></canvas>
      </div>
      <div class="hud">
        <div class="stat"><span>当前工具</span><strong id="tool-label">水</strong></div>
        <div class="stat"><span>缸内水量</span><strong id="water-count">0</strong></div>
        <div class="stat"><span>植物像素</span><strong id="plant-count">0</strong></div>
        <div class="stat"><span>小鱼数量</span><strong id="fish-count">0</strong></div>
      </div>
    </section>

    <aside class="panel">
      <section class="card">
        <h2>工具栏</h2>
        <div class="tool-grid">
          <button class="tool-button active" data-tool="water" type="button"><span class="swatch" style="background: var(--water)"></span>水</button>
          <button class="tool-button" data-tool="sand" type="button"><span class="swatch" style="background: var(--sand)"></span>沙</button>
          <button class="tool-button" data-tool="seed" type="button"><span class="swatch" style="background: var(--seed)"></span>种子</button>
          <button class="tool-button" data-tool="sun" type="button"><span class="swatch" style="background: var(--sun)"></span>阳光</button>
          <button class="tool-button" data-tool="fish" type="button"><span class="swatch" style="background: var(--fish)"></span>小鱼</button>
        </div>
        <p class="hint">左键绘制，拖拽可连续放置；右键擦除。先铺水域，再撒一点沙和种子，放上阳光灯，最后投放小鱼。</p>
      </section>

      <section class="card">
        <h2>笔刷</h2>
        <label class="slider-row" for="brush-size">
          <span>笔刷大小</span>
          <input id="brush-size" type="range" min="1" max="3" value="2">
        </label>
        <div class="actions">
          <button class="action" id="seed-scene" type="button">生成样例</button>
          <button class="action" id="clear-scene" type="button">清空生态缸</button>
        </div>
      </section>

      <section class="card">
        <h2>规则</h2>
        <div class="legend">
          <div class="legend-row"><span>落沙逻辑</span><strong>水下流扩散，沙会堆积</strong></div>
          <div class="legend-row"><span>植物生长</span><strong>种子 + 水 + 光 → 水草</strong></div>
          <div class="legend-row"><span>放松观赏</span><strong>氧气泡上浮，小鱼随机游走</strong></div>
        </div>
        <p class="small">植物状态机会按 <strong>seed → sprout → stem → leaf</strong> 推进。成熟叶片偶尔生成浮藻，小鱼会优先游过去吃掉。</p>
      </section>
    </aside>
  </main>

  <script>
    const GRID_WIDTH = 96;
    const GRID_HEIGHT = 72;
    const CELL_EMPTY = "empty";
    const CELL_WATER = "water";
    const CELL_SAND = "sand";
    const CELL_SEED = "seed";
    const CELL_SUN = "sun";
    const CELL_PLANT = "plant";
    const CELL_BUBBLE = "bubble";
    const CELL_ALGAE = "algae";
    const plantStages = ["seed", "sprout", "stem", "leaf"];
    const colors = {
      water: "#4b84c8",
      waterFoam: "#75b5ff",
      sand: "#d8bc74",
      seed: "#805f3b",
      sun: "#ffe789",
      plantRoot: "#2f7041",
      plantStem: "#47a45b",
      plantLeaf: "#8ee07d",
      bubble: "#d1f5ff",
      algae: "#5db86f",
      fish: "#ff916a",
      fishDark: "#b7573a",
      glass: "rgba(255,255,255,0.18)",
      light: "rgba(255, 241, 176, 0.28)"
    };

    const toolLabels = {
      water: "水",
      sand: "沙",
      seed: "种子",
      sun: "阳光",
      fish: "小鱼"
    };

    const tank = document.getElementById("tank");
    const ctx = tank.getContext("2d");
    const toolLabel = document.getElementById("tool-label");
    const waterCount = document.getElementById("water-count");
    const plantCount = document.getElementById("plant-count");
    const fishCount = document.getElementById("fish-count");
    const brushSizeInput = document.getElementById("brush-size");
    const seedSceneButton = document.getElementById("seed-scene");
    const clearSceneButton = document.getElementById("clear-scene");
    const toolButtons = [...document.querySelectorAll(".tool-button")];

    ctx.imageSmoothingEnabled = false;

    function createCell(type = CELL_EMPTY, extra = {}) {
      return {
        type,
        updated: false,
        age: 0,
        growth: 0,
        stage: 0,
        part: "",
        rootX: -1,
        rootY: -1,
        ...extra
      };
    }

    function buildGrid() {
      return Array.from({ length: GRID_HEIGHT }, () =>
        Array.from({ length: GRID_WIDTH }, () => createCell())
      );
    }

    const state = {
      grid: buildGrid(),
      lightMap: Array.from({ length: GRID_HEIGHT }, () => Array(GRID_WIDTH).fill(0)),
      selectedTool: "water",
      brushSize: Number(brushSizeInput.value),
      pointerDown: false,
      eraseMode: false,
      fish: [],
      tick: 0
    };

    function inBounds(x, y) {
      return x >= 0 && x < GRID_WIDTH && y >= 0 && y < GRID_HEIGHT;
    }

    function cellAt(x, y) {
      if (!inBounds(x, y)) {
        return createCell();
      }
      return state.grid[y][x];
    }

    function setCell(x, y, cell) {
      if (inBounds(x, y)) {
        state.grid[y][x] = cell;
      }
    }

    function isEmptyLike(cell) {
      return cell.type === CELL_EMPTY || cell.type === CELL_BUBBLE || cell.type === CELL_ALGAE;
    }

    function isLiquid(cell) {
      return cell.type === CELL_WATER;
    }

    function isSwimmable(cell) {
      return cell.type === CELL_WATER || cell.type === CELL_ALGAE || cell.type === CELL_BUBBLE;
    }

    function swapCells(ax, ay, bx, by) {
      const temp = state.grid[ay][ax];
      state.grid[ay][ax] = state.grid[by][bx];
      state.grid[by][bx] = temp;
      state.grid[ay][ax].updated = true;
      state.grid[by][bx].updated = true;
    }

    function randomItem(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function hasAdjacentWater(x, y) {
      const offsets = [
        [0, 1],
        [1, 0],
        [-1, 0],
        [0, -1]
      ];
      return offsets.some(([dx, dy]) => isLiquid(cellAt(x + dx, y + dy)));
    }

    function isLit(x, y) {
      return state.lightMap[y][x] > 0;
    }

    function refreshLightMap() {
      for (let y = 0; y < GRID_HEIGHT; y += 1) {
        state.lightMap[y].fill(0);
      }

      for (let y = 0; y < GRID_HEIGHT; y += 1) {
        for (let x = 0; x < GRID_WIDTH; x += 1) {
          if (cellAt(x, y).type !== CELL_SUN) {
            continue;
          }
          for (let depth = y; depth < GRID_HEIGHT; depth += 1) {
            for (let spread = -3; spread <= 3; spread += 1) {
              const targetX = x + spread;
              if (!inBounds(targetX, depth)) {
                continue;
              }
              const strength = Math.max(0, 1 - Math.abs(spread) * 0.2 - (depth - y) * 0.013);
              if (strength > 0.1) {
                state.lightMap[depth][targetX] = Math.max(state.lightMap[depth][targetX], strength);
              }
            }
          }
        }
      }
    }

    function findPlantRoot(x, y) {
      const cell = cellAt(x, y);
      if (cell.type !== CELL_PLANT) {
        return null;
      }
      const root = cell.part === "root" ? cell : cellAt(cell.rootX, cell.rootY);
      if (root.type !== CELL_PLANT || root.part !== "root") {
        return null;
      }
      return root;
    }

    function plantPixel(x, y, part, rootX, rootY) {
      setCell(x, y, createCell(CELL_PLANT, { part, rootX, rootY, stage: 3 }));
    }

    function growPlant(rootX, rootY) {
      const root = cellAt(rootX, rootY);
      if (root.type !== CELL_PLANT || root.part !== "root") {
        return;
      }

      const baseGrowth = hasAdjacentWater(rootX, rootY) && isLit(rootX, rootY);
      if (!baseGrowth) {
        return;
      }

      root.growth += 1 + Math.random() * 0.6;

      if (root.stage === 1 && root.growth > 20) {
        const above = cellAt(rootX, rootY - 1);
        if (isEmptyLike(above) || isLiquid(above)) {
          root.stage = 2;
          root.height = 1;
          plantPixel(rootX, rootY - 1, "stem", rootX, rootY);
        }
      } else if (root.stage === 2 && root.growth > 52) {
        const topY = rootY - root.height - 1;
        const above = cellAt(rootX, topY);
        if (isEmptyLike(above) || isLiquid(above)) {
          root.height += 1;
          plantPixel(rootX, topY, "stem", rootX, rootY);
          root.stage = 3;
        }
      } else if (root.stage === 3 && root.growth > 88) {
        const crownY = rootY - root.height;
        const leaves = [
          [rootX - 1, crownY],
          [rootX + 1, crownY],
          [rootX, crownY - 1]
        ];
        let placed = 0;
        for (const [leafX, leafY] of leaves) {
          const target = cellAt(leafX, leafY);
          if (inBounds(leafX, leafY) && (isEmptyLike(target) || isLiquid(target))) {
            plantPixel(leafX, leafY, "leaf", rootX, rootY);
            placed += 1;
          }
        }
        if (placed > 0) {
          root.stage = 4;
        }
      } else if (root.stage >= 4 && Math.random() < 0.02) {
        spawnBubble(rootX, rootY - root.height - 1);
        if (Math.random() < 0.04) {
          spawnAlgae(rootX + (Math.random() < 0.5 ? -1 : 1), rootY - root.height);
        }
      }
    }

    function spawnBubble(x, y) {
      if (!inBounds(x, y)) {
        return;
      }
      const cell = cellAt(x, y);
      if (isLiquid(cell) || cell.type === CELL_EMPTY) {
        setCell(x, y, createCell(CELL_BUBBLE));
      }
    }

    function spawnAlgae(x, y) {
      if (!inBounds(x, y)) {
        return;
      }
      const cell = cellAt(x, y);
      if (isLiquid(cell)) {
        setCell(x, y, createCell(CELL_ALGAE));
      }
    }

    function updateSand(x, y) {
      const below = cellAt(x, y + 1);
      if (isEmptyLike(below) || isLiquid(below)) {
        swapCells(x, y, x, y + 1);
        return;
      }

      const dirs = Math.random() < 0.5 ? [-1, 1] : [1, -1];
      for (const dx of dirs) {
        const diag = cellAt(x + dx, y + 1);
        if (isEmptyLike(diag) || isLiquid(diag)) {
          swapCells(x, y, x + dx, y + 1);
          return;
        }
      }

      cellAt(x, y).updated = true;
    }

    function updateWater(x, y) {
      const below = cellAt(x, y + 1);
      if (isEmptyLike(below)) {
        swapCells(x, y, x, y + 1);
        return;
      }

      const sideways = Math.random() < 0.5 ? [-1, 1] : [1, -1];
      for (const dx of sideways) {
        const side = cellAt(x + dx, y);
        const diag = cellAt(x + dx, y + 1);
        if (isEmptyLike(diag)) {
          swapCells(x, y, x + dx, y + 1);
          return;
        }
        if (isEmptyLike(side)) {
          swapCells(x, y, x + dx, y);
          return;
        }
      }

      cellAt(x, y).updated = true;
    }

    function updateSeed(x, y) {
      const below = cellAt(x, y + 1);
      if (isEmptyLike(below) || isLiquid(below)) {
        swapCells(x, y, x, y + 1);
        return;
      }

      const seed = cellAt(x, y);
      seed.age += 1;

      if (hasAdjacentWater(x, y) && isLit(x, y) && Math.random() < 0.05) {
        setCell(x, y, createCell(CELL_PLANT, {
          part: "root",
          stage: 1,
          growth: 0,
          height: 0,
          rootX: x,
          rootY: y
        }));
        cellAt(x, y).updated = true;
        return;
      }

      seed.updated = true;
    }

    function updateBubble(x, y) {
      if (y <= 0) {
        setCell(x, y, createCell());
        return;
      }

      const above = cellAt(x, y - 1);
      if (above.type === CELL_EMPTY || above.type === CELL_WATER || above.type === CELL_ALGAE) {
        swapCells(x, y, x, y - 1);
        return;
      }

      const dirs = Math.random() < 0.5 ? [-1, 1] : [1, -1];
      for (const dx of dirs) {
        const diag = cellAt(x + dx, y - 1);
        if (diag.type === CELL_EMPTY || diag.type === CELL_WATER) {
          swapCells(x, y, x + dx, y - 1);
          return;
        }
      }

      cellAt(x, y).updated = true;
    }

    function updateAlgae(x, y) {
      const below = cellAt(x, y + 1);
      if (below.type === CELL_WATER && Math.random() < 0.2) {
        swapCells(x, y, x, y + 1);
        return;
      }

      const drift = Math.random() < 0.5 ? -1 : 1;
      const side = cellAt(x + drift, y);
      if (side.type === CELL_WATER && Math.random() < 0.18) {
        swapCells(x, y, x + drift, y);
        return;
      }

      cellAt(x, y).updated = true;
    }

    function updatePlant(x, y) {
      const cell = cellAt(x, y);
      cell.updated = true;
      if (cell.part === "root") {
        growPlant(x, y);
      }
    }

    function updateGrid() {
      refreshLightMap();

      for (let y = 0; y < GRID_HEIGHT; y += 1) {
        for (let x = 0; x < GRID_WIDTH; x += 1) {
          state.grid[y][x].updated = false;
        }
      }

      for (let y = GRID_HEIGHT - 1; y >= 0; y -= 1) {
        for (let x = 0; x < GRID_WIDTH; x += 1) {
          const cell = cellAt(x, y);
          if (cell.updated) {
            continue;
          }
          if (cell.type === CELL_SAND) {
            updateSand(x, y);
          } else if (cell.type === CELL_WATER) {
            updateWater(x, y);
          } else if (cell.type === CELL_SEED) {
            updateSeed(x, y);
          } else if (cell.type === CELL_BUBBLE) {
            updateBubble(x, y);
          } else if (cell.type === CELL_ALGAE) {
            updateAlgae(x, y);
          } else if (cell.type === CELL_PLANT) {
            updatePlant(x, y);
          } else if (cell.type === CELL_SUN) {
            cell.updated = true;
          }
        }
      }
    }

    function nearestWaterSpot(originX, originY) {
      for (let radius = 0; radius <= 8; radius += 1) {
        for (let y = originY - radius; y <= originY + radius; y += 1) {
          for (let x = originX - radius; x <= originX + radius; x += 1) {
            if (inBounds(x, y) && isSwimmable(cellAt(x, y))) {
              return { x, y };
            }
          }
        }
      }
      return null;
    }

    function addFish(gridX, gridY) {
      const spawn = nearestWaterSpot(gridX, gridY) ?? { x: gridX, y: gridY };
      state.fish.push({
        x: spawn.x + 0.5,
        y: spawn.y + 0.5,
        vx: Math.random() < 0.5 ? -0.12 : 0.12,
        vy: (Math.random() - 0.5) * 0.08,
        cooldown: 0,
        facing: 1
      });
    }

    function eatNearbyAlgae(fish) {
      const cx = Math.round(fish.x);
      const cy = Math.round(fish.y);
      for (let y = cy - 1; y <= cy + 1; y += 1) {
        for (let x = cx - 1; x <= cx + 1; x += 1) {
          if (cellAt(x, y).type === CELL_ALGAE) {
            setCell(x, y, createCell(CELL_WATER));
            return true;
          }
        }
      }
      return false;
    }

    function updateFish() {
      for (const fish of state.fish) {
        fish.cooldown -= 1;

        const current = cellAt(Math.round(fish.x), Math.round(fish.y));
        if (!isSwimmable(current)) {
          const spot = nearestWaterSpot(Math.round(fish.x), Math.round(fish.y));
          if (spot) {
            fish.x += (spot.x + 0.5 - fish.x) * 0.24;
            fish.y += (spot.y + 0.5 - fish.y) * 0.24;
          }
          continue;
        }

        if (fish.cooldown <= 0) {
          fish.vx += (Math.random() - 0.5) * 0.18;
          fish.vy += (Math.random() - 0.5) * 0.12;
          fish.cooldown = 10 + Math.floor(Math.random() * 28);
        }

        let target = null;
        for (let y = Math.round(fish.y) - 5; y <= Math.round(fish.y) + 5; y += 1) {
          for (let x = Math.round(fish.x) - 5; x <= Math.round(fish.x) + 5; x += 1) {
            if (cellAt(x, y).type === CELL_ALGAE) {
              target = { x, y };
              break;
            }
          }
          if (target) {
            break;
          }
        }

        if (target) {
          fish.vx += Math.sign(target.x + 0.5 - fish.x) * 0.04;
          fish.vy += Math.sign(target.y + 0.5 - fish.y) * 0.02;
        }

        fish.vx = Math.max(-0.26, Math.min(0.26, fish.vx * 0.96));
        fish.vy = Math.max(-0.18, Math.min(0.18, fish.vy * 0.94));

        const nextX = fish.x + fish.vx;
        const nextY = fish.y + fish.vy;
        const targetCell = cellAt(Math.round(nextX), Math.round(nextY));
        if (isSwimmable(targetCell)) {
          fish.x = nextX;
          fish.y = nextY;
        } else {
          fish.vx *= -0.6;
          fish.vy *= -0.4;
          fish.y += Math.sin(state.tick * 0.03 + fish.x) * 0.05;
        }

        fish.facing = fish.vx >= 0 ? 1 : -1;
        fish.x = Math.max(1, Math.min(GRID_WIDTH - 2, fish.x));
        fish.y = Math.max(1, Math.min(GRID_HEIGHT - 2, fish.y));
        eatNearbyAlgae(fish);
      }
    }

    function countCells(type) {
      let total = 0;
      for (let y = 0; y < GRID_HEIGHT; y += 1) {
        for (let x = 0; x < GRID_WIDTH; x += 1) {
          if (cellAt(x, y).type === type) {
            total += 1;
          }
        }
      }
      return total;
    }

    function updateStats() {
      toolLabel.textContent = toolLabels[state.selectedTool];
      waterCount.textContent = countCells(CELL_WATER);
      plantCount.textContent = countCells(CELL_PLANT);
      fishCount.textContent = state.fish.length;
    }

    function drawCell(x, y, cell) {
      if (cell.type === CELL_EMPTY) {
        return;
      }

      if (cell.type === CELL_WATER) {
        ctx.fillStyle = colors.water;
        ctx.fillRect(x, y, 1, 1);
        if ((x + y + state.tick) % 7 === 0) {
          ctx.fillStyle = colors.waterFoam;
          ctx.fillRect(x, y, 1, 1);
        }
      } else if (cell.type === CELL_SAND) {
        ctx.fillStyle = colors.sand;
        ctx.fillRect(x, y, 1, 1);
      } else if (cell.type === CELL_SEED) {
        ctx.fillStyle = colors.seed;
        ctx.fillRect(x, y, 1, 1);
      } else if (cell.type === CELL_SUN) {
        ctx.fillStyle = colors.sun;
        ctx.fillRect(x, y, 1, 1);
      } else if (cell.type === CELL_BUBBLE) {
        ctx.fillStyle = colors.bubble;
        ctx.fillRect(x, y, 1, 1);
      } else if (cell.type === CELL_ALGAE) {
        ctx.fillStyle = colors.algae;
        ctx.fillRect(x, y, 1, 1);
      } else if (cell.type === CELL_PLANT) {
        const sway = (state.tick + x * 3 + y * 5) % 24 < 12;
        if (cell.part === "root") {
          ctx.fillStyle = colors.plantRoot;
        } else if (cell.part === "stem") {
          ctx.fillStyle = sway ? colors.plantStem : "#3a8f4d";
        } else {
          ctx.fillStyle = sway ? colors.plantLeaf : "#79cf6a";
        }
        ctx.fillRect(x, y, 1, 1);
      }
    }

    function drawLightOverlay() {
      for (let y = 0; y < GRID_HEIGHT; y += 1) {
        for (let x = 0; x < GRID_WIDTH; x += 1) {
          if (state.lightMap[y][x] > 0.18) {
            ctx.fillStyle = `rgba(255, 244, 173, ${state.lightMap[y][x] * 0.16})`;
            ctx.fillRect(x, y, 1, 1);
          }
        }
      }
    }

    function drawFish() {
      for (const fish of state.fish) {
        const x = Math.round(fish.x);
        const y = Math.round(fish.y);
        ctx.fillStyle = colors.fish;
        ctx.fillRect(x, y, 1, 1);
        ctx.fillRect(x - fish.facing, y, 1, 1);
        ctx.fillStyle = colors.fishDark;
        ctx.fillRect(x + fish.facing, y, 1, 1);
      }
    }

    function render() {
      ctx.clearRect(0, 0, tank.width, tank.height);

      const waterline = 8;
      ctx.fillStyle = "#caecff";
      ctx.fillRect(0, 0, GRID_WIDTH, waterline);
      ctx.fillStyle = "#7fb2cf";
      ctx.fillRect(0, waterline, GRID_WIDTH, GRID_HEIGHT - waterline);

      drawLightOverlay();

      for (let y = 0; y < GRID_HEIGHT; y += 1) {
        for (let x = 0; x < GRID_WIDTH; x += 1) {
          drawCell(x, y, cellAt(x, y));
        }
      }

      drawFish();

      ctx.strokeStyle = colors.glass;
      ctx.lineWidth = 1;
      ctx.strokeRect(0.5, 0.5, GRID_WIDTH - 1, GRID_HEIGHT - 1);
    }

    function eraseAt(gridX, gridY) {
      for (let dy = -state.brushSize + 1; dy < state.brushSize; dy += 1) {
        for (let dx = -state.brushSize + 1; dx < state.brushSize; dx += 1) {
          const x = gridX + dx;
          const y = gridY + dy;
          if (!inBounds(x, y)) {
            continue;
          }
          setCell(x, y, createCell());
        }
      }

      state.fish = state.fish.filter((fish) => Math.hypot(fish.x - gridX, fish.y - gridY) > state.brushSize + 0.5);
    }

    function paintAt(gridX, gridY) {
      if (state.eraseMode) {
        eraseAt(gridX, gridY);
        return;
      }

      for (let dy = -state.brushSize + 1; dy < state.brushSize; dy += 1) {
        for (let dx = -state.brushSize + 1; dx < state.brushSize; dx += 1) {
          const x = gridX + dx;
          const y = gridY + dy;
          if (!inBounds(x, y)) {
            continue;
          }

          if (state.selectedTool === "water") {
            const target = cellAt(x, y);
            if (target.type === CELL_EMPTY || target.type === CELL_BUBBLE || target.type === CELL_ALGAE) {
              setCell(x, y, createCell(CELL_WATER));
            }
          } else if (state.selectedTool === "sand") {
            const target = cellAt(x, y);
            if (target.type === CELL_EMPTY || target.type === CELL_WATER || target.type === CELL_BUBBLE) {
              setCell(x, y, createCell(CELL_SAND));
            }
          } else if (state.selectedTool === "seed") {
            if (cellAt(x, y).type === CELL_EMPTY || cellAt(x, y).type === CELL_WATER) {
              setCell(x, y, createCell(CELL_SEED));
            }
          } else if (state.selectedTool === "sun") {
            setCell(x, Math.min(y, 12), createCell(CELL_SUN));
          } else if (state.selectedTool === "fish") {
            addFish(x, y);
          }
        }
      }
    }

    function pointerToGrid(event) {
      const rect = tank.getBoundingClientRect();
      const scaleX = GRID_WIDTH / rect.width;
      const scaleY = GRID_HEIGHT / rect.height;
      return {
        x: Math.floor((event.clientX - rect.left) * scaleX),
        y: Math.floor((event.clientY - rect.top) * scaleY)
      };
    }

    function handlePaint(event) {
      const { x, y } = pointerToGrid(event);
      paintAt(x, y);
      updateStats();
    }

    function setTool(tool) {
      state.selectedTool = tool;
      toolButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.tool === tool);
      });
      toolLabel.textContent = toolLabels[tool];
    }

    function resetWorld() {
      state.grid = buildGrid();
      state.fish = [];
      state.tick = 0;
      refreshLightMap();
      updateStats();
    }

    function seedScene() {
      resetWorld();

      for (let x = 12; x < 84; x += 1) {
        for (let y = 28; y < 60; y += 1) {
          setCell(x, y, createCell(CELL_WATER));
        }
      }

      for (let x = 10; x < 86; x += 1) {
        setCell(x, 60, createCell(CELL_SAND));
        if (x % 2 === 0) {
          setCell(x, 61, createCell(CELL_SAND));
        }
      }

      [24, 39, 57, 74].forEach((x) => setCell(x, 8, createCell(CELL_SUN)));
      [28, 48, 67].forEach((x) => setCell(x, 56, createCell(CELL_SEED)));
      addFish(30, 38);
      addFish(66, 44);

      updateStats();
    }

    toolButtons.forEach((button) => {
      button.addEventListener("click", () => setTool(button.dataset.tool));
    });

    brushSizeInput.addEventListener("input", () => {
      state.brushSize = Number(brushSizeInput.value);
    });

    seedSceneButton.addEventListener("click", seedScene);
    clearSceneButton.addEventListener("click", resetWorld);

    tank.addEventListener("contextmenu", (event) => event.preventDefault());
    tank.addEventListener("pointerdown", (event) => {
      state.pointerDown = true;
      state.eraseMode = event.button === 2;
      handlePaint(event);
    });
    window.addEventListener("pointermove", (event) => {
      if (state.pointerDown) {
        handlePaint(event);
      }
    });
    window.addEventListener("pointerup", () => {
      state.pointerDown = false;
      state.eraseMode = false;
    });

    function frame() {
      state.tick += 1;
      updateGrid();
      updateFish();
      render();
      updateStats();
      requestAnimationFrame(frame);
    }

    seedScene();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
