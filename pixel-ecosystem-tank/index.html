<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>像素生态缸</title>
  <style>
    :root {
      --bg: #07131b;
      --panel: rgba(10, 24, 34, 0.92);
      --panel-soft: rgba(17, 38, 52, 0.94);
      --line: rgba(170, 226, 242, 0.18);
      --text: #edf9fb;
      --muted: #8eb4c1;
      --gold: #ffd577;
      --algae: #74d46b;
      --plankton: #6fcaff;
      --predator: #ff8a70;
      --rock: #8f99a3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 18px;
      color: var(--text);
      font-family: "Trebuchet MS", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(77, 143, 177, 0.24), transparent 28%),
        linear-gradient(180deg, #08131a 0%, #0b1f2c 50%, #050b10 100%);
    }

    .app {
      width: min(1220px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(8px);
    }

    .stage {
      padding: 20px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.3rem, 5vw, 4.2rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    h2 {
      font-size: 1.15rem;
    }

    .lede,
    .small,
    .stat span {
      color: var(--muted);
    }

    .lede {
      margin-top: 12px;
      max-width: 62ch;
      line-height: 1.65;
    }

    .tank-shell {
      margin-top: 18px;
      padding: 16px;
      border-radius: 24px;
      border: 1px solid rgba(168, 224, 241, 0.14);
      background:
        linear-gradient(180deg, rgba(113, 189, 225, 0.16), rgba(9, 19, 29, 0.08)),
        linear-gradient(180deg, rgba(255, 216, 128, 0.08), transparent 30%);
    }

    #tank {
      display: block;
      width: min(100%, 840px);
      aspect-ratio: 1;
      margin: 0 auto;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #0b1620;
      cursor: crosshair;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }

    .hud {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat,
    .card,
    .tool,
    .count-row {
      border: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .stat {
      padding: 12px;
      border-radius: 16px;
    }

    .stat span {
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-size: 1.2rem;
    }

    .sidebar {
      padding: 18px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .card {
      padding: 16px;
      border-radius: 18px;
      display: grid;
      gap: 12px;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .tool {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 10px 12px;
      border-radius: 14px;
      color: var(--text);
      cursor: pointer;
      text-align: left;
    }

    .tool.active {
      outline: 2px solid var(--gold);
      transform: translateY(-1px);
    }

    .swatch {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      border-radius: 4px;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .slider-row {
      display: grid;
      gap: 8px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--gold);
    }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 999px;
      padding: 0 16px;
      font: inherit;
      color: #11202a;
      background: linear-gradient(180deg, #ffdf8f, #e0ad4d);
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .count-list {
      display: grid;
      gap: 8px;
    }

    .count-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
    }

    #chart {
      display: block;
      width: 100%;
      height: 160px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(4, 10, 15, 0.55);
      image-rendering: pixelated;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .hud {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .tool-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel stage">
      <h1>像素生态缸</h1>
      <p class="lede">
        在透明像素缸中投放藻类、浮游生物、捕食者和矿石障碍，观察它们按简单规则形成食物链。拖拽即可连续投放，右侧光照强度会直接影响藻类生长速度。
      </p>
      <div class="tank-shell">
        <canvas id="tank" width="180" height="180" aria-label="像素生态缸"></canvas>
      </div>
      <div class="hud">
        <div class="stat"><span>运行时长</span><strong id="time-value">0.0s</strong></div>
        <div class="stat"><span>光照强度</span><strong id="light-value">65%</strong></div>
        <div class="stat"><span>总生物数</span><strong id="life-value">0</strong></div>
        <div class="stat"><span>障碍物</span><strong id="rock-value">0</strong></div>
      </div>
    </section>

    <aside class="panel sidebar">
      <section class="card">
        <h2>投放工具</h2>
        <div class="tool-grid" id="tool-grid"></div>
        <div class="actions">
          <button id="seed-button" type="button">生成样例</button>
          <button id="reset-button" type="button">重置缸体</button>
        </div>
        <p class="small">食物链：藻类 → 浮游生物 → 捕食者。点击或拖拽可连续投放，矿石会形成不可穿越的障碍。</p>
      </section>

      <section class="card">
        <h2>环境参数</h2>
        <label class="slider-row" for="light-slider">
          <span>光照强度</span>
          <input id="light-slider" type="range" min="10" max="100" value="65">
        </label>
        <p class="small">光照越高，藻类繁殖越快，整条食物链会更活跃。</p>
      </section>

      <section class="card">
        <h2>种群统计</h2>
        <canvas id="chart" width="280" height="160" aria-label="种群数量折线图"></canvas>
        <div class="count-list" id="count-list"></div>
      </section>

      <section class="card">
        <h2>规则</h2>
        <p class="small">核心循环为移动 → 碰撞 → 进食 → 繁殖 → 死亡。系统包含容量上限、能量衰减和自然寿命，避免种群无限膨胀。</p>
      </section>
    </aside>
  </main>

  <script>
    const WORLD_SIZE = 180;
    const MAX_ALGAE = 220;
    const MAX_PLANKTON = 90;
    const MAX_PREDATORS = 40;
    const MAX_ROCKS = 28;
    const HISTORY_LIMIT = 180;
    const CHART_INTERVAL = 0.35;
    const TOOL_RADIUS = {
      algae: 16,
      plankton: 14,
      predator: 12,
      rock: 18
    };

    const sprites = {
      algae: {
        size: 4,
        colors: ["#3d7a2d", "#74d46b", "#baf08c"],
        pixels: [
          [0, 1, 0, 0],
          [1, 2, 1, 0],
          [2, 1, 2, 1],
          [0, 1, 0, 0]
        ]
      },
      plankton: {
        size: 5,
        colors: ["#153344", "#6fcaff", "#d9f5ff"],
        pixels: [
          [0, 1, 1, 0, 0],
          [1, 2, 2, 1, 0],
          [0, 2, 1, 2, 1],
          [0, 1, 2, 1, 0],
          [0, 0, 1, 0, 0]
        ]
      },
      predator: {
        size: 6,
        colors: ["#551f16", "#ff8a70", "#ffd0c3"],
        pixels: [
          [0, 1, 1, 1, 0, 0],
          [1, 2, 2, 2, 1, 0],
          [1, 2, 1, 2, 2, 1],
          [0, 1, 2, 2, 1, 0],
          [0, 0, 1, 1, 0, 0],
          [0, 1, 0, 0, 1, 0]
        ]
      }
    };

    const toolConfig = [
      { key: "algae", label: "藻类", color: "var(--algae)" },
      { key: "plankton", label: "浮游生物", color: "var(--plankton)" },
      { key: "predator", label: "捕食者", color: "var(--predator)" },
      { key: "rock", label: "矿石障碍", color: "var(--rock)" }
    ];

    const tank = document.getElementById("tank");
    const ctx = tank.getContext("2d");
    const chart = document.getElementById("chart");
    const chartCtx = chart.getContext("2d");
    const toolGrid = document.getElementById("tool-grid");
    const countList = document.getElementById("count-list");
    const lightSlider = document.getElementById("light-slider");
    const seedButton = document.getElementById("seed-button");
    const resetButton = document.getElementById("reset-button");
    const timeValue = document.getElementById("time-value");
    const lightValue = document.getElementById("light-value");
    const lifeValue = document.getElementById("life-value");
    const rockValue = document.getElementById("rock-value");

    ctx.imageSmoothingEnabled = false;
    chartCtx.imageSmoothingEnabled = false;

    const state = {
      algae: [],
      plankton: [],
      predators: [],
      rocks: [],
      history: [],
      selectedTool: "algae",
      pointerDown: false,
      elapsed: 0,
      chartTimer: 0,
      lightIntensity: Number(lightSlider.value) / 100
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createAlgae(x, y) {
      return {
        x,
        y,
        age: 0,
        energy: rand(0.8, 1.2),
        drift: rand(-0.4, 0.4)
      };
    }

    function createPlankton(x, y) {
      return {
        x,
        y,
        age: 0,
        energy: rand(8, 12),
        vx: rand(-0.5, 0.5),
        vy: rand(-0.5, 0.5),
        cooldown: rand(0, 1)
      };
    }

    function createPredator(x, y) {
      return {
        x,
        y,
        age: 0,
        energy: rand(15, 20),
        vx: rand(-0.5, 0.5),
        vy: rand(-0.5, 0.5),
        cooldown: rand(0, 1)
      };
    }

    function createRock(x, y) {
      return {
        x,
        y,
        size: rand(7, 14)
      };
    }

    function distanceSquared(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return dx * dx + dy * dy;
    }

    function findNearest(source, list, radius) {
      const radiusSq = radius * radius;
      let best = null;
      let bestDistance = radiusSq;
      for (const item of list) {
        const dist = distanceSquared(source, item);
        if (dist < bestDistance) {
          bestDistance = dist;
          best = item;
        }
      }
      return best;
    }

    function collidesWithRock(x, y, padding = 1) {
      return state.rocks.some((rock) => {
        const dx = x - rock.x;
        const dy = y - rock.y;
        const radius = rock.size + padding;
        return dx * dx + dy * dy < radius * radius;
      });
    }

    function keepInside(entity, radius) {
      if (entity.x < radius || entity.x > WORLD_SIZE - radius) {
        entity.vx *= -0.75;
      }
      if (entity.y < radius || entity.y > WORLD_SIZE - radius) {
        entity.vy *= -0.75;
      }
      entity.x = clamp(entity.x, radius, WORLD_SIZE - radius);
      entity.y = clamp(entity.y, radius, WORLD_SIZE - radius);
    }

    function avoidRocks(entity, radius) {
      for (const rock of state.rocks) {
        const dx = entity.x - rock.x;
        const dy = entity.y - rock.y;
        const limit = rock.size + radius;
        const dist = Math.hypot(dx, dy) || 0.001;
        if (dist < limit) {
          const push = (limit - dist) / dist;
          entity.x += dx * push;
          entity.y += dy * push;
          entity.vx += dx * 0.02;
          entity.vy += dy * 0.02;
        }
      }
    }

    function updateAlgae(dt) {
      const next = [];
      for (const algae of state.algae) {
        algae.age += dt;
        algae.energy += dt * (0.32 + state.lightIntensity * 0.85);
        algae.y -= dt * (0.35 + state.lightIntensity * 0.6);
        algae.x += algae.drift * dt * 8;

        if (collidesWithRock(algae.x, algae.y, 3)) {
          algae.y += 1.2;
          algae.x -= algae.drift * 1.2;
        }

        algae.x = clamp(algae.x, 4, WORLD_SIZE - 4);
        algae.y = clamp(algae.y, 4, WORLD_SIZE - 4);

        const reproductionChance = (0.08 + state.lightIntensity * 0.22) * dt;
        if (state.algae.length + next.length < MAX_ALGAE && algae.energy > 1.45 && Math.random() < reproductionChance) {
          algae.energy *= 0.58;
          next.push(createAlgae(
            clamp(algae.x + rand(-8, 8), 4, WORLD_SIZE - 4),
            clamp(algae.y + rand(-8, 8), 4, WORLD_SIZE - 4)
          ));
        }

        if (algae.age < 45 && Math.random() > 0.0015) {
          next.push(algae);
        }
      }
      state.algae = next;
    }

    function updatePlankton(dt) {
      const next = [];
      for (const plankton of state.plankton) {
        plankton.age += dt;
        plankton.energy -= dt * 1.4;
        plankton.cooldown = Math.max(0, plankton.cooldown - dt);

        const target = findNearest(plankton, state.algae, 38);
        if (target) {
          const dx = target.x - plankton.x;
          const dy = target.y - plankton.y;
          const mag = Math.hypot(dx, dy) || 1;
          plankton.vx += (dx / mag) * dt * 11;
          plankton.vy += (dy / mag) * dt * 11;
        } else {
          plankton.vx += rand(-1, 1) * dt * 5;
          plankton.vy += rand(-1, 1) * dt * 5;
        }

        plankton.vx *= 0.92;
        plankton.vy *= 0.92;
        plankton.x += plankton.vx * dt * 7;
        plankton.y += plankton.vy * dt * 7;
        avoidRocks(plankton, 4);
        keepInside(plankton, 4);

        for (let i = state.algae.length - 1; i >= 0; i -= 1) {
          if (distanceSquared(plankton, state.algae[i]) < 36) {
            state.algae.splice(i, 1);
            plankton.energy += 5.5;
            break;
          }
        }

        if (plankton.cooldown === 0 && plankton.energy > 18 && state.plankton.length + next.length < MAX_PLANKTON) {
          plankton.energy *= 0.55;
          plankton.cooldown = 2.5;
          next.push(createPlankton(
            clamp(plankton.x + rand(-10, 10), 5, WORLD_SIZE - 5),
            clamp(plankton.y + rand(-10, 10), 5, WORLD_SIZE - 5)
          ));
        }

        if (plankton.energy > 0 && plankton.age < 55 && Math.random() > 0.0022) {
          next.push(plankton);
        }
      }
      state.plankton = next;
    }

    function updatePredators(dt) {
      const next = [];
      for (const predator of state.predators) {
        predator.age += dt;
        predator.energy -= dt * 1.9;
        predator.cooldown = Math.max(0, predator.cooldown - dt);

        const target = findNearest(predator, state.plankton, 54);
        if (target) {
          const dx = target.x - predator.x;
          const dy = target.y - predator.y;
          const mag = Math.hypot(dx, dy) || 1;
          predator.vx += (dx / mag) * dt * 13;
          predator.vy += (dy / mag) * dt * 13;
        } else {
          predator.vx += rand(-1, 1) * dt * 4;
          predator.vy += rand(-1, 1) * dt * 4;
        }

        predator.vx *= 0.94;
        predator.vy *= 0.94;
        predator.x += predator.vx * dt * 8;
        predator.y += predator.vy * dt * 8;
        avoidRocks(predator, 5);
        keepInside(predator, 5);

        for (let i = state.plankton.length - 1; i >= 0; i -= 1) {
          if (distanceSquared(predator, state.plankton[i]) < 49) {
            state.plankton.splice(i, 1);
            predator.energy += 8;
            break;
          }
        }

        if (predator.cooldown === 0 && predator.energy > 28 && state.predators.length + next.length < MAX_PREDATORS) {
          predator.energy *= 0.58;
          predator.cooldown = 4.5;
          next.push(createPredator(
            clamp(predator.x + rand(-12, 12), 6, WORLD_SIZE - 6),
            clamp(predator.y + rand(-12, 12), 6, WORLD_SIZE - 6)
          ));
        }

        if (predator.energy > 0 && predator.age < 70 && Math.random() > 0.0035) {
          next.push(predator);
        }
      }
      state.predators = next;
    }

    function updateSimulation(dt) {
      updateAlgae(dt);
      updatePlankton(dt);
      updatePredators(dt);
    }

    function drawBackground() {
      const lightGlow = 0.18 + state.lightIntensity * 0.45;
      const gradient = ctx.createLinearGradient(0, 0, 0, WORLD_SIZE);
      gradient.addColorStop(0, `rgba(157, 224, 255, ${0.35 + lightGlow})`);
      gradient.addColorStop(0.14, "rgba(75, 141, 170, 0.22)");
      gradient.addColorStop(1, "rgba(4, 10, 16, 1)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);

      ctx.fillStyle = "rgba(255, 219, 119, 0.06)";
      ctx.fillRect(0, 0, WORLD_SIZE, 24);

      ctx.fillStyle = "rgba(190, 239, 255, 0.06)";
      for (let i = 0; i < 18; i += 1) {
        const x = (i * 17 + state.elapsed * 6) % (WORLD_SIZE + 20) - 10;
        ctx.fillRect(x, 10 + (i % 6) * 5, 3, 3);
      }
    }

    function drawSprite(entity, sprite) {
      const startX = Math.round(entity.x - sprite.size / 2);
      const startY = Math.round(entity.y - sprite.size / 2);
      for (let y = 0; y < sprite.size; y += 1) {
        for (let x = 0; x < sprite.size; x += 1) {
          const colorIndex = sprite.pixels[y][x];
          if (colorIndex === 0) {
            continue;
          }
          ctx.fillStyle = sprite.colors[colorIndex];
          ctx.fillRect(startX + x, startY + y, 1, 1);
        }
      }
    }

    function drawRocks() {
      for (const rock of state.rocks) {
        ctx.fillStyle = "#5f6772";
        ctx.beginPath();
        ctx.arc(rock.x, rock.y, rock.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#9ba7b2";
        ctx.fillRect(Math.round(rock.x - rock.size / 3), Math.round(rock.y - rock.size / 4), 2, 2);
        ctx.fillRect(Math.round(rock.x + rock.size / 5), Math.round(rock.y), 2, 2);
      }
    }

    function drawTank() {
      drawBackground();
      drawRocks();
      for (const algae of state.algae) {
        drawSprite(algae, sprites.algae);
      }
      for (const plankton of state.plankton) {
        drawSprite(plankton, sprites.plankton);
      }
      for (const predator of state.predators) {
        drawSprite(predator, sprites.predator);
      }
      ctx.strokeStyle = "rgba(255,255,255,0.09)";
      ctx.strokeRect(0.5, 0.5, WORLD_SIZE - 1, WORLD_SIZE - 1);
    }

    function renderCounts() {
      const counts = [
        { label: "藻类", value: state.algae.length, color: "var(--algae)" },
        { label: "浮游生物", value: state.plankton.length, color: "var(--plankton)" },
        { label: "捕食者", value: state.predators.length, color: "var(--predator)" }
      ];
      countList.replaceChildren();
      for (const item of counts) {
        const row = document.createElement("div");
        row.className = "count-row";
        row.innerHTML = `<span><span class="swatch" style="background:${item.color}"></span>${item.label}</span><strong>${item.value}</strong>`;
        countList.appendChild(row);
      }

      timeValue.textContent = `${state.elapsed.toFixed(1)}s`;
      lightValue.textContent = `${Math.round(state.lightIntensity * 100)}%`;
      lifeValue.textContent = `${state.algae.length + state.plankton.length + state.predators.length}`;
      rockValue.textContent = `${state.rocks.length}`;
    }

    function renderChart() {
      chartCtx.clearRect(0, 0, chart.width, chart.height);
      chartCtx.fillStyle = "rgba(6, 14, 20, 0.92)";
      chartCtx.fillRect(0, 0, chart.width, chart.height);

      chartCtx.strokeStyle = "rgba(255,255,255,0.08)";
      chartCtx.lineWidth = 1;
      for (let i = 1; i <= 4; i += 1) {
        const y = (chart.height / 4) * i;
        chartCtx.beginPath();
        chartCtx.moveTo(0, y);
        chartCtx.lineTo(chart.width, y);
        chartCtx.stroke();
      }

      const maxCount = Math.max(
        10,
        ...state.history.map((entry) => Math.max(entry.algae, entry.plankton, entry.predator))
      );
      const lineConfig = [
        { key: "algae", color: "#74d46b" },
        { key: "plankton", color: "#6fcaff" },
        { key: "predator", color: "#ff8a70" }
      ];

      for (const line of lineConfig) {
        chartCtx.beginPath();
        chartCtx.strokeStyle = line.color;
        chartCtx.lineWidth = 2;
        state.history.forEach((entry, index) => {
          const x = state.history.length <= 1
            ? 0
            : (index / (HISTORY_LIMIT - 1)) * (chart.width - 8) + 4;
          const y = chart.height - 6 - (entry[line.key] / maxCount) * (chart.height - 16);
          if (index === 0) {
            chartCtx.moveTo(x, y);
          } else {
            chartCtx.lineTo(x, y);
          }
        });
        chartCtx.stroke();
      }
    }

    function recordHistory() {
      state.history.push({
        algae: state.algae.length,
        plankton: state.plankton.length,
        predator: state.predators.length
      });
      if (state.history.length > HISTORY_LIMIT) {
        state.history.shift();
      }
    }

    function addAtPoint(tool, x, y) {
      const radius = TOOL_RADIUS[tool];
      const count = tool === "rock" ? 1 : 3;
      for (let i = 0; i < count; i += 1) {
        const px = clamp(x + rand(-radius, radius), 6, WORLD_SIZE - 6);
        const py = clamp(y + rand(-radius, radius), 6, WORLD_SIZE - 6);
        if (tool === "rock") {
          if (state.rocks.length < MAX_ROCKS && !collidesWithRock(px, py, 10)) {
            state.rocks.push(createRock(px, py));
          }
        } else if (tool === "algae" && state.algae.length < MAX_ALGAE) {
          state.algae.push(createAlgae(px, py));
        } else if (tool === "plankton" && state.plankton.length < MAX_PLANKTON) {
          state.plankton.push(createPlankton(px, py));
        } else if (tool === "predator" && state.predators.length < MAX_PREDATORS) {
          state.predators.push(createPredator(px, py));
        }
      }
    }

    function getCanvasPoint(event) {
      const rect = tank.getBoundingClientRect();
      const clientX = event.clientX ?? event.touches?.[0]?.clientX;
      const clientY = event.clientY ?? event.touches?.[0]?.clientY;
      const x = ((clientX - rect.left) / rect.width) * WORLD_SIZE;
      const y = ((clientY - rect.top) / rect.height) * WORLD_SIZE;
      return {
        x: clamp(x, 0, WORLD_SIZE),
        y: clamp(y, 0, WORLD_SIZE)
      };
    }

    function handlePaint(event) {
      const point = getCanvasPoint(event);
      addAtPoint(state.selectedTool, point.x, point.y);
    }

    function buildTools() {
      toolGrid.replaceChildren();
      for (const tool of toolConfig) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "tool";
        button.dataset.tool = tool.key;
        if (tool.key === state.selectedTool) {
          button.classList.add("active");
        }
        button.innerHTML = `<span class="swatch" style="background:${tool.color}"></span><span>${tool.label}</span>`;
        button.addEventListener("click", () => {
          state.selectedTool = tool.key;
          for (const node of toolGrid.children) {
            node.classList.toggle("active", node.dataset.tool === tool.key);
          }
        });
        toolGrid.appendChild(button);
      }
    }

    function resetWorld() {
      state.algae = [];
      state.plankton = [];
      state.predators = [];
      state.rocks = [];
      state.history = [];
      state.elapsed = 0;
      state.chartTimer = 0;
      recordHistory();
      renderCounts();
      renderChart();
      drawTank();
    }

    function seedWorld() {
      resetWorld();
      for (let i = 0; i < 4; i += 1) {
        state.rocks.push(createRock(56 + i * 18, 106 + (i % 2) * 12));
      }
      for (let i = 0; i < 54; i += 1) {
        state.algae.push(createAlgae(rand(20, 160), rand(68, 168)));
      }
      for (let i = 0; i < 20; i += 1) {
        state.plankton.push(createPlankton(rand(24, 156), rand(54, 154)));
      }
      for (let i = 0; i < 6; i += 1) {
        state.predators.push(createPredator(rand(28, 152), rand(36, 144)));
      }
      recordHistory();
      renderCounts();
      renderChart();
      drawTank();
    }

    function frame(timestamp) {
      if (!frame.lastTime) {
        frame.lastTime = timestamp;
      }
      const dt = Math.min((timestamp - frame.lastTime) / 1000, 0.05);
      frame.lastTime = timestamp;

      state.elapsed += dt;
      state.chartTimer += dt;
      updateSimulation(dt);
      if (state.chartTimer >= CHART_INTERVAL) {
        state.chartTimer = 0;
        recordHistory();
        renderChart();
      }
      renderCounts();
      drawTank();
      requestAnimationFrame(frame);
    }

    lightSlider.addEventListener("input", () => {
      state.lightIntensity = Number(lightSlider.value) / 100;
      lightValue.textContent = `${Math.round(state.lightIntensity * 100)}%`;
    });

    tank.addEventListener("pointerdown", (event) => {
      state.pointerDown = true;
      tank.setPointerCapture(event.pointerId);
      handlePaint(event);
    });

    tank.addEventListener("pointermove", (event) => {
      if (state.pointerDown) {
        handlePaint(event);
      }
    });

    tank.addEventListener("pointerup", () => {
      state.pointerDown = false;
    });

    tank.addEventListener("pointerleave", () => {
      state.pointerDown = false;
    });

    seedButton.addEventListener("click", seedWorld);
    resetButton.addEventListener("click", resetWorld);

    buildTools();
    seedWorld();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
