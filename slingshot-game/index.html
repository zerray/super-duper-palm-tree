<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbital Slingshot</title>
  <style>
    :root {
      --bg: #07111f;
      --bg-glow: #10233f;
      --panel: rgba(8, 19, 36, 0.82);
      --panel-border: rgba(153, 192, 255, 0.22);
      --text: #eef4ff;
      --muted: #9bb1d1;
      --accent: #7dd3fc;
      --accent-strong: #f8d66d;
      --danger: #ff8d7a;
      --success: #93f0af;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(52, 92, 156, 0.42), transparent 28%),
        radial-gradient(circle at 20% 20%, rgba(118, 54, 163, 0.18), transparent 26%),
        linear-gradient(180deg, var(--bg-glow), var(--bg));
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      top: 18px;
      left: 18px;
      display: grid;
      gap: 12px;
      width: min(360px, calc(100vw - 36px));
      z-index: 2;
      pointer-events: none;
    }

    .panel {
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(10px);
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      letter-spacing: -0.04em;
      line-height: 0.95;
    }

    .subtle {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.96rem;
    }

    .stats {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      font-size: 0.92rem;
    }

    .stat {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(153, 192, 255, 0.12);
    }

    .stat strong {
      display: block;
      font-size: 1.2rem;
      color: var(--accent);
    }

    .hint {
      color: var(--accent-strong);
      font-weight: 700;
      min-height: 1.4em;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .legend span::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      margin-right: 6px;
      border-radius: 50%;
      vertical-align: middle;
      background: currentColor;
    }

    .launch::before {
      color: var(--accent);
    }

    .target::before {
      color: var(--success);
    }

    .planet::before {
      color: #ffb870;
    }

    @media (max-width: 720px) {
      .hud {
        width: min(100vw - 24px, 100%);
        top: 12px;
        left: 12px;
      }
    }
  </style>
</head>
<body>
  <canvas id="game-canvas" aria-label="Orbital slingshot game"></canvas>
  <div class="hud">
    <section class="panel">
      <h1>Orbital Slingshot</h1>
      <p class="subtle">Drag from the launch ring to set angle and power. Curve around planetary gravity wells and reach the target zone.</p>
    </section>
    <section class="panel">
      <div class="stats">
        <div class="stat">Level<strong id="level-value">1</strong></div>
        <div class="stat">Planets<strong id="planet-value">3</strong></div>
        <div class="stat">Power<strong id="power-value">0%</strong></div>
        <div class="stat">State<strong id="state-value">Aiming</strong></div>
      </div>
      <p class="hint" id="message">Aim &amp; Launch</p>
      <div class="legend">
        <span class="launch">Launch</span>
        <span class="target">Target</span>
        <span class="planet">Gravity well</span>
      </div>
    </section>
  </div>
  <script>
    const canvas = document.getElementById("game-canvas");
    const ctx = canvas.getContext("2d");

    const levelValue = document.getElementById("level-value");
    const planetValue = document.getElementById("planet-value");
    const powerValue = document.getElementById("power-value");
    const stateValue = document.getElementById("state-value");
    const messageValue = document.getElementById("message");

    const MIN_PLANETS = 3;
    const MAX_PLANETS = 5;
    const GRAVITY_CONSTANT = 2600;
    const PHYSICS_STEP = 1 / 120;
    const PREVIEW_STEPS = 360;
    const PREVIEW_SAMPLE_RATE = 2;
    const MAX_TRAIL_POINTS = 420;
    const MAX_LAUNCH_SPEED = 360;

    let width = 0;
    let height = 0;
    let pointer = { x: 0, y: 0, down: false };
    let previewDirty = true;

    const state = {
      level: 1,
      status: "aiming",
      launchPoint: { x: 0, y: 0 },
      target: { x: 0, y: 0, radius: 28 },
      ship: null,
      planets: [],
      trail: [],
      previewPath: [],
      aimVector: { x: 0, y: 0 },
      lastTime: 0
    };

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * window.devicePixelRatio;
      canvas.height = height * window.devicePixelRatio;
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
      previewDirty = true;
      if (!state.ship || state.status !== "launched") {
        startLevel(state.level);
      }
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function startLevel(level) {
      state.level = level;
      state.status = "aiming";
      state.launchPoint = { x: Math.max(90, width * 0.12), y: height * 0.5 };
      state.target = {
        x: width - Math.max(100, width * 0.12),
        y: clamp(rand(height * 0.22, height * 0.78), 80, height - 80),
        radius: clamp(Math.min(width, height) * 0.038, 24, 34)
      };
      state.ship = {
        x: state.launchPoint.x,
        y: state.launchPoint.y,
        vx: 0,
        vy: 0,
        radius: 7
      };
      state.trail = [];
      state.previewPath = [];
      state.aimVector = { x: width * 0.13, y: -height * 0.08 };
      state.planets = generatePlanets(level);
      previewDirty = true;
      updateHud();
      messageValue.textContent = "Aim & Launch";
    }

    function generatePlanets(level) {
      const planets = [];
      const count = clamp(MIN_PLANETS + level - 1, MIN_PLANETS, MAX_PLANETS);
      const attempts = 300;

      for (let i = 0; i < count; i += 1) {
        let placed = false;

        for (let attempt = 0; attempt < attempts && !placed; attempt += 1) {
          const radius = rand(24, 44);
          const planet = {
            x: rand(width * 0.28, width * 0.78),
            y: rand(height * 0.18, height * 0.82),
            radius,
            mass: rand(0.9, 2.2) * radius * 32,
            hue: rand(26, 220)
          };

          const overlapsPlanet = planets.some((other) => distance(planet, other) < planet.radius + other.radius + 56);
          const overlapsLaunch = distance(planet, state.launchPoint) < planet.radius + 120;
          const overlapsTarget = distance(planet, state.target) < planet.radius + state.target.radius + 100;

          if (!overlapsPlanet && !overlapsLaunch && !overlapsTarget) {
            planets.push(planet);
            placed = true;
          }
        }
      }

      while (planets.length < MIN_PLANETS) {
        planets.push({
          x: width * (0.45 + planets.length * 0.12),
          y: height * (0.3 + planets.length * 0.18),
          radius: 30,
          mass: 30 * 48,
          hue: 40 + planets.length * 40
        });
      }

      return planets;
    }

    function updateHud() {
      const launchSpeed = clamp(Math.hypot(state.aimVector.x, state.aimVector.y) * 1.35, 0, MAX_LAUNCH_SPEED);
      levelValue.textContent = String(state.level);
      planetValue.textContent = String(state.planets.length);
      powerValue.textContent = Math.round((launchSpeed / MAX_LAUNCH_SPEED) * 100) + "%";
      stateValue.textContent = state.status[0].toUpperCase() + state.status.slice(1);
    }

    function getGravityAcceleration(position) {
      let ax = 0;
      let ay = 0;

      for (const planet of state.planets) {
        const dx = planet.x - position.x;
        const dy = planet.y - position.y;
        const distSq = Math.max(dx * dx + dy * dy, (planet.radius + 18) ** 2);
        const dist = Math.sqrt(distSq);
        const force = (GRAVITY_CONSTANT * planet.mass) / distSq;
        ax += (dx / dist) * force;
        ay += (dy / dist) * force;
      }

      return { ax, ay };
    }

    function integrateShip(ship, dt) {
      const accel = getGravityAcceleration(ship);
      ship.vx += accel.ax * dt;
      ship.vy += accel.ay * dt;
      ship.x += ship.vx * dt;
      ship.y += ship.vy * dt;
    }

    function computeTrajectoryPreview() {
      const launchVelocity = getLaunchVelocity();
      const ghost = {
        x: state.launchPoint.x,
        y: state.launchPoint.y,
        vx: launchVelocity.vx,
        vy: launchVelocity.vy,
        radius: state.ship.radius
      };
      const path = [];

      for (let step = 0; step < PREVIEW_STEPS; step += 1) {
        integrateShip(ghost, PHYSICS_STEP);
        if (step % PREVIEW_SAMPLE_RATE === 0) {
          path.push({ x: ghost.x, y: ghost.y });
        }
        if (checkShipFailure(ghost, true) || checkTargetReached(ghost)) {
          break;
        }
      }

      state.previewPath = path;
      previewDirty = false;
    }

    function getLaunchVelocity() {
      const vx = clamp(state.aimVector.x * 1.35, -MAX_LAUNCH_SPEED, MAX_LAUNCH_SPEED);
      const vy = clamp(state.aimVector.y * 1.35, -MAX_LAUNCH_SPEED, MAX_LAUNCH_SPEED);
      return { vx, vy };
    }

    function launchShip() {
      if (state.status !== "aiming") {
        return;
      }

      const velocity = getLaunchVelocity();
      state.ship = {
        x: state.launchPoint.x,
        y: state.launchPoint.y,
        vx: velocity.vx,
        vy: velocity.vy,
        radius: 7
      };
      state.trail = [{ x: state.ship.x, y: state.ship.y }];
      state.status = "launched";
      updateHud();
      messageValue.textContent = "Flight in progress";
    }

    function checkShipFailure(ship, ignoreMessage = false) {
      const offscreenMargin = 70;
      if (ship.x < -offscreenMargin || ship.x > width + offscreenMargin || ship.y < -offscreenMargin || ship.y > height + offscreenMargin) {
        if (!ignoreMessage) {
          failLevel("Lost in deep space. Drag to retry.");
        }
        return true;
      }

      for (const planet of state.planets) {
        if (distance(ship, planet) <= ship.radius + planet.radius) {
          if (!ignoreMessage) {
            failLevel("Ship lost to a gravity well. Drag to retry.");
          }
          return true;
        }
      }

      return false;
    }

    function checkTargetReached(ship) {
      return distance(ship, state.target) <= state.target.radius + ship.radius + 4;
    }

    function failLevel(text) {
      state.status = "aiming";
      state.ship = {
        x: state.launchPoint.x,
        y: state.launchPoint.y,
        vx: 0,
        vy: 0,
        radius: 7
      };
      state.trail = [];
      previewDirty = true;
      updateHud();
      messageValue.textContent = text;
    }

    function completeLevel() {
      state.status = "won";
      updateHud();
      messageValue.textContent = "Target reached. Generating next sector...";
      window.setTimeout(() => {
        startLevel(state.level + 1);
      }, 900);
    }

    function update(deltaMs) {
      const deltaSeconds = Math.min(deltaMs / 1000, 0.033);

      if (state.status === "aiming" && previewDirty) {
        computeTrajectoryPreview();
      }

      if (state.status !== "launched") {
        return;
      }

      let accumulator = deltaSeconds;
      while (accumulator > 0) {
        const dt = Math.min(PHYSICS_STEP, accumulator);
        integrateShip(state.ship, dt);
        accumulator -= dt;
      }

      state.trail.push({ x: state.ship.x, y: state.ship.y });
      if (state.trail.length > MAX_TRAIL_POINTS) {
        state.trail.shift();
      }

      if (checkTargetReached(state.ship)) {
        completeLevel();
        return;
      }

      checkShipFailure(state.ship);
    }

    function drawBackgroundStars() {
      const stars = 80;
      ctx.save();
      for (let i = 0; i < stars; i += 1) {
        const x = (i * 127.13) % width;
        const y = (i * 213.37) % height;
        const alpha = 0.18 + (i % 5) * 0.11;
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.fillRect(x, y, 2, 2);
      }
      ctx.restore();
    }

    function drawPlanets() {
      for (const planet of state.planets) {
        const wellRadius = planet.radius * 2.6;
        const gradient = ctx.createRadialGradient(planet.x, planet.y, planet.radius * 0.2, planet.x, planet.y, wellRadius);
        gradient.addColorStop(0, `hsla(${planet.hue}, 86%, 72%, 0.9)`);
        gradient.addColorStop(0.45, `hsla(${planet.hue}, 70%, 52%, 0.28)`);
        gradient.addColorStop(1, `hsla(${planet.hue}, 70%, 52%, 0)`);
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(planet.x, planet.y, wellRadius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(138, 198, 255, 0.18)";
        ctx.lineWidth = 1.2;
        for (let ring = 1; ring <= 3; ring += 1) {
          ctx.beginPath();
          ctx.arc(planet.x, planet.y, planet.radius + ring * 16, 0, Math.PI * 2);
          ctx.stroke();
        }

        const body = ctx.createRadialGradient(
          planet.x - planet.radius * 0.3,
          planet.y - planet.radius * 0.35,
          planet.radius * 0.1,
          planet.x,
          planet.y,
          planet.radius
        );
        body.addColorStop(0, `hsla(${planet.hue}, 90%, 78%, 1)`);
        body.addColorStop(1, `hsla(${planet.hue}, 70%, 42%, 1)`);
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.arc(planet.x, planet.y, planet.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawLaunchPoint() {
      ctx.save();
      ctx.strokeStyle = "rgba(125, 211, 252, 0.9)";
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 6]);
      ctx.beginPath();
      ctx.arc(state.launchPoint.x, state.launchPoint.y, 18, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "rgba(125, 211, 252, 0.3)";
      ctx.beginPath();
      ctx.arc(state.launchPoint.x, state.launchPoint.y, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawTarget() {
      ctx.save();
      ctx.strokeStyle = "rgba(147, 240, 175, 0.95)";
      ctx.fillStyle = "rgba(147, 240, 175, 0.12)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(state.target.x, state.target.y, state.target.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(state.target.x, state.target.y, state.target.radius * 0.45, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawPreviewPath() {
      if (state.status !== "aiming" || state.previewPath.length < 2) {
        return;
      }

      ctx.save();
      ctx.strokeStyle = "rgba(248, 214, 109, 0.72)";
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      ctx.moveTo(state.previewPath[0].x, state.previewPath[0].y);
      for (let i = 1; i < state.previewPath.length; i += 1) {
        ctx.lineTo(state.previewPath[i].x, state.previewPath[i].y);
      }
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.strokeStyle = "rgba(125, 211, 252, 0.75)";
      ctx.beginPath();
      ctx.moveTo(state.launchPoint.x, state.launchPoint.y);
      ctx.lineTo(state.launchPoint.x + state.aimVector.x, state.launchPoint.y + state.aimVector.y);
      ctx.stroke();
      ctx.restore();
    }

    function drawTrail() {
      if (state.trail.length < 2) {
        return;
      }

      ctx.save();
      for (let i = 1; i < state.trail.length; i += 1) {
        const prev = state.trail[i - 1];
        const current = state.trail[i];
        const alpha = i / state.trail.length;
        ctx.strokeStyle = `rgba(125, 211, 252, ${alpha * 0.9})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(prev.x, prev.y);
        ctx.lineTo(current.x, current.y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawShip() {
      const ship = state.status === "launched" || state.status === "won" ? state.ship : { x: state.launchPoint.x, y: state.launchPoint.y };

      ctx.save();
      ctx.translate(ship.x, ship.y);
      const angle = Math.atan2(ship.vy || state.aimVector.y, ship.vx || state.aimVector.x);
      ctx.rotate(angle);
      ctx.fillStyle = "#f8fbff";
      ctx.strokeStyle = "#7dd3fc";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(12, 0);
      ctx.lineTo(-8, -6);
      ctx.lineTo(-4, 0);
      ctx.lineTo(-8, 6);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      drawBackgroundStars();
      drawTarget();
      drawPlanets();
      drawLaunchPoint();
      drawPreviewPath();
      drawTrail();
      drawShip();
    }

    function setAimFromPointer(x, y) {
      state.aimVector.x = clamp(x - state.launchPoint.x, -220, 220);
      state.aimVector.y = clamp(y - state.launchPoint.y, -220, 220);
      previewDirty = true;
      updateHud();
    }

    function onPointerDown(event) {
      const rect = canvas.getBoundingClientRect();
      pointer = {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top,
        down: true
      };

      if (state.status !== "aiming") {
        failLevel("Aim & Launch");
      }

      setAimFromPointer(pointer.x, pointer.y);
    }

    function onPointerMove(event) {
      const rect = canvas.getBoundingClientRect();
      pointer.x = event.clientX - rect.left;
      pointer.y = event.clientY - rect.top;
      if (pointer.down && state.status === "aiming") {
        setAimFromPointer(pointer.x, pointer.y);
      }
    }

    function onPointerUp() {
      if (pointer.down && state.status === "aiming") {
        launchShip();
      }
      pointer.down = false;
    }

    function frame(timestamp) {
      if (!state.lastTime) {
        state.lastTime = timestamp;
      }
      const delta = timestamp - state.lastTime;
      state.lastTime = timestamp;
      update(delta);
      draw();
      requestAnimationFrame(frame);
    }

    canvas.addEventListener("pointerdown", onPointerDown);
    window.addEventListener("pointermove", onPointerMove);
    window.addEventListener("pointerup", onPointerUp);
    window.addEventListener("resize", resize);

    resize();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
