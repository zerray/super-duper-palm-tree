<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节奏色块记忆挑战</title>
  <style>
    :root {
      --bg: #0c1220;
      --panel: rgba(13, 22, 38, 0.88);
      --panel-soft: rgba(21, 32, 54, 0.86);
      --line: rgba(255, 255, 255, 0.08);
      --text: #eef5ff;
      --muted: #91a3c2;
      --accent: #ffd166;
      --good: #7ef0b8;
      --bad: #ff6e7a;
      --glow: rgba(255, 209, 102, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(88, 168, 255, 0.22), transparent 28%),
        radial-gradient(circle at 85% 12%, rgba(255, 110, 122, 0.18), transparent 22%),
        linear-gradient(180deg, #0a101b 0%, #111a2c 52%, #0a111c 100%);
    }

    button {
      font: inherit;
      color: inherit;
    }

    .app {
      width: min(980px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 20px 0 28px;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(300px, 0.8fr);
      gap: 18px;
      padding: 22px;
    }

    .copy,
    .menu,
    .board-shell,
    .result-panel {
      display: grid;
      gap: 14px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.4rem, 5vw, 4.4rem);
      line-height: 0.94;
      letter-spacing: -0.06em;
    }

    .eyebrow,
    .micro {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.76rem;
    }

    .lede,
    .hint,
    .muted {
      color: var(--muted);
      line-height: 1.6;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat,
    .menu,
    .result-panel {
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .stat-value {
      margin-top: 6px;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .mode-row,
    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mode-button,
    .action-button,
    .pad {
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease, filter 120ms ease;
    }

    .mode-button,
    .action-button {
      min-height: 48px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      cursor: pointer;
    }

    .mode-button.active,
    .mode-button:hover,
    .action-button:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 209, 102, 0.42);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
    }

    .action-button.primary {
      color: #11111a;
      font-weight: 700;
      border: 0;
      background: linear-gradient(180deg, #ffe289 0%, #ffb347 100%);
    }

    .board-shell {
      padding: 18px;
      position: relative;
    }

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .progress-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      transform-origin: left center;
      background: linear-gradient(90deg, #7ef0b8, #ffd166, #ff6e7a);
      transition: transform 80ms linear;
    }

    .board {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      padding: 16px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01)),
        linear-gradient(135deg, rgba(255, 255, 255, 0.02), transparent 48%),
        #0b1322;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .board::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      pointer-events: none;
    }

    .pad {
      position: relative;
      min-height: 168px;
      border-radius: 24px;
      cursor: pointer;
      overflow: hidden;
      box-shadow: inset 0 -12px 26px rgba(0, 0, 0, 0.18);
    }

    .pad::before,
    .pad::after {
      content: "";
      position: absolute;
      inset: 0;
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .pad::before {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.22), transparent 45%);
      opacity: 0.5;
    }

    .pad::after {
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.46), transparent 58%);
      opacity: 0;
      transform: scale(0.92);
    }

    .pad.active,
    .pad:active {
      transform: scale(0.97);
      filter: brightness(1.14) saturate(1.08);
      box-shadow:
        inset 0 -12px 26px rgba(0, 0, 0, 0.14),
        0 0 0 2px rgba(255, 255, 255, 0.2),
        0 0 28px var(--glow);
    }

    .pad.active::after,
    .pad:active::after {
      opacity: 1;
      transform: scale(1.02);
    }

    .pad span {
      position: absolute;
      left: 18px;
      bottom: 16px;
      font-size: 1rem;
      font-weight: 700;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.24);
    }

    .result-panel {
      display: none;
    }

    .result-panel.visible {
      display: grid;
    }

    .result-panel.good {
      border-color: rgba(126, 240, 184, 0.34);
    }

    .result-panel.bad {
      border-color: rgba(255, 110, 122, 0.3);
    }

    @media (max-width: 860px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .pad {
        min-height: 140px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel hero">
      <section class="copy">
        <div class="eyebrow">party-toy</div>
        <h1>节奏色块记忆挑战</h1>
        <p class="lede">系统先按节拍点亮色块，你必须在每一拍窗口内按正确顺序复现。每过一轮，序列加长、BPM 提升。双人热座模式下，两位玩家会挑战同一随机种子。</p>
        <div class="stats">
          <div class="stat">
            <div class="micro">模式</div>
            <div class="stat-value" id="mode-stat">单人</div>
          </div>
          <div class="stat">
            <div class="micro">当前玩家</div>
            <div class="stat-value" id="player-stat">玩家 1</div>
          </div>
          <div class="stat">
            <div class="micro">当前回合</div>
            <div class="stat-value" id="round-stat">1</div>
          </div>
          <div class="stat">
            <div class="micro">BPM</div>
            <div class="stat-value" id="bpm-stat">92</div>
          </div>
        </div>
      </section>

      <section class="menu">
        <h2>开始设置</h2>
        <div class="mode-row">
          <button class="mode-button active" data-mode="solo" type="button">单人</button>
          <button class="mode-button" data-mode="versus" type="button">热座双人</button>
        </div>
        <div class="button-row">
          <button class="action-button primary" id="start-button" type="button">开始挑战</button>
          <button class="action-button" id="retry-button" type="button">重新开局</button>
        </div>
        <p class="hint" id="seed-label">随机种子: 等待开始</p>
        <p class="muted" id="status-text">首次点击会解锁 Web Audio。观看演示后，在每拍倒计时归零前点对下一个色块。</p>
      </section>
    </section>

    <section class="panel board-shell">
      <div class="status-bar">
        <div class="pill" id="phase-pill">待机</div>
        <div class="pill" id="score-pill">得分 0</div>
        <div class="pill" id="sequence-pill">序列长度 3</div>
      </div>
      <div class="progress-track" aria-label="Beat timer">
        <div class="progress-bar" id="timer-bar"></div>
      </div>
      <section class="board" id="board" aria-label="Rhythm color pads">
        <button class="pad" data-pad="0" type="button" aria-label="琥珀">
          <span>琥珀</span>
        </button>
        <button class="pad" data-pad="1" type="button" aria-label="海蓝">
          <span>海蓝</span>
        </button>
        <button class="pad" data-pad="2" type="button" aria-label="薄荷">
          <span>薄荷</span>
        </button>
        <button class="pad" data-pad="3" type="button" aria-label="莓红">
          <span>莓红</span>
        </button>
      </section>
      <section class="result-panel" id="result-panel">
        <h2 id="result-title">结果</h2>
        <p class="lede" id="result-copy"></p>
      </section>
    </section>
  </main>

  <script>
    const BASE_BPM = 92;
    const BPM_STEP = 6;
    const START_LENGTH = 3;
    const INPUT_WINDOW_RATIO = 0.92;
    const FLASH_RATIO = 0.54;
    const pads = Array.from(document.querySelectorAll(".pad"));
    const modeButtons = Array.from(document.querySelectorAll(".mode-button"));
    const board = document.querySelector("#board");
    const startButton = document.querySelector("#start-button");
    const retryButton = document.querySelector("#retry-button");
    const modeStat = document.querySelector("#mode-stat");
    const playerStat = document.querySelector("#player-stat");
    const roundStat = document.querySelector("#round-stat");
    const bpmStat = document.querySelector("#bpm-stat");
    const phasePill = document.querySelector("#phase-pill");
    const scorePill = document.querySelector("#score-pill");
    const sequencePill = document.querySelector("#sequence-pill");
    const seedLabel = document.querySelector("#seed-label");
    const statusText = document.querySelector("#status-text");
    const timerBar = document.querySelector("#timer-bar");
    const resultPanel = document.querySelector("#result-panel");
    const resultTitle = document.querySelector("#result-title");
    const resultCopy = document.querySelector("#result-copy");

    const palette = [
      { name: "琥珀", color: "#ffb347", freq: 392 },
      { name: "海蓝", color: "#5caeff", freq: 466.16 },
      { name: "薄荷", color: "#57e8b4", freq: 523.25 },
      { name: "莓红", color: "#ff6e7a", freq: 587.33 }
    ];

    pads.forEach((pad, index) => {
      pad.style.background = `linear-gradient(180deg, ${palette[index].color}, ${shadeColor(palette[index].color, -22)})`;
    });

    let audioContext = null;
    let selectedMode = "solo";
    let currentSeed = 0;
    let turnState = null;
    let sequence = [];
    let sequenceRng = null;
    let playbackToken = 0;
    let inputDeadline = 0;
    let inputLoopId = 0;
    let versusScores = [];
    let startAction = "new-match";

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        if ((turnState && turnState.locked) || startAction === "player-two") {
          return;
        }
        selectedMode = button.dataset.mode;
        modeButtons.forEach((candidate) => candidate.classList.toggle("active", candidate === button));
        syncStaticLabels();
      });
    });

    startButton.addEventListener("click", () => {
      unlockAudio();
      if (startAction === "player-two") {
        beginTurn(2);
        return;
      }
      startMatch();
    });

    retryButton.addEventListener("click", () => {
      unlockAudio();
      startMatch(currentSeed || randomSeed());
    });

    board.addEventListener("click", (event) => {
      const pad = event.target.closest(".pad");
      if (!pad || !turnState || turnState.phase !== "input") {
        return;
      }
      handlePadInput(Number(pad.dataset.pad));
    });

    syncStaticLabels();
    resetBoardMessage();

    function syncStaticLabels() {
      modeStat.textContent = selectedMode === "solo" ? "单人" : "热座双人";
      if (!turnState || !turnState.activePlayer) {
        playerStat.textContent = "玩家 1";
      }
    }

    function startMatch(seed = randomSeed()) {
      currentSeed = seed;
      startAction = "new-match";
      startButton.textContent = "开始挑战";
      versusScores = [];
      resultPanel.className = "result-panel";
      resultTitle.textContent = "结果";
      resultCopy.textContent = "";
      seedLabel.textContent = `随机种子: ${seed}`;
      if (selectedMode === "solo") {
        beginTurn(1);
        return;
      }
      beginTurn(1);
    }

    function beginTurn(playerIndex) {
      playbackToken += 1;
      clearTimeout(inputLoopId);
      startAction = "new-match";
      startButton.textContent = "开始挑战";
      resultPanel.className = "result-panel";
      sequence = [];
      sequenceRng = mulberry32(currentSeed);
      turnState = {
        activePlayer: playerIndex,
        phase: "playback",
        round: 1,
        score: 0,
        bpm: BASE_BPM,
        inputIndex: 0,
        locked: true
      };
      updateHud();
      statusText.textContent = `玩家 ${playerIndex} 准备中。先观看序列，再在每拍内点击复现。`;
      playRound();
    }

    function playRound() {
      if (!turnState) {
        return;
      }
      turnState.phase = "playback";
      turnState.locked = true;
      turnState.inputIndex = 0;
      turnState.bpm = BASE_BPM + (turnState.round - 1) * BPM_STEP;
      ensureSequenceLength(START_LENGTH + turnState.round - 1);
      const currentSequence = sequence.slice(0, START_LENGTH + turnState.round - 1);
      const beatMs = beatDurationMs(turnState.bpm);
      const flashMs = beatMs * FLASH_RATIO;
      const token = ++playbackToken;

      updateHud();
      statusText.textContent = `第 ${turnState.round} 轮演示中，记住 ${currentSequence.length} 个色块。`;
      timerBar.style.transform = "scaleX(1)";

      currentSequence.forEach((padIndex, stepIndex) => {
        const when = stepIndex * beatMs;
        window.setTimeout(() => {
          if (!turnState || token !== playbackToken) {
            return;
          }
          flashPad(padIndex, flashMs);
          playTone(palette[padIndex].freq, flashMs * 0.001, "sine", 0.12);
        }, when);
      });

      window.setTimeout(() => {
        if (!turnState || token !== playbackToken) {
          return;
        }
        startInputPhase(currentSequence);
      }, currentSequence.length * beatMs + 120);
    }

    function startInputPhase(currentSequence) {
      if (!turnState) {
        return;
      }
      turnState.phase = "input";
      turnState.locked = false;
      turnState.inputIndex = 0;
      updateHud();
      statusText.textContent = "轮到你了。按同样顺序点击，并在每拍结束前完成当前一步。";
      scheduleInputDeadline();

      function tick() {
        if (!turnState || turnState.phase !== "input") {
          return;
        }
        const remaining = Math.max(0, inputDeadline - performance.now());
        const beatMs = beatDurationMs(turnState.bpm) * INPUT_WINDOW_RATIO;
        timerBar.style.transform = `scaleX(${remaining / beatMs})`;
        if (remaining <= 0) {
          endTurn(false, "超时");
          return;
        }
        inputLoopId = window.setTimeout(tick, 50);
      }

      tick();

      function scheduleInputDeadline() {
        inputDeadline = performance.now() + beatDurationMs(turnState.bpm) * INPUT_WINDOW_RATIO;
      }

      turnState.scheduleInputDeadline = scheduleInputDeadline;
      turnState.currentSequence = currentSequence;
    }

    function handlePadInput(padIndex) {
      if (!turnState || turnState.phase !== "input") {
        return;
      }
      const currentSequence = turnState.currentSequence;
      const expectedPad = currentSequence[turnState.inputIndex];
      flashPad(padIndex, 180);
      if (padIndex !== expectedPad) {
        playTone(160, 0.18, "square", 0.16);
        endTurn(false, "点错了");
        return;
      }
      playTone(palette[padIndex].freq * 1.08, 0.12, "triangle", 0.12);
      turnState.inputIndex += 1;
      scorePill.textContent = `得分 ${turnState.score}`;
      if (turnState.inputIndex >= currentSequence.length) {
        turnState.score = currentSequence.length;
        turnState.round += 1;
        statusText.textContent = "正确复现，下一轮会更快。";
        playTone(660, 0.09, "triangle", 0.1);
        playTone(880, 0.12, "triangle", 0.08, 0.06);
        clearTimeout(inputLoopId);
        timerBar.style.transform = "scaleX(1)";
        window.setTimeout(() => {
          if (turnState) {
            playRound();
          }
        }, 520);
        return;
      }
      turnState.scheduleInputDeadline();
      timerBar.style.transform = "scaleX(1)";
      updateHud();
    }

    function endTurn(survived, reason) {
      if (!turnState) {
        return;
      }
      clearTimeout(inputLoopId);
      playbackToken += 1;
      turnState.phase = "ended";
      turnState.locked = false;
      timerBar.style.transform = "scaleX(0)";
      const finalScore = turnState.score;
      const playerIndex = turnState.activePlayer;

      if (!survived && finalScore === 0 && turnState.round > 1) {
        turnState.score = START_LENGTH + turnState.round - 2;
      }

      const resolvedScore = turnState.score;
      if (!survived) {
        resultPanel.className = "result-panel visible bad";
        resultTitle.textContent = `玩家 ${playerIndex} 结束`;
        resultCopy.textContent = `${reason}。最终得分 ${resolvedScore}，最高复现长度 ${resolvedScore}。`;
        statusText.textContent = `${reason}，本回合结束。`;
      } else {
        resultPanel.className = "result-panel visible good";
      }

      if (selectedMode === "solo") {
        phasePill.textContent = "单人结束";
        scorePill.textContent = `得分 ${resolvedScore}`;
        return;
      }

      versusScores[playerIndex - 1] = resolvedScore;
      if (playerIndex === 1) {
        phasePill.textContent = "玩家 1 完成";
        statusText.textContent = `玩家 1 得分 ${resolvedScore}。点击“开始玩家 2”让玩家 2 使用同一种子接棒。`;
        startAction = "player-two";
        startButton.textContent = "开始玩家 2";
        return;
      }

      phasePill.textContent = "双人结算";
      const [scoreA, scoreB] = versusScores;
      const summary = compareScores(scoreA, scoreB);
      resultPanel.className = `result-panel visible ${summary.tied ? "good" : "bad"}`;
      resultTitle.textContent = summary.title;
      resultCopy.textContent = `玩家 1 得分 ${scoreA}，玩家 2 得分 ${scoreB}。${summary.copy}`;
      statusText.textContent = "同一随机种子的双人热座挑战完成。";
      startButton.textContent = "再来一局";
      startAction = "new-match";
    }

    function updateHud() {
      if (!turnState) {
        return;
      }
      playerStat.textContent = `玩家 ${turnState.activePlayer}`;
      roundStat.textContent = `${turnState.round}`;
      bpmStat.textContent = `${turnState.bpm}`;
      scorePill.textContent = `得分 ${turnState.score}`;
      sequencePill.textContent = `序列长度 ${START_LENGTH + turnState.round - 1}`;
      if (turnState.phase === "playback") {
        phasePill.textContent = "系统演示";
      } else if (turnState.phase === "input") {
        phasePill.textContent = "玩家输入";
      }
    }

    function ensureSequenceLength(length) {
      while (sequence.length < length) {
        sequence.push(Math.floor(sequenceRng() * palette.length));
      }
    }

    function beatDurationMs(bpm) {
      return 60000 / bpm;
    }

    function flashPad(index, durationMs) {
      const pad = pads[index];
      pad.classList.add("active");
      window.setTimeout(() => pad.classList.remove("active"), durationMs);
    }

    function unlockAudio() {
      if (!audioContext) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          return;
        }
        audioContext = new AudioContextClass();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    function playTone(frequency, durationSeconds, type, gainAmount, delaySeconds = 0) {
      if (!audioContext) {
        return;
      }
      const startTime = audioContext.currentTime + delaySeconds;
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startTime);
      gain.gain.setValueAtTime(0.0001, startTime);
      gain.gain.exponentialRampToValueAtTime(gainAmount, startTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, startTime + durationSeconds);
      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(startTime);
      oscillator.stop(startTime + durationSeconds + 0.02);
    }

    function compareScores(scoreA, scoreB) {
      if (scoreA === scoreB) {
        return {
          title: "平局",
          copy: "两位玩家都撑到了同一轮次，下一局可以继续拼更快的 BPM。",
          tied: true
        };
      }
      const winner = scoreA > scoreB ? 1 : 2;
      return {
        title: `玩家 ${winner} 获胜`,
        copy: `玩家 ${winner} 在相同种子下复现了更长的序列。`,
        tied: false
      };
    }

    function randomSeed() {
      return Math.floor(Math.random() * 0xffffffff);
    }

    function mulberry32(seed) {
      let t = seed >>> 0;
      return function() {
        t += 0x6d2b79f5;
        let value = Math.imul(t ^ (t >>> 15), t | 1);
        value ^= value + Math.imul(value ^ (value >>> 7), value | 61);
        return ((value ^ (value >>> 14)) >>> 0) / 4294967296;
      };
    }

    function shadeColor(hex, offset) {
      const value = hex.replace("#", "");
      const number = Number.parseInt(value, 16);
      const red = Math.max(0, Math.min(255, (number >> 16) + offset));
      const green = Math.max(0, Math.min(255, ((number >> 8) & 255) + offset));
      const blue = Math.max(0, Math.min(255, (number & 255) + offset));
      return `rgb(${red}, ${green}, ${blue})`;
    }

    function resetBoardMessage() {
      phasePill.textContent = "待机";
      scorePill.textContent = "得分 0";
      sequencePill.textContent = `序列长度 ${START_LENGTH}`;
      timerBar.style.transform = "scaleX(1)";
    }
  </script>
</body>
