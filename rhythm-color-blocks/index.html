<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节奏色块：回合制双人记忆对战</title>
  <style>
    :root {
      --bg: #0f1226;
      --panel: rgba(17, 22, 44, 0.9);
      --panel-strong: rgba(24, 30, 58, 0.96);
      --line: rgba(255, 255, 255, 0.1);
      --text: #f5f7ff;
      --muted: #a8b2d9;
      --accent: #ffe082;
      --good: #87f0b5;
      --bad: #ff8fb1;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(100, 181, 246, 0.22), transparent 24%),
        radial-gradient(circle at top right, rgba(255, 138, 128, 0.18), transparent 26%),
        linear-gradient(180deg, #151935 0%, #0d1021 100%);
    }

    button {
      font: inherit;
      color: inherit;
      cursor: pointer;
    }

    .app {
      width: min(960px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 20px 0 28px;
      display: grid;
      gap: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .eyebrow,
    .mini {
      margin: 0;
      color: var(--accent);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.6rem);
      line-height: 0.96;
      letter-spacing: -0.06em;
    }

    .lede,
    .muted {
      color: var(--muted);
      line-height: 1.6;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .score-card,
    .status-card {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
    }

    .score-card.active {
      border-color: rgba(255, 224, 130, 0.8);
      box-shadow: inset 0 0 0 1px rgba(255, 224, 130, 0.45);
    }

    .score-title {
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .score-value {
      margin-top: 8px;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .status-value {
      margin-top: 6px;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button {
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      transition: transform 120ms ease, border-color 120ms ease;
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(255, 224, 130, 0.75);
      outline: none;
    }

    .button.primary {
      color: #1b1730;
      border: 0;
      font-weight: 700;
      background: linear-gradient(180deg, #fff2a8, #ffc96b);
    }

    .board-panel {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .tile {
      position: relative;
      aspect-ratio: 1;
      border: 0;
      border-radius: 22px;
      background: var(--tile);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.18),
        0 18px 28px rgba(0, 0, 0, 0.22);
      transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
    }

    .tile::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.38), transparent 36%);
      opacity: 0.8;
      pointer-events: none;
    }

    .tile:hover,
    .tile:focus-visible {
      transform: translateY(-2px);
      filter: brightness(1.04);
      outline: none;
    }

    .tile.active {
      transform: scale(1.04);
      filter: brightness(1.45) saturate(1.12);
      box-shadow:
        inset 0 0 0 2px rgba(255, 255, 255, 0.55),
        0 0 28px color-mix(in srgb, var(--tile) 75%, white 25%);
    }

    .tile.good {
      box-shadow:
        inset 0 0 0 2px rgba(255, 255, 255, 0.55),
        0 0 26px rgba(135, 240, 181, 0.75);
    }

    .tile.bad {
      box-shadow:
        inset 0 0 0 2px rgba(255, 255, 255, 0.55),
        0 0 26px rgba(255, 143, 177, 0.85);
    }

    .tile[disabled] {
      cursor: default;
      opacity: 0.92;
    }

    .tile-label {
      position: absolute;
      left: 12px;
      bottom: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(5, 7, 15, 0.72);
      backdrop-filter: blur(8px);
    }

    .overlay.show {
      display: grid;
    }

    .overlay-card {
      width: min(420px, 100%);
      padding: 24px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      box-shadow: var(--shadow);
      display: grid;
      gap: 14px;
    }

    @media (max-width: 720px) {
      .scoreboard,
      .status-grid {
        grid-template-columns: 1fr;
      }

      .board {
        gap: 10px;
      }

      .tile {
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel hero">
      <div>
        <p class="eyebrow">Hot Seat Party Memory Duel</p>
        <h1>节奏色块：回合制双人记忆对战</h1>
        <p class="lede">两名玩家轮流观看并复现同一条逐渐变长的色块序列。成功复现后，序列自动加一并交给对手；失败时，对手直接获得当前序列长度的分数，先到 30 分获胜。</p>
      </div>

      <div class="scoreboard">
        <article class="score-card active" id="player-0-card">
          <div class="score-title">玩家 1 分数</div>
          <div class="score-value" id="score-0">0</div>
        </article>
        <article class="score-card" id="player-1-card">
          <div class="score-title">玩家 2 分数</div>
          <div class="score-value" id="score-1">0</div>
        </article>
      </div>

      <div class="status-grid">
        <article class="status-card">
          <div class="score-title">当前回合</div>
          <div class="status-value" id="turn-label">玩家 1</div>
        </article>
        <article class="status-card">
          <div class="score-title">当前序列长度</div>
          <div class="status-value" id="sequence-length">1</div>
        </article>
        <article class="status-card">
          <div class="score-title">阶段</div>
          <div class="status-value" id="phase-label">准备中</div>
        </article>
      </div>

      <div class="controls">
        <button class="button primary" id="restart-button" type="button">重新开始</button>
      </div>

      <p class="muted">浏览器通常需要一次交互后才允许播放声音；点击任意色块或“重新开始”后，后续高亮都会带有音效反馈。</p>
    </section>

    <section class="panel board-panel">
      <div class="status-bar">
        <div class="pill" id="status-text">系统正在准备第一轮序列。</div>
        <div class="pill" id="hint-text">展示阶段不可点击，输入阶段按顺序点击色块。</div>
      </div>

      <div class="board" id="board" aria-label="4x4 彩色网格"></div>
    </section>
  </main>

  <div class="overlay" id="game-over-overlay" role="dialog" aria-modal="true" aria-labelledby="game-over-title">
    <div class="overlay-card">
      <p class="mini">Match Over</p>
      <h2 id="game-over-title">玩家 1 获胜</h2>
      <p class="muted" id="game-over-copy"></p>
      <button class="button primary" id="overlay-restart" type="button">再来一局</button>
    </div>
  </div>

  <script>
    const WIN_SCORE = 30;
    const TILE_COLORS = [
      "#ff6b6b", "#ff8e53", "#ffd166", "#c7f464",
      "#4ef0b7", "#44d7f5", "#4f8cff", "#8b7dff",
      "#b06cff", "#ff72c7", "#ff7aa2", "#ff9f68",
      "#ffe66d", "#6df5c8", "#68b9ff", "#8ff0ff"
    ];
    const TILE_FREQUENCIES = [
      261.63, 293.66, 329.63, 349.23,
      392.0, 440.0, 493.88, 523.25,
      587.33, 659.25, 698.46, 783.99,
      293.66, 369.99, 466.16, 554.37
    ];

    const state = {
      scores: [0, 0],
      currentPlayer: 0,
      sequence: [],
      inputIndex: 0,
      phase: "ready",
      locked: true,
      gameOver: false,
      audioContext: null,
      timeouts: []
    };

    const board = document.querySelector("#board");
    const scoreEls = [document.querySelector("#score-0"), document.querySelector("#score-1")];
    const cardEls = [document.querySelector("#player-0-card"), document.querySelector("#player-1-card")];
    const turnLabel = document.querySelector("#turn-label");
    const sequenceLengthLabel = document.querySelector("#sequence-length");
    const phaseLabel = document.querySelector("#phase-label");
    const statusText = document.querySelector("#status-text");
    const hintText = document.querySelector("#hint-text");
    const restartButton = document.querySelector("#restart-button");
    const overlay = document.querySelector("#game-over-overlay");
    const overlayTitle = document.querySelector("#game-over-title");
    const overlayCopy = document.querySelector("#game-over-copy");
    const overlayRestart = document.querySelector("#overlay-restart");

    function clearScheduledTasks() {
      state.timeouts.forEach((timeoutId) => window.clearTimeout(timeoutId));
      state.timeouts = [];
    }

    function schedule(callback, delay) {
      const timeoutId = window.setTimeout(() => {
        state.timeouts = state.timeouts.filter((id) => id !== timeoutId);
        callback();
      }, delay);
      state.timeouts.push(timeoutId);
      return timeoutId;
    }

    function createBoard() {
      board.innerHTML = "";
      TILE_COLORS.forEach((color, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "tile";
        button.dataset.index = String(index);
        button.style.setProperty("--tile", color);
        button.innerHTML = `<span class="tile-label">${index + 1}</span>`;
        button.addEventListener("click", () => handleTileClick(index));
        board.appendChild(button);
      });
    }

    function getTiles() {
      return Array.from(board.querySelectorAll(".tile"));
    }

    function setInteractive(enabled) {
      state.locked = !enabled;
      getTiles().forEach((tile) => {
        tile.disabled = !enabled;
      });
    }

    function updateStatus() {
      scoreEls.forEach((el, index) => {
        el.textContent = String(state.scores[index]);
        cardEls[index].classList.toggle("active", index === state.currentPlayer && !state.gameOver);
      });

      turnLabel.textContent = `玩家 ${state.currentPlayer + 1}`;
      sequenceLengthLabel.textContent = String(state.sequence.length || 1);

      const labels = {
        ready: "准备中",
        showing: "展示阶段",
        input: "输入阶段",
        switch: "切换回合",
        gameover: "游戏结束"
      };
      phaseLabel.textContent = labels[state.phase] || state.phase;
    }

    function setMessage(main, hint) {
      statusText.textContent = main;
      hintText.textContent = hint;
    }

    async function ensureAudio() {
      if (!state.audioContext) {
        const Context = window.AudioContext || window.webkitAudioContext;
        if (!Context) {
          return null;
        }
        state.audioContext = new Context();
      }

      if (state.audioContext.state === "suspended") {
        try {
          await state.audioContext.resume();
        } catch (error) {
          return null;
        }
      }

      return state.audioContext;
    }

    function playTone(index, duration = 0.22) {
      ensureAudio().then((audioContext) => {
        if (!audioContext) {
          return;
        }

        const now = audioContext.currentTime;
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.type = "sine";
        oscillator.frequency.value = TILE_FREQUENCIES[index];

        gainNode.gain.setValueAtTime(0.0001, now);
        gainNode.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        oscillator.start(now);
        oscillator.stop(now + duration + 0.02);
      });
    }

    function flashTile(index, className = "active", duration = 360) {
      const tile = getTiles()[index];
      if (!tile) {
        return;
      }

      tile.classList.remove("good", "bad");
      tile.classList.add(className);
      playTone(index, Math.max(duration / 1000 - 0.04, 0.12));
      schedule(() => {
        tile.classList.remove(className);
      }, duration);
    }

    function markTile(index, className) {
      const tile = getTiles()[index];
      if (!tile) {
        return;
      }

      tile.classList.remove("good", "bad");
      tile.classList.add(className);
      schedule(() => {
        tile.classList.remove(className);
      }, 320);
    }

    function nextRandomIndex() {
      return Math.floor(Math.random() * TILE_COLORS.length);
    }

    function showSequence() {
      if (state.gameOver) {
        return;
      }

      clearScheduledTasks();
      state.phase = "showing";
      state.inputIndex = 0;
      setInteractive(false);
      updateStatus();
      setMessage(
        `玩家 ${state.currentPlayer + 1} 请观看序列`,
        "系统会依次高亮色块并播放音调。"
      );

      const stepDelay = 560;
      state.sequence.forEach((tileIndex, step) => {
        schedule(() => flashTile(tileIndex, "active", 320), 360 + step * stepDelay);
      });

      schedule(() => {
        if (state.gameOver) {
          return;
        }
        state.phase = "input";
        updateStatus();
        setInteractive(true);
        setMessage(
          `轮到玩家 ${state.currentPlayer + 1} 输入`,
          `请按顺序完成 ${state.sequence.length} 次点击。`
        );
      }, 420 + state.sequence.length * stepDelay);
    }

    function switchPlayer() {
      state.currentPlayer = state.currentPlayer === 0 ? 1 : 0;
      updateStatus();
    }

    function finishGame(winnerIndex) {
      state.gameOver = true;
      state.phase = "gameover";
      setInteractive(false);
      updateStatus();
      overlayTitle.textContent = `玩家 ${winnerIndex + 1} 获胜`;
      overlayCopy.textContent = `最终比分：玩家 1 ${state.scores[0]} 比 ${state.scores[1]} 玩家 2。点击下方按钮重新开始。`;
      overlay.classList.add("show");
      setMessage("比赛结束。", "任一玩家达到 30 分后立即结束。");
    }

    function checkForWinner() {
      const winnerIndex = state.scores.findIndex((score) => score >= WIN_SCORE);
      if (winnerIndex !== -1) {
        finishGame(winnerIndex);
        return true;
      }
      return false;
    }

    function onRoundSuccess() {
      state.phase = "switch";
      setInteractive(false);
      updateStatus();
      setMessage(
        `玩家 ${state.currentPlayer + 1} 复现成功`,
        "序列会增加一步，然后切换到对手。"
      );

      schedule(() => {
        state.sequence.push(nextRandomIndex());
        switchPlayer();
        showSequence();
      }, 780);
    }

    function onRoundFailure(failedIndex) {
      state.phase = "switch";
      setInteractive(false);
      updateStatus();

      const opponent = state.currentPlayer === 0 ? 1 : 0;
      state.scores[opponent] += state.sequence.length;
      updateStatus();
      setMessage(
        `玩家 ${state.currentPlayer + 1} 失败，玩家 ${opponent + 1} 获得 ${state.sequence.length} 分`,
        "本轮序列重置为长度 1，并切换到得分方。"
      );

      markTile(failedIndex, "bad");

      if (checkForWinner()) {
        return;
      }

      schedule(() => {
        state.sequence = [nextRandomIndex()];
        state.inputIndex = 0;
        state.currentPlayer = opponent;
        updateStatus();
        showSequence();
      }, 960);
    }

    function handleTileClick(index) {
      if (state.locked || state.gameOver || state.phase !== "input") {
        return;
      }

      ensureAudio();
      flashTile(index, "active", 220);

      const expected = state.sequence[state.inputIndex];
      if (index !== expected) {
        onRoundFailure(index);
        return;
      }

      markTile(index, "good");
      state.inputIndex += 1;
      setMessage(
        `玩家 ${state.currentPlayer + 1} 正在输入`,
        `已完成 ${state.inputIndex} / ${state.sequence.length}。`
      );

      if (state.inputIndex >= state.sequence.length) {
        onRoundSuccess();
      }
    }

    function startGame() {
      clearScheduledTasks();
      state.scores = [0, 0];
      state.currentPlayer = 0;
      state.sequence = [nextRandomIndex()];
      state.inputIndex = 0;
      state.phase = "ready";
      state.gameOver = false;
      overlay.classList.remove("show");
      updateStatus();
      setMessage("系统正在准备第一轮序列。", "玩家 1 将先观看并复现长度为 1 的序列。");
      schedule(showSequence, 650);
    }

    restartButton.addEventListener("click", async () => {
      await ensureAudio();
      startGame();
    });

    overlayRestart.addEventListener("click", async () => {
      await ensureAudio();
      startGame();
    });

    document.addEventListener("pointerdown", () => {
      ensureAudio();
    }, { once: true });

    createBoard();
    updateStatus();
    startGame();
  </script>
</body>
</html>
